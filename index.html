// ════════════════════════════════════════════════════════════════
//  SHIFT UTILITIES
// ════════════════════════════════════════════════════════════════

function getShiftsForDate(base, activeShifts) {
  const dow = base.getDay();
  return (activeShifts || [])
    .filter(s => !s.days || !s.days.length || s.days.includes(dow))  // shift applies if no days specified, or this day is in its list
    .map(s => {
      const [sh, sm] = s.start.split(":").map(Number);
      const [eh, em] = s.end.split(":").map(Number);
      const start = new Date(base); start.setHours(sh, sm, 0, 0);
      const end   = new Date(base); end.setHours(eh, em, 0, 0);
      if (end.getTime() <= start.getTime()) end.setDate(end.getDate() + 1); // overnight
      return { id: s.id, name: s.name, start: start.getTime(), end: end.getTime() };
    }).sort((a, b) => a.start - b.start);
}

function isProductiveDay(date, workingDays, dateOverrides) {
  const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  const ov = dateOverrides && dateOverrides[dateStr];
  if (ov === "on")  return true;
  if (ov === "off") return false;
  const wd = workingDays && workingDays.length ? workingDays : [0,1,2,3,4,5,6];
  return wd.includes(date.getDay());
}

// Count productive days between two dates (inclusive)
function countProductiveDays(startDateStr, endDateStr, workingDays, dateOverrides) {
  if (!startDateStr || !endDateStr) return 0;
  const start = new Date(startDateStr + "T00:00:00");
  const end   = new Date(endDateStr + "T23:59:59");
  if (start > end) return 0;
  let count = 0;
  const current = new Date(start);
  while (current <= end) {
    if (isProductiveDay(current, workingDays, dateOverrides)) count++;
    current.setDate(current.getDate() + 1);
  }
  return count;
}

function snapToShift(tMs, shifts, workingDays, dateOverrides) {
  const active = (shifts || []).filter(s => s.active !== false);
  if (!active.length) return tMs;
  // Check if already inside a shift (also check yesterday for overnight shifts)
  for (let off = -1; off <= 0; off++) {
    const d = new Date(tMs); d.setDate(d.getDate() + off);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (!isProductiveDay(base, workingDays, dateOverrides)) continue;
    for (const sh of getShiftsForDate(base, active))
      if (sh.start <= tMs && sh.end > tMs) return tMs;
  }
  // Find next upcoming shift start (up to 60 days ahead to handle long override-off periods)
  for (let off = 0; off < 60; off++) {
    const d = new Date(tMs); d.setDate(d.getDate() + off);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (!isProductiveDay(base, workingDays, dateOverrides)) continue;
    for (const sh of getShiftsForDate(base, active))
      if (sh.start > tMs) return sh.start;
  }
  return tMs;
}

function addWorkingTime(startMs, durMs, shifts, workingDays, dateOverrides) {
  const active = (shifts || []).filter(s => s.active !== false);
  if (!active.length || durMs <= 0) return startMs + Math.max(0, durMs);
  let t = snapToShift(startMs, active, workingDays, dateOverrides);
  let rem = durMs, g = 0;
  while (rem > 0 && g++ < 5000) {
    let cur = null;
    for (let off = -1; off <= 0 && !cur; off++) {
      const d = new Date(t); d.setDate(d.getDate() + off);
      const base = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      if (isProductiveDay(base, workingDays, dateOverrides))
        cur = getShiftsForDate(base, active).find(sh => sh.start <= t && sh.end > t) || null;
    }
    if (!cur) { t = snapToShift(t + 60000, active, workingDays, dateOverrides); continue; }
    const avail = cur.end - t;
    if (rem <= avail) return t + rem;
    rem -= avail;
    t = snapToShift(cur.end + 1000, active, workingDays, dateOverrides);
  }
  return t;
}

// ════════════════════════════════════════════════════════════════
//  SCHEDULER  (shift-aware)
// ════════════════════════════════════════════════════════════════

function buildSchedule(data, heuristic, lineId, customOrder, startTimeMs, use2opt) {
  const line = data.lines.find(l => l.id === lineId);
  if (!line) return { batches: [], violations: [], kpis: {} };
  const lineOrders = data.orders.filter(o => o.lineId === lineId);
  const shifts = line.shifts || [];
  const wd     = line.workingDays || [0,1,2,3,4,5,6];
  const dOv    = line.dateOverrides || {};

  // --- explode orders into batches ---
  let batches = [];
  lineOrders.forEach(order => {
    const sku = line.skus.find(s => s.id === order.skuId);
    if (!sku) return;
    const bc = Math.ceil(order.qty / sku.batchSize);
    for (let b = 0; b < bc; b++) {
      batches.push({
        id: `${order.id}-B${b+1}`, orderId: order.id, skuId: order.skuId,
        skuName: sku.name, skuFamily: sku.family, batchNum: b+1, batchTotal: bc,
        qty: Math.min(sku.batchSize, order.qty - b * sku.batchSize),
        dueDate: order.dueDate, priority: order.priority,
        value: order.value / bc, stageTimes: sku.stageTimes, color: sku.color,
      });
    }
  });

  // --- ordering ---
  const co = customOrder?.[lineId];
  if (co) {
    batches.sort((a, b) => {
      const ai = co.indexOf(a.id), bi = co.indexOf(b.id);
      return (ai < 0 ? 9999 : ai) - (bi < 0 ? 9999 : bi);
    });
  } else {
    const tot = b => Object.values(b.stageTimes).reduce((s,v)=>s+v,0) * b.qty; // total proc minutes
    if      (heuristic === "EDD")  batches.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
    else if (heuristic === "SPT")  batches.sort((a,b) => tot(a) - tot(b));
    else if (heuristic === "LPT")  batches.sort((a,b) => tot(b) - tot(a));  // Longest Processing Time first
    else if (heuristic === "WSPT") batches.sort((a,b) => (b.priority/tot(b)) - (a.priority/tot(a)));
    else if (heuristic === "CR")   { const now = Date.now(); batches.sort((a,b) => ((new Date(a.dueDate)-now)/tot(a)) - ((new Date(b.dueDate)-now)/tot(b))); }
    else if (heuristic === "MS")   {
      // Modified Slack: lowest slack-per-operation first.
      // slack = dueDate - now - remainingProcTime
      // MS_score = slack / numRemainingOps  (numRemaining proxy = num stages with time > 0)
      // Lower score (or more negative) = more urgent → goes first.
      const now = Date.now();
      const msScore = b => {
        const remProc = tot(b) * 60000; // minutes to ms
        const slack = new Date(b.dueDate).getTime() - now - remProc;
        const numOps = Object.values(b.stageTimes).filter(v => v > 0).length || 1;
        return slack / numOps;
      };
      batches.sort((a,b) => msScore(a) - msScore(b));
    }
    // FIFO: no sort

    // --- BACKLOG PRIORITY BOOST ---
    // SKUs with negative inventory go first (stable sort preserves heuristic order within each group)
    const isBacklog = (skuId) => {
      const sku = line.skus.find(s => s.id === skuId);
      return sku && typeof sku.inventory === "number" && sku.inventory < 0;
    };
    batches.sort((a, b) => {
      const aB = isBacklog(a.skuId) ? 1 : 0;
      const bB = isBacklog(b.skuId) ? 1 : 0;
      return bB - aB; // backlog (1) before non-backlog (0)
    });

    // --- CUSTOM PRIORITY RULES ---
    // For each rule "from before before": move all `from` batches to before any `before` batches
    // (only applies when there's no custom drag-and-drop order)
    if (line.priorityRules?.length) {
      for (const rule of line.priorityRules) {
        if (!rule.from || !rule.before || rule.from === rule.before) continue;
        const firstBeforeIdx = batches.findIndex(b => b.skuId === rule.before);
        if (firstBeforeIdx < 0) continue;
        // Find all `from` batches that come AFTER the first `before` batch
        const misplaced = [];
        for (let i = batches.length - 1; i > firstBeforeIdx; i--) {
          if (batches[i].skuId === rule.from) {
            misplaced.unshift(batches.splice(i, 1)[0]);
          }
        }
        if (misplaced.length) {
          // Re-find insertion point after splices
          const insertAt = batches.findIndex(b => b.skuId === rule.before);
          batches.splice(insertAt, 0, ...misplaced);
        }
      }
    }
  }

  // --- LOOK-AHEAD RESEQUENCING to respect forbidden sequences ---
  // After heuristic sort, reorder to avoid prohibited pairs while keeping
  // heuristic priority as much as possible. If no valid alternative exists,
  // the violation remains and gets reported.
  const isForbidden = (fromSkuId, toSkuId) => {
    if (!fromSkuId || fromSkuId === toSkuId) return false;
    return !!line.forbiddenSequences?.find(f => f.from === fromSkuId && f.to === toSkuId);
  };
  // Build set of SKU-pairs that priority rules require (from must be before before)
  const priRules = line.priorityRules || [];
  // Returns true if placing `skuId` next would violate a priority rule
  // (i.e., there's still a `from` batch waiting in `remaining` while we're trying to schedule its `before`)
  const wouldViolatePriority = (skuId, remaining) => {
    for (const rule of priRules) {
      if (!rule.from || !rule.before || rule.from === rule.before) continue;
      if (skuId !== rule.before) continue;
      if (remaining.some(b => b.skuId === rule.from)) return true;
    }
    return false;
  };
  if ((line.forbiddenSequences?.length || priRules.length) && !co) {
    const remaining = [...batches];
    const sequenced = [];
    let prev = null;

    // Score function: for a given candidate, how good is it as the next pick?
    // Lower score = better. We minimize:
    //   1. Forbidden transition with prev (huge penalty)
    //   2. Priority violation (huge penalty)
    //   3. "Trap risk": picking this candidate would leave us with no way to
    //      continue without forbidden transitions. We approximate this by
    //      counting how many of the REMAINING SKUs after this pick would be
    //      forbidden as successors of `chosen.skuId`.
    const scoreCandidate = (candidate, idx, rem) => {
      // Hard constraint violations come first as huge penalties (in priority order)
      if (isForbidden(prev, candidate.skuId)) return 1e9;
      const remAfter = rem.filter((_, k) => k !== idx);
      if (wouldViolatePriority(candidate.skuId, remAfter)) return 1e8;
      // Soft penalty: count distinct remaining SKUs that would be forbidden after this pick
      const remSkus = new Set(remAfter.map(b => b.skuId));
      let trapRisk = 0;
      remSkus.forEach(rsku => { if (isForbidden(candidate.skuId, rsku)) trapRisk++; });
      // If picking this candidate would block ALL remaining successors, that's catastrophic
      if (remSkus.size > 0 && trapRisk === remSkus.size) trapRisk += 1e6;
      return trapRisk;
    };

    while (remaining.length) {
      // Score all candidates (only the first occurrence of each SKU to save work)
      let bestIdx = 0, bestScore = Infinity;
      const seenSkus = new Set();
      for (let i = 0; i < remaining.length; i++) {
        const cand = remaining[i];
        if (seenSkus.has(cand.skuId)) continue; // same-SKU candidates score equal
        seenSkus.add(cand.skuId);
        const s = scoreCandidate(cand, i, remaining);
        if (s < bestScore) { bestScore = s; bestIdx = i; }
      }
      const [chosen] = remaining.splice(bestIdx, 1);
      sequenced.push(chosen);
      prev = chosen.skuId;
    }
    batches.length = 0;
    batches.push(...sequenced);
  }

  // Initialize violations array (populated after 2-opt with final batch order)
  const violations = [];

  // --- assign operations ---
  // nowMs is the planning start: user-chosen start time, clamped so we don't plan in the past
  const realNow = Date.now();
  const nowMs   = (typeof startTimeMs === "number" && !isNaN(startTimeMs) && startTimeMs > realNow) ? startTimeMs : realNow;
  const t0     = snapToShift(nowMs, shifts, wd, dOv);

  // Helper: simulate scheduling for a given batch order and return Tmax + sumT
  // (lightweight version used by 2-opt; full version below produces ops too)
  function evaluateOrder(orderedBatches) {
    const mA = {}, sA = {}, pSku = {};
    line.machines.forEach(m => { mA[m.id] = t0; });
    line.stages.forEach(s   => { sA[s.id] = t0; });
    let maxT = 0, sumT = 0;
    const sortedStages = line.stages.slice().sort((a,b) => a.order - b.order);
    for (const batch of orderedBatches) {
      let prevEnd = t0, finalEnd = nowMs;
      for (const stage of sortedStages) {
        const sms = line.machines.filter(m => m.stageId === stage.id);
        if (!sms.length) continue;
        const stMins    = (batch.stageTimes[stage.id] || 0) * batch.qty;
        const setupMins = pSku[stage.id] && pSku[stage.id] !== batch.skuId
          ? (line.setupMatrix[`${pSku[stage.id]}|${batch.skuId}`] || 0) : 0;
        const machine   = sms.reduce((best,m) => (mA[m.id]||0) < (mA[best.id]||0) ? m : best, sms[0]);
        const earliest  = Math.max(prevEnd, mA[machine.id]||0, sA[stage.id]||0);
        const setupStartMs = snapToShift(earliest, shifts, wd, dOv);
        const workStartMs  = setupMins > 0 ? addWorkingTime(setupStartMs, setupMins*60000, shifts, wd, dOv) : setupStartMs;
        const opEndMs      = addWorkingTime(workStartMs, stMins*60000, shifts, wd, dOv);
        mA[machine.id] = opEndMs; sA[stage.id] = opEndMs;
        pSku[stage.id]  = batch.skuId; prevEnd = opEndMs; finalEnd = opEndMs;
      }
      const tard = Math.max(0, (finalEnd - new Date(batch.dueDate).getTime()) / 60000);
      if (tard > maxT) maxT = tard;
      sumT += tard;
    }
    return { Tmax: maxT, sumT };
  }

  // Helper: check if a sequence violates forbidden / priority constraints
  function isValidSequence(seq) {
    // Forbidden sequences
    for (let i = 1; i < seq.length; i++) {
      if (seq[i-1].skuId !== seq[i].skuId && isForbidden(seq[i-1].skuId, seq[i].skuId)) return false;
    }
    // Priority rules: from must appear before before
    for (const rule of priRules) {
      if (!rule.from || !rule.before || rule.from === rule.before) continue;
      const firstFromIdx   = seq.findIndex(b => b.skuId === rule.from);
      const firstBeforeIdx = seq.findIndex(b => b.skuId === rule.before);
      if (firstFromIdx >= 0 && firstBeforeIdx >= 0 && firstFromIdx > firstBeforeIdx) return false;
    }
    // Backlog (negative inventory) SKUs must precede non-backlog
    const skuById = Object.fromEntries(line.skus.map(s => [s.id, s]));
    let seenNonBacklog = false;
    for (const b of seq) {
      const sku = skuById[b.skuId];
      const isBack = sku && typeof sku.inventory === "number" && sku.inventory < 0;
      if (isBack && seenNonBacklog) return false;
      if (!isBack) seenNonBacklog = true;
    }
    return true;
  }

  // --- 2-OPT LOCAL SEARCH (post-heuristic optimization) ---
  // Try swapping pairs (i,j) to reduce Tmax. Accept swap only if:
  //   1. Resulting sequence respects forbidden/priority/backlog
  //   2. Tmax decreases (primary) OR Tmax equal AND sumT decreases (secondary)
  // Hard time cap to keep the UI responsive (default 800ms).
  if (use2opt && !co && batches.length >= 2 && batches.length <= 60) { // skip if customOrder or too many batches
    const deadline = Date.now() + 800; // 800 ms cap
    let current = batches.slice();
    let cur = evaluateOrder(current);
    let improved = true;
    let passes = 0, swaps = 0;
    while (improved && Date.now() < deadline && passes < 8) {
      improved = false;
      passes++;
      for (let i = 0; i < current.length - 1; i++) {
        if (Date.now() >= deadline) break;
        for (let j = i + 1; j < current.length; j++) {
          // Skip same-SKU pairs (swap has no effect)
          if (current[i].skuId === current[j].skuId) continue;
          // Try swap
          const candidate = current.slice();
          [candidate[i], candidate[j]] = [candidate[j], candidate[i]];
          if (!isValidSequence(candidate)) continue;
          const evalNew = evaluateOrder(candidate);
          // Accept if Tmax strictly improves, or equal Tmax + sumT improves
          const better = (evalNew.Tmax < cur.Tmax) || (evalNew.Tmax === cur.Tmax && evalNew.sumT < cur.sumT);
          if (better) {
            current = candidate;
            cur = evalNew;
            improved = true;
            swaps++;
            break; // restart from this i
          }
        }
        if (improved) break;
      }
    }
    batches.length = 0;
    batches.push(...current);
    // Stats for diagnostics (attached to violations metadata)
    if (swaps > 0) {
      violations.unshift({ batchId: null, message: `2-opt: ${swaps} mejora(s) aplicada(s) en ${passes} pasada(s). Tmax → ${Math.round(cur.Tmax)}min`, _isInfo: true });
    }
  }

  // --- violation detection (after final ordering) ---
  for (let i = 1; i < batches.length; i++) {
    if (batches[i-1].skuId !== batches[i].skuId) {
      const f = line.forbiddenSequences.find(fs => fs.from === batches[i-1].skuId && fs.to === batches[i].skuId);
      if (f) violations.push({ batchId: batches[i].id, message: `Secuencia prohibida: ${batches[i-1].skuName} → ${batches[i].skuName}. ${f.reason}` });
    }
  }

  const mAvail = {}, sAvail = {}, prevSku = {};
  line.machines.forEach(m => { mAvail[m.id] = t0; });
  line.stages.forEach(s   => { sAvail[s.id] = t0; });

  const scheduled = batches.map(batch => {
    const ops = [];
    let prevEnd = t0;
    line.stages.sort((a,b) => a.order - b.order).forEach(stage => {
      const sms = line.machines.filter(m => m.stageId === stage.id);
      if (!sms.length) return;
      const stMins    = (batch.stageTimes[stage.id] || 0) * batch.qty;
      const setupMins = prevSku[stage.id] && prevSku[stage.id] !== batch.skuId
        ? (line.setupMatrix[`${prevSku[stage.id]}|${batch.skuId}`] || 0) : 0;
      const machine   = sms.reduce((best,m) => (mAvail[m.id]||0) < (mAvail[best.id]||0) ? m : best, sms[0]);
      const earliest  = Math.max(prevEnd, mAvail[machine.id]||0, sAvail[stage.id]||0);
      const setupStartMs = snapToShift(earliest, shifts, wd, dOv);
      const workStartMs  = setupMins > 0 ? addWorkingTime(setupStartMs, setupMins*60000, shifts, wd, dOv) : setupStartMs;
      const opEndMs      = addWorkingTime(workStartMs, stMins*60000, shifts, wd, dOv);
      mAvail[machine.id] = opEndMs; sAvail[stage.id] = opEndMs;
      prevSku[stage.id]  = batch.skuId; prevEnd = opEndMs;
      ops.push({
        stageId: stage.id, stageName: stage.name,
        machineId: machine.id, machineName: machine.name,
        setupTime: setupMins,
        setupStart: new Date(setupStartMs),
        startTime:  new Date(workStartMs),
        endTime:    new Date(opEndMs),
      });
    });
    const finalEnd = ops.length ? ops[ops.length-1].endTime : new Date(nowMs);
    const dueMs = new Date(batch.dueDate).getTime();
    const tard = Math.max(0, (finalEnd.getTime() - dueMs) / 60000);
    // Slack: positive if there's room, negative if already late by the schedule
    const slack = (dueMs - finalEnd.getTime()) / 60000; // minutes; negative = tardy
    return { ...batch, ops, startTime: ops[0]?.setupStart||new Date(nowMs), endTime: finalEnd, tardiness: tard, slack, isLate: tard > 0 };
  });

  const makespan   = scheduled.length ? (Math.max(...scheduled.map(b=>b.endTime.getTime()))-t0)/60000 : 0;
  const totalSetup = scheduled.reduce((s,b) => s + b.ops.reduce((a,o) => a+o.setupTime, 0), 0);
  const lateOrders = [...new Set(scheduled.filter(b=>b.isLate).map(b=>b.orderId))].length;
  // OTIF-focused KPIs
  const Tmax       = scheduled.length ? Math.max(...scheduled.map(b => b.tardiness)) : 0;
  const sumT       = scheduled.reduce((s,b) => s + b.tardiness, 0);
  const onTime     = scheduled.length ? scheduled.filter(b => !b.isLate).length : 0;
  const onTimePct  = scheduled.length ? (onTime / scheduled.length) * 100 : 100;
  // Slack distribution: critical = slack < 120 min (2h), risk = 0-120 min, safe > 120
  const critical = scheduled.filter(b => b.slack < 0).length;
  const risky    = scheduled.filter(b => b.slack >= 0 && b.slack < 120).length;
  const safe     = scheduled.filter(b => b.slack >= 120).length;
  // Minimum slack across all batches (most critical batch)
  const minSlack = scheduled.length ? Math.min(...scheduled.map(b => b.slack)) : 0;
  return { batches: scheduled, violations, kpis: {
    makespan: Math.round(makespan),
    totalSetup: Math.round(totalSetup),
    lateOrders,
    totalBatches: scheduled.length,
    Tmax: Math.round(Tmax),
    sumT: Math.round(sumT),
    onTime, onTimePct: Math.round(onTimePct),
    critical, risky, safe,
    minSlack: Math.round(minSlack)
  }};
}

//  UNCONTROLLED INPUT — keeps focus stable while typing
// ════════════════════════════════════════════════════════════════
// Maintains its own local state, only notifies parent on blur or Enter.
// This prevents focus loss when the parent re-renders during typing.
function NumberInput({ value, onCommit, min, max, step, style, title, placeholder, allowNegative=false }) {
  const [localVal, setLocalVal] = useState(value);
  const lastExternalRef = useRef(value);
  // If external value changes (e.g. due to another field auto-recalc), sync it in
  useEffect(() => {
    if (value !== lastExternalRef.current) {
      lastExternalRef.current = value;
      setLocalVal(value);
    }
  }, [value]);
  const commit = () => {
    const parsed = parseFloat(localVal);
    if (isNaN(parsed)) { setLocalVal(value); return; }
    let final = parsed;
    if (typeof min === "number") final = Math.max(min, final);
    if (typeof max === "number") final = Math.min(max, final);
    if (!allowNegative && final < 0) final = 0;
    if (final !== value) onCommit(final);
    else setLocalVal(value); // re-sync display if final got clamped to same
  };
  return (
    <input
      type="number"
      value={localVal}
      onChange={e => setLocalVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); else if (e.key === "Escape") { setLocalVal(value); e.target.blur(); } }}
      min={min} max={max} step={step}
      style={style}
      title={title}
      placeholder={placeholder}
    />
  );
}

// Same idea for text inputs
function TextInput({ value, onCommit, style, title, placeholder, type="text" }) {
  const [localVal, setLocalVal] = useState(value);
  const lastExternalRef = useRef(value);
  useEffect(() => {
    if (value !== lastExternalRef.current) {
      lastExternalRef.current = value;
      setLocalVal(value);
    }
  }, [value]);
  const commit = () => {
    if (localVal !== value) onCommit(localVal);
  };
  return (
    <input
      type={type}
      value={localVal}
      onChange={e => setLocalVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); else if (e.key === "Escape") { setLocalVal(value); e.target.blur(); } }}
      style={style}
      title={title}
      placeholder={placeholder}
    />
  );
}

// SKU autocomplete: type-to-search by code or name
function SkuAutocomplete({ value, skus, onChange, style, placeholder = "Escribe código o nombre…" }) {
  const selected = skus.find(s => s.id === value);
  const [query, setQuery] = useState(selected ? `${selected.id} — ${selected.name}` : "");
  const [open, setOpen]   = useState(false);
  const [highlightIdx, setHighlightIdx] = useState(0);
  const wrapRef = useRef(null);
  const lastExternalRef = useRef(value);

  // Re-sync when external value changes
  useEffect(() => {
    if (value !== lastExternalRef.current) {
      lastExternalRef.current = value;
      const s = skus.find(x => x.id === value);
      setQuery(s ? `${s.id} — ${s.name}` : "");
    }
  }, [value, skus]);

  // Close dropdown on outside click
  useEffect(() => {
    if (!open) return;
    const onClick = (e) => { if (!wrapRef.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, [open]);

  // Filter: match by id (substring, case-insensitive) OR by name (substring)
  const q = query.trim().toLowerCase();
  const matches = q && (!selected || query !== `${selected.id} — ${selected.name}`)
    ? skus.filter(s => s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)).slice(0, 12)
    : skus.slice(0, 12);

  const choose = (sku) => {
    onChange(sku.id);
    setQuery(`${sku.id} — ${sku.name}`);
    setOpen(false);
    setHighlightIdx(0);
  };

  return (
    <div ref={wrapRef} style={{position:"relative",flex:1,minWidth:160}}>
      <input
        type="text"
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); setHighlightIdx(0); }}
        onFocus={() => { setOpen(true); }}
        onKeyDown={e => {
          if (e.key === "ArrowDown") { e.preventDefault(); setOpen(true); setHighlightIdx(i => Math.min(i+1, matches.length-1)); }
          else if (e.key === "ArrowUp") { e.preventDefault(); setHighlightIdx(i => Math.max(i-1, 0)); }
          else if (e.key === "Enter") { e.preventDefault(); if (matches[highlightIdx]) choose(matches[highlightIdx]); }
          else if (e.key === "Escape") { setOpen(false); const s = skus.find(x => x.id === value); setQuery(s ? `${s.id} — ${s.name}` : ""); }
        }}
        placeholder={placeholder}
        style={{...style, width:"100%"}}
      />
      {open && matches.length > 0 && (
        <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,maxWidth:380,background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:6,boxShadow:"0 8px 24px rgba(0,0,0,.4)",zIndex:50,maxHeight:240,overflowY:"auto"}}>
          {matches.map((s, i) => (
            <div
              key={s.id}
              onMouseDown={(e) => { e.preventDefault(); choose(s); }}
              onMouseEnter={() => setHighlightIdx(i)}
              style={{
                padding:"6px 10px",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",
                display:"flex",alignItems:"center",gap:8,
                background: i === highlightIdx ? "rgba(245,158,11,.12)" : "transparent",
                borderBottom: i === matches.length - 1 ? "none" : "1px solid var(--border)"
              }}>
              <span style={{display:"inline-block",width:7,height:7,borderRadius:2,background:s.color,flexShrink:0}}/>
              <span style={{color:"var(--text-dim)",minWidth:80}}>{s.id}</span>
              <span style={{color:"var(--text)",flex:1}}>{s.name}</span>
              {typeof s.inventory === "number" && s.inventory < 0 && <span style={{color:"#F87171",fontSize:9,padding:"1px 4px",background:"rgba(248,113,113,.1)",borderRadius:3}}>BACKLOG</span>}
            </div>
          ))}
        </div>
      )}
      {open && matches.length === 0 && q && (
        <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:6,padding:"8px 12px",fontSize:11,color:"var(--text-dim)",zIndex:50,fontFamily:"'DM Mono',monospace"}}>
          Sin coincidencias. Verifica el código o nombre.
        </div>
      )}
    </div>
  );
}

//  PRODUCTION CALENDAR — month grid for selecting working days
// ════════════════════════════════════════════════════════════════
function ProductionCalendar({ line, onToggle, onClear, dailyGoals, viewMonth, setViewMonth }) {
  const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,"0")}-${String(new Date().getDate()).padStart(2,"0")}`;
  const overrides = line.dateOverrides || {};
  const wd = line.workingDays || [0,1,2,3,4,5,6];
  // Build the 6-week grid (always 42 cells, Mon-first)
  const firstOfMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  // Days from Monday: 0=Mon, 6=Sun. JS getDay: 0=Sun, 1=Mon, ..., 6=Sat
  const firstDayOfWeek = (firstOfMonth.getDay() + 6) % 7; // shift so Monday=0
  const days = [];
  const startDate = new Date(firstOfMonth);
  startDate.setDate(startDate.getDate() - firstDayOfWeek);
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const inCurrentMonth = d.getMonth() === viewMonth.getMonth();
    const defaultOn = wd.includes(d.getDay());
    const override = overrides[dateStr];
    const productive = override === "on" ? true : override === "off" ? false : defaultOn;
    const isOverride = override !== undefined;
    const isToday = dateStr === todayStr;
    const hasGoal = dailyGoals?.[dateStr] !== undefined && dailyGoals[dateStr] > 0;
    days.push({ d, dateStr, dayNum: d.getDate(), inCurrentMonth, productive, isOverride, isToday, hasGoal });
  }
  const prevMonth = () => setViewMonth(m => new Date(m.getFullYear(), m.getMonth()-1, 1));
  const nextMonth = () => setViewMonth(m => new Date(m.getFullYear(), m.getMonth()+1, 1));
  const goToday = () => { const t = new Date(); setViewMonth(new Date(t.getFullYear(), t.getMonth(), 1)); };
  const monthLabel = viewMonth.toLocaleDateString("es-CO", { month: "long", year: "numeric" });
  const overrideCount = Object.keys(overrides).length;
  return (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:9,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {days.map((day, i) => {
          const bg = day.productive
            ? (day.isOverride ? "rgba(52,211,153,.18)" : "rgba(52,211,153,.06)")
            : (day.isOverride ? "rgba(107,122,154,.18)" : "var(--surface-2)");
          const fg = day.productive ? "#34D399" : "var(--text-dim)";
          const opacity = day.inCurrentMonth ? 1 : 0.35;
          return (
            <button
              key={i}
              onClick={() => onToggle(day.dateStr)}

              style={{
                position:"relative",
                padding:"10px 6px",

              <span>{day.dayNum}</span>
              {day.isOverride && <span style={{position:"absolute",top:3,right:5,width:5,height:5,borderRadius:"50%",background:day.productive?"#34D399":"#F87171"}}/>}
              {day.hasGoal && <span style={{position:"absolute",bottom:3,left:5,fontSize:8,color:"#F59E0B"}}>$</span>}
            </button>
          );
        })}
      </div>
      <div style={{marginTop:12,display:"flex",gap:14,flexWrap:"wrap",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"rgba(52,211,153,.06)",marginRight:5,verticalAlign:"middle"}}/>Productivo (patrón)</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"rgba(52,211,153,.18)",marginRight:5,verticalAlign:"middle",border:"1px solid #34D399"}}/>Productivo (excepción)</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"var(--surface-2)",marginRight:5,verticalAlign:"middle"}}/>No productivo (patrón)</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"rgba(107,122,154,.18)",marginRight:5,verticalAlign:"middle",border:"1px solid #F87171"}}/>No productivo (excepción)</span>
        <span style={{color:"#F59E0B"}}>$ = día con meta</span>
      </div>
      <div style={{marginTop:8,fontSize:11,color:"var(--text-muted)",lineHeight:1.5}}>
        <strong style={{color:"var(--text)"}}>Click un día</strong> para cambiar su estado. El patrón semanal (configurado abajo) define el valor por defecto; el calendario lo sobrescribe día por día. Los cambios afectan automáticamente al Gantt y a las metas de facturación.
      </div>
    </div>
  );
}

const DAY_NAMES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const fmtDayKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

// Decide if a given date is a working day for the line, considering:
// 1) The line's weekly pattern (workingDays array of day-of-week 0-6)
// 2) Per-date overrides in line.dateOverrides ("on" forces productive, "off" forces non-productive)
function isWorkingDate(dateStr, line) {
  if (!line) return true;
  const overrides = line.dateOverrides || {};
  if (overrides[dateStr] === "on")  return true;
  if (overrides[dateStr] === "off") return false;
  const d = new Date(dateStr + "T12:00:00");
  const wd = line.workingDays && line.workingDays.length ? line.workingDays : [0,1,2,3,4,5,6];
  return wd.includes(d.getDay());
}

function PriorityDots({ n }) {
  return <div style={{display:"flex",gap:3}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i<=n?"#FBBF24":"var(--border-2)"}}/>)}</div>;
}

// ════════════════════════════════════════════════════════════════
//  APP

function App() {
  // ─── LocalStorage Persistence ───────────────────────────────
  const STORAGE_KEY = "prodScheduler_v4_data";
  const STORAGE_META = "prodScheduler_v4_meta";
  const loadPersisted = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      // Sanity check: must have lines and orders
      if (!parsed.lines || !Array.isArray(parsed.lines) || !Array.isArray(parsed.orders)) return null;
      return parsed;
    } catch (e) { console.warn("Could not load saved data:", e); return null; }
  };
  const loadPersistedMeta = () => {
    try { const raw = localStorage.getItem(STORAGE_META); return raw ? JSON.parse(raw) : {}; }
    catch (e) { return {}; }
  };
  const initialData  = loadPersisted() || INITIAL_DATA;
  const initialMeta  = loadPersistedMeta();
  const [data,           setData]           = useState(initialData);
  const [lastSaved,      setLastSaved]      = useState(initialMeta.lastSaved || null);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [calendarViewMonth, setCalendarViewMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [showAiPanel, setShowAiPanel] = useState(() => {
    const v = localStorage.getItem("prodScheduler_v4_showAi");
    return v === null ? true : v === "true";
  });
  useEffect(() => { localStorage.setItem("prodScheduler_v4_showAi", String(showAiPanel)); }, [showAiPanel]);
  const [themeMode, setThemeMode] = useState(() => {
    try { return localStorage.getItem("prodScheduler_v4_theme") || "dark"; }
    catch (e) { return "dark"; }
  });
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", themeMode);
    try { localStorage.setItem("prodScheduler_v4_theme", themeMode); } catch(e){}
  }, [themeMode]);
  const toggleTheme = () => setThemeMode(m => m === "dark" ? "light" : "dark");

  // ─── Horizonte de facturación ─────────────────────────────────
  const [showHorizonModal, setShowHorizonModal] = useState(false);
  const [horizonStart, setHorizonStart] = useState(() => {
    const t = new Date(); return t.toISOString().slice(0,10);
  });
  const [horizonEnd, setHorizonEnd] = useState(() => {
    const t = new Date(); t.setDate(t.getDate()+6); return t.toISOString().slice(0,10);
  });
  const [horizonDefault, setHorizonDefault] = useState(80000);
  const handleApplyHorizon = () => {
    const start = new Date(horizonStart+"T12:00:00");
    const end = new Date(horizonEnd+"T12:00:00");
    if (isNaN(start) || isNaN(end) || end < start) { alert("Rango inválido. La fecha final debe ser igual o posterior a la inicial."); return; }
    const lid = activeLine;
    let added = 0, skipped = 0;
    mutate(d => {
      if (!d.dailyGoals) d.dailyGoals = {};
      if (!d.dailyGoals[lid]) d.dailyGoals[lid] = {};
      const lineObj = d.lines.find(l => l.id === lid);
      const cur = new Date(start);
      while (cur <= end) {
        const key = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
        // Use isProductiveDay - respects both weekly pattern AND date overrides
        if (isProductiveDay(cur, lineObj.workingDays, lineObj.dateOverrides)) {
          if (d.dailyGoals[lid][key] === undefined) {
            d.dailyGoals[lid][key] = horizonDefault;
            added++;
          } else {
            skipped++;
          }
        }
        cur.setDate(cur.getDate()+1);
      }
    });
    setShowHorizonModal(false);
    if (added === 0 && skipped > 0) {
      setTimeout(() => alert(`No se agregaron metas nuevas. Los ${skipped} días productivos en este rango ya tenían metas. Para editarlas o borrarlas, usa la tabla en la pestaña Metas.`), 100);
    }
  };

  // Auto-save: persist data to localStorage on every change (debounced)
  const saveTimerRef = useRef(null);
  useEffect(() => {
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        const now = new Date().toISOString();
        localStorage.setItem(STORAGE_META, JSON.stringify({ lastSaved: now }));
        setLastSaved(now);
      } catch (e) { console.warn("Could not save data:", e); }
    }, 800); // debounce 800ms so we don't write on every keystroke
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [data]);

  const handleResetData = () => {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_META);
    setData(INITIAL_DATA);
    setLastSaved(null);
    setShowResetConfirm(false);
  };
  const handleExportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `scheduler-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const handleImportData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.lines || !Array.isArray(parsed.lines)) { alert("Archivo inválido: no contiene 'lines'."); return; }
        if (confirm("¿Reemplazar datos actuales con los del archivo? Esta acción no se puede deshacer.")) {
          setData(parsed);
        }
      } catch (err) { alert("Error al leer JSON: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = ""; // reset input
  };

  // ─── Excel Template Download/Import (SKUs & Machines) ────────
  const handleDownloadTemplate = () => {
    if (typeof XLSX === "undefined") { alert("Librería Excel aún cargando, intenta en un segundo."); return; }
    const lineId = activeLine;
    const lineObj = data.lines.find(l => l.id === lineId);
    const stageNames = lineObj.stages.sort((a,b)=>a.order-b.order).map(s => `${s.name} (min)`);

    // SKUs sheet headers - NO color (auto-assigned), include unitValue and inventory
    const skusHeader = ["ID","Nombre","Familia","Lote (pzs)","Valor unitario (COP)","Inventario (negativo = backlog)", ...stageNames];
    const skusRows = lineObj.skus.map(s => {
      const times = lineObj.stages.sort((a,b)=>a.order-b.order).map(st => s.stageTimes?.[st.id] || 0);
      return [s.id, s.name, s.family, s.batchSize, s.unitValue || 0, s.inventory || 0, ...times];
    });
    if (!skusRows.length) skusRows.push(["SKU-NEW","Producto ejemplo","General",1,1500000, 0, ...stageNames.map(()=>30)]);

    // Machines sheet
    const machinesHeader = ["ID","Nombre","Etapa (ID)","Etapa (nombre — referencia)","Cap./hora"];
    const machinesRows = lineObj.machines.map(m => {
      const st = lineObj.stages.find(x => x.id === m.stageId);
      return [m.id, m.name, m.stageId, st?.name || "", m.capacityPerHour];
    });
    if (!machinesRows.length) machinesRows.push(["M-NEW","Máquina ejemplo", lineObj.stages[0]?.id || "S1", lineObj.stages[0]?.name || "", 10]);

    // Reference sheet listing stages
    const refHeader = ["ID Etapa","Nombre","Orden"];
    const refRows = lineObj.stages.sort((a,b)=>a.order-b.order).map(s => [s.id, s.name, s.order]);

    // Build workbook
    const wb = XLSX.utils.book_new();
    const wsSku = XLSX.utils.aoa_to_sheet([skusHeader, ...skusRows]);
    const wsMch = XLSX.utils.aoa_to_sheet([machinesHeader, ...machinesRows]);
    const wsRef = XLSX.utils.aoa_to_sheet([
      ["Etapas disponibles en " + lineObj.name],
      [],
      refHeader,
      ...refRows,
      [],
      ["INSTRUCCIONES:"],
      ["1. Edita las hojas 'SKUs' y 'Máquinas' con tus datos."],
      ["2. SKUs: la columna 'Valor unitario (COP)' es el precio por pieza."],
      ["3. SKUs: 'Inventario' es el stock inicial. Valores negativos = backlog con cliente y se programan primero."],
      ["4. Las órdenes de producción calcularán su valor total automáticamente como cantidad × valor unitario."],
      ["5. El color de cada SKU se asigna automáticamente al importar."],
      ["6. En 'Máquinas', usa el ID de etapa (columna C) - no el nombre."],
      ["7. La columna ID debe ser única dentro de cada hoja."],
      ["8. Para nuevos registros, deja ID vacío - se autogenerará uno."],
      ["9. Los tiempos de etapa (SKUs) son minutos por unidad."],
      ["10. Sube este archivo desde el botón 'Importar Excel' en la app."]
    ]);
    XLSX.utils.book_append_sheet(wb, wsSku, "SKUs");
    XLSX.utils.book_append_sheet(wb, wsMch, "Máquinas");
    XLSX.utils.book_append_sheet(wb, wsRef, "Referencia");
    XLSX.writeFile(wb, `plantilla-${lineObj.name.toLowerCase().replace(/[^a-z0-9]/g,"-")}-${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const handleImportExcel = (e) => {
    if (typeof XLSX === "undefined") { alert("Librería Excel aún cargando, intenta en un segundo."); return; }
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type: "array" });
        const lid = activeLine;
        let skusAdded = 0, skusUpdated = 0, machinesAdded = 0, machinesUpdated = 0;

        mutate(d => {
          const li = d.lines.findIndex(l => l.id === lid);
          const lineObj = d.lines[li];
          const stagesOrdered = lineObj.stages.sort((a,b)=>a.order-b.order);

          // SKUs sheet
          if (wb.Sheets["SKUs"]) {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets["SKUs"], { header: 1, defval: "" });
            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              if (!row || row.every(c => c === "" || c == null)) continue;
              const [id, name, family, batchSize, unitValue, inventory, ...times] = row;
              if (!name || String(name).trim() === "") continue;
              const stageTimes = {};
              stagesOrdered.forEach((s, idx) => {
                const v = parseInt(times[idx]);
                stageTimes[s.id] = isNaN(v) ? 0 : Math.max(0, v);
              });
              const existingIdx = lineObj.skus.findIndex(s => s.id === (id && String(id).trim()));
              // Reuse existing color if updating; otherwise auto-assign next palette color
              const assignedColor = existingIdx >= 0
                ? lineObj.skus[existingIdx].color
                : nextPaletteColor(lineObj.skus);
              const skuObj = {
                id: id && String(id).trim() ? String(id).trim() : "SKU-" + (Date.now()%100000 + i),
                name: String(name).trim(),
                family: family ? String(family).trim() : "General",
                batchSize: Math.max(1, parseInt(batchSize) || 1),
                unitValue: Math.max(0, parseFloat(unitValue) || 0),
                inventory: isNaN(parseInt(inventory)) ? 0 : parseInt(inventory),
                color: assignedColor,
                stageTimes
              };
              if (existingIdx >= 0) { lineObj.skus[existingIdx] = skuObj; skusUpdated++; }
              else { lineObj.skus.push(skuObj); skusAdded++; }
            }
          }

          // Machines sheet
          if (wb.Sheets["Máquinas"]) {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets["Máquinas"], { header: 1, defval: "" });
            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              if (!row || row.every(c => c === "" || c == null)) continue;
              const [id, name, stageId, _stageName, capacity] = row;
              if (!name || String(name).trim() === "") continue;
              const validStageId = lineObj.stages.find(s => s.id === String(stageId).trim());
              if (!validStageId) { console.warn(`Etapa "${stageId}" no existe, máquina "${name}" ignorada`); continue; }
              const mObj = {
                id: id && String(id).trim() ? String(id).trim() : "M-" + (Date.now()%100000 + i),
                name: String(name).trim(),
                stageId: validStageId.id,
                capacityPerHour: Math.max(1, parseInt(capacity) || 10)
              };
              const existing = lineObj.machines.findIndex(m => m.id === mObj.id);
              if (existing >= 0) { lineObj.machines[existing] = mObj; machinesUpdated++; }
              else { lineObj.machines.push(mObj); machinesAdded++; }
            }
          }
        });

        const summary = [];
        if (skusAdded) summary.push(`${skusAdded} SKU(s) nuevos`);
        if (skusUpdated) summary.push(`${skusUpdated} SKU(s) actualizados`);
        if (machinesAdded) summary.push(`${machinesAdded} máquina(s) nueva(s)`);
        if (machinesUpdated) summary.push(`${machinesUpdated} máquina(s) actualizada(s)`);
        alert(summary.length ? "Importación exitosa:\n" + summary.join("\n") : "El archivo no contenía datos nuevos.");
      } catch (err) {
        console.error(err);
        alert("Error al leer Excel: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };


  const [activeLine,     setActiveLine]     = useState("L1");
  const [heuristic,      setHeuristic]      = useState("MS");
  const [use2opt, setUse2opt] = useState(() => {
    const v = localStorage.getItem("prodScheduler_v4_use2opt");
    return v === null ? true : v === "true";
  });
  useEffect(() => { localStorage.setItem("prodScheduler_v4_use2opt", String(use2opt)); }, [use2opt]);
  const [activeTab,      setActiveTab]      = useState("gantt");
  const [planView,       setPlanView]       = useState("chrono"); // chrono | byday | bymachine
  const [seqPanelOpen,   setSeqPanelOpen]   = useState(() => {
    const v = localStorage.getItem("prodScheduler_v4_seqPanelOpen");
    return v === null ? true : v === "true";
  });
  useEffect(() => { localStorage.setItem("prodScheduler_v4_seqPanelOpen", String(seqPanelOpen)); }, [seqPanelOpen]);
  const [activeConfigTab,setActiveConfigTab]= useState("stages");
  const [customOrder,    setCustomOrder]    = useState({ L1: null, L2: null });
  const [dragId,         setDragId]         = useState(null);
  const [dragOver,       setDragOver]       = useState(null);
  const [aiMessages,     setAiMessages]     = useState([{ role:"assistant", content:"Hola. Soy tu asistente de programación.\n\nNuevos comandos disponibles:\n• \"Activa turno nocturno 22:00-06:00 en Comedores\"\n• \"Meta del 22-mayo en Sofás: $120,000\"\n• \"Días hábiles de Comedores: lunes a sábado\"\n• \"Agrega turno nocturno a Comedores\"\n• \"Cambia heurística a WSPT\"\n\nY los anteriores: órdenes, setup, lotes, secuencias, máquinas, etc." }]);
  const [aiInput,        setAiInput]        = useState("");
  const [isAiLoading,    setIsAiLoading]    = useState(false);
  const chatRef = useRef(null);

  // Planning start time: null = use Date.now(), or a future ISO date string ("2026-05-25T08:00")
  // Stored per-line so the user can plan different lines from different dates.
  const [planStartByLine, setPlanStartByLine] = useState({});
  const planStartStr = planStartByLine[activeLine] || "";
  const planStartMs  = planStartStr ? new Date(planStartStr).getTime() : null;
  // Clamp: only future starts are honored (past dates fall back to Date.now() in buildSchedule)
  const planStartActive = planStartMs && planStartMs > Date.now();
  const setPlanStart = (val) => setPlanStartByLine(p => ({ ...p, [activeLine]: val || "" }));

  const schedule = useMemo(() => buildSchedule(data, heuristic, activeLine, customOrder, planStartMs, use2opt), [data, heuristic, activeLine, customOrder, planStartMs, use2opt]);
  const line     = data.lines.find(l => l.id === activeLine);
  useEffect(() => { chatRef.current?.scrollIntoView({ behavior:"smooth" }); }, [aiMessages]);

  // Per-day projected value per line
  const projectedByDay = useMemo(() => {
    const res = {};
    data.lines.forEach(l => {
      res[l.id] = {};
      const lineStartStr = planStartByLine[l.id] || "";
      const lineStartMs  = lineStartStr ? new Date(lineStartStr).getTime() : null;
      buildSchedule(data, heuristic, l.id, customOrder, lineStartMs, use2opt).batches.forEach(b => {
        const key = fmtDayKey(b.endTime);
        res[l.id][key] = (res[l.id][key]||0) + b.value;
      });
    });
    return res;
  }, [data, heuristic, customOrder, planStartByLine, use2opt]);

  const todayKey    = fmtDayKey(new Date());
  const todayGoal   = data.dailyGoals?.[activeLine]?.[todayKey] || 0;
  const todayProj   = projectedByDay[activeLine]?.[todayKey] || 0;
  const todayPct    = todayGoal > 0 ? Math.min(100,(todayProj/todayGoal)*100) : 0;
  const todayColor  = todayGoal===0?"var(--text-dim)":todayPct>=100?"#34D399":todayPct>=70?"#FBBF24":"#F87171";
  const totalValue  = data.orders.reduce((s,o)=>s+o.value,0);
  const billingPct  = data.billingGoal>0 ? Math.min(100,(totalValue/data.billingGoal)*100) : 0;

  // ─── Mutation helper ────────────────────────────────────────

  const handleAddStage = useCallback(lid => mutate(d => {

    d.lines[li].stages.push({ id: "S" + (Date.now()%100000), name: "Nueva Etapa", order: maxOrd + 1 });

  const handleRemoveStage = useCallback((lid, sid) => mutate(d => {

  const handleAddMachine = useCallback(lid => mutate(d => {

  const handleRemoveMachine = useCallback((lid, mid) => mutate(d => {

  const handleUpdateSkuStageTime = useCallback((lid, sid, stageId, val) => mutate(d => {
    const li = d.lines.findIndex(l => l.id === lid);
    const si = d.lines[li].skus.findIndex(s => s.id === sid);
    if (si >= 0) {
      if (!d.lines[li].skus[si].stageTimes) d.lines[li].skus[si].stageTimes = {};

  // Color palette for auto-assignment (10 distinct colors)
  const SKU_PALETTE = ["#E07B39","#3A7BD5","#6B7A8D","#C9A84C","#2E86AB","#A23B72","#48CAE4","#F4A261","#88B04B","#D4A5A5"];
  const nextPaletteColor = (existingSkus) => {
    const used = new Set(existingSkus.map(s => s.color));
    return SKU_PALETTE.find(c => !used.has(c)) || SKU_PALETTE[existingSkus.length % SKU_PALETTE.length];

  const handleAddSku = useCallback(lid => mutate(d => {
    const li = d.lines.findIndex(l => l.id === lid);

    d.lines[li].stages.forEach(s => { stageTimes[s.id] = 30; });
    d.lines[li].skus.push({

  const handleUpdateSetup = useCallback((lid, from, to, mins) => mutate(d => {

  // ─── CRUD: Orders ─────────────────────────────────────────────
  const handleUpdateOrder = useCallback((oid, field, val) => mutate(d => {
    const oi = d.orders.findIndex(o => o.id === oid);
    if (oi < 0) return;
    const order = d.orders[oi];
    if (field === "qty") {
      order.qty = Math.max(0, parseFloat(val)||0);
      // Auto-recalc value if SKU has unitValue
      const line = d.lines.find(l => l.id === order.lineId);
      const sku = line?.skus.find(s => s.id === order.skuId);
      if (sku?.unitValue > 0) order.value = order.qty * sku.unitValue;
    } else if (field === "batches") {
      // Convert batches → qty
      const line = d.lines.find(l => l.id === order.lineId);
      const sku = line?.skus.find(s => s.id === order.skuId);
      const bs = sku?.batchSize || 1;
      const batches = Math.max(0, parseFloat(val)||0);
      order.qty = batches * bs;
      if (sku?.unitValue > 0) order.value = order.qty * sku.unitValue;
    } else if (field === "skuId") {
      order.skuId = val;
      // Recalc value with new SKU's unitValue
      const line = d.lines.find(l => l.id === order.lineId);
      const sku = line?.skus.find(s => s.id === val);
      if (sku?.unitValue > 0) order.value = order.qty * sku.unitValue;
    } else if (field === "value") {
      order.value = Math.max(0, parseFloat(val)||0);
    } else if (field === "priority") {
      order.priority = Math.max(1, Math.min(5, parseInt(val)||1));
    } else {
      order[field] = val;
    }
  }), [mutate]);
  const handleAddOrder = useCallback(lid => mutate(d => {
    const lineSkus = d.lines.find(l => l.id === lid)?.skus || [];
    if (!lineSkus.length) return;
    const due = new Date(); due.setDate(due.getDate() + 3); due.setHours(17, 0, 0, 0);
    const dueStr = `${due.getFullYear()}-${String(due.getMonth()+1).padStart(2,"0")}-${String(due.getDate()).padStart(2,"0")}T${String(due.getHours()).padStart(2,"0")}:${String(due.getMinutes()).padStart(2,"0")}`;
    const firstSku = lineSkus[0];
    const defaultQty = firstSku.batchSize || 4;
    const defaultValue = (firstSku.unitValue || 0) * defaultQty;
    d.orders.push({
      id: "OP" + String(d.orders.length + 1).padStart(3,"0") + (Date.now()%100),
      lineId: lid, skuId: firstSku.id, qty: defaultQty, dueDate: dueStr,
      value: defaultValue, priority: 3, status: "pending"
    });
  }), [mutate]);

  // Download Excel template for bulk orders import
  const handleDownloadOrdersTemplate = useCallback((lid) => {
    const lineObj = data.lines.find(l => l.id === lid);
    if (!lineObj) return;
    const header = ["Código SKU", "Cantidad (pzs)", "Fecha compromiso", "Prioridad (1-5)", "Valor unitario (COP, opcional)"];
    // Pre-fill 2 example rows using the line's first SKUs
    const futureDate = new Date(); futureDate.setDate(futureDate.getDate() + 7);
    const futureStr  = `${futureDate.getFullYear()}-${String(futureDate.getMonth()+1).padStart(2,"0")}-${String(futureDate.getDate()).padStart(2,"0")}`;
    const examples = lineObj.skus.slice(0, 2).map((sku, i) => [
      sku.id, sku.batchSize * (i + 1), futureStr, 3, sku.unitValue || ""
    ]);
    if (!examples.length) examples.push(["SKU-EJEMPLO", 10, futureStr, 3, ""]);
    // Reference sheet listing valid SKU codes
    const skuRef = [["Código", "Nombre", "Familia", "Lote (pzs)", "Valor unit (COP)"], ...lineObj.skus.map(s => [s.id, s.name, s.family, s.batchSize, s.unitValue || 0])];
    const wb = XLSX.utils.book_new();
    const wsOrders = XLSX.utils.aoa_to_sheet([header, ...examples]);
    wsOrders["!cols"] = [{wch:18},{wch:14},{wch:18},{wch:14},{wch:22}];
    const wsRef = XLSX.utils.aoa_to_sheet([
      ["INSTRUCCIONES:"],
      ["1. Llena la hoja 'Órdenes' con una orden por fila."],
      ["2. Código SKU: debe coincidir EXACTAMENTE con uno de la hoja 'SKUs disponibles'."],
      ["3. Cantidad: piezas a producir (entero positivo)."],
      ["4. Fecha compromiso: formato YYYY-MM-DD o YYYY-MM-DD HH:MM. Ej: 2026-06-15 o 2026-06-15 17:00"],
      ["5. Prioridad: 1 (baja) a 5 (crítica). Si vacía, se usa 3."],
      ["6. Valor unitario: opcional. Si vacío, se toma del SKU; si se especifica, sobrescribe el cálculo automático."],
      ["7. Las órdenes existentes NO se borran; las nuevas se agregan con ID auto-generado."],
      [],
      [`Línea: ${lineObj.name}`],
      [`Fecha de generación: ${new Date().toISOString().split("T")[0]}`],
      [],
      ["SKUs disponibles en esta línea:"],
      ...skuRef
    ]);
    wsRef["!cols"] = [{wch:18},{wch:32},{wch:14},{wch:12},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsOrders, "Órdenes");
    XLSX.utils.book_append_sheet(wb, wsRef, "SKUs disponibles");
    XLSX.writeFile(wb, `plantilla-ordenes-${lineObj.id}-${new Date().toISOString().split("T")[0]}.xlsx`);
  }, [data]);

  // Import orders from Excel
  const handleImportOrders = useCallback((lid, event) => {
    const file = event.target.files?.[0];
    event.target.value = ""; // reset so same file can be re-uploaded
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
        // Find the orders sheet — prefer "Órdenes", else first sheet
        const sheetName = wb.SheetNames.find(n => /orden/i.test(n)) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: "" });
        if (rows.length < 2) { alert("El archivo está vacío o sin filas de datos."); return; }
        // Detect header: skip first row if it contains text in col 0
        const hasHeader = typeof rows[0][0] === "string" && /sku|c[óo]digo/i.test(rows[0][0]);
        const dataRows = hasHeader ? rows.slice(1) : rows;

        mutate(d => {
          const lineObj = d.lines.find(l => l.id === lid);
          if (!lineObj) return;
          const skuMap = new Map(lineObj.skus.map(s => [s.id.toLowerCase(), s]));
          let added = 0, skipped = 0;
          const errors = [];

          dataRows.forEach((row, idx) => {
            const rowNum = (hasHeader ? idx + 2 : idx + 1);
            const [skuRaw, qtyRaw, dueRaw, prioRaw, unitValRaw] = row;
            const skuKey = String(skuRaw || "").trim().toLowerCase();
            if (!skuKey) { return; } // silently skip blank rows
            const sku = skuMap.get(skuKey);
            if (!sku) { errors.push(`Fila ${rowNum}: SKU "${skuRaw}" no existe en la línea.`); skipped++; return; }

            const qty = parseInt(qtyRaw);
            if (isNaN(qty) || qty <= 0) { errors.push(`Fila ${rowNum}: cantidad inválida (${qtyRaw}).`); skipped++; return; }

            // Parse due date — accept Date object, "YYYY-MM-DD", "YYYY-MM-DD HH:MM", "DD/MM/YYYY"
            let dueDateStr = "";
            if (dueRaw instanceof Date && !isNaN(dueRaw)) {
              const z = n => String(n).padStart(2,"0");
              const h = dueRaw.getHours() === 0 && dueRaw.getMinutes() === 0 ? "17" : z(dueRaw.getHours());
              const m = dueRaw.getHours() === 0 && dueRaw.getMinutes() === 0 ? "00" : z(dueRaw.getMinutes());
              dueDateStr = `${dueRaw.getFullYear()}-${z(dueRaw.getMonth()+1)}-${z(dueRaw.getDate())}T${h}:${m}`;
            } else if (typeof dueRaw === "string" || typeof dueRaw === "number") {
              const s = String(dueRaw).trim();
              // Try various formats
              let parsed;
              if (/^\d{4}-\d{2}-\d{2}/.test(s)) parsed = new Date(s.includes("T") || s.includes(" ") ? s.replace(" ", "T") : s + "T17:00");
              else if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)) { const [d1,m1,y1] = s.split(/[\s\/]/); parsed = new Date(`${y1}-${String(m1).padStart(2,"0")}-${String(d1).padStart(2,"0")}T17:00`); }
              else parsed = new Date(s);
              if (parsed && !isNaN(parsed)) {
                const z = n => String(n).padStart(2,"0");
                dueDateStr = `${parsed.getFullYear()}-${z(parsed.getMonth()+1)}-${z(parsed.getDate())}T${z(parsed.getHours())}:${z(parsed.getMinutes())}`;
              }
            }
            if (!dueDateStr) { errors.push(`Fila ${rowNum}: fecha inválida (${dueRaw}). Usa formato YYYY-MM-DD.`); skipped++; return; }

            const priority = Math.max(1, Math.min(5, parseInt(prioRaw) || 3));
            const unitVal = parseFloat(unitValRaw);
            const effectiveUnitVal = !isNaN(unitVal) && unitVal > 0 ? unitVal : (sku.unitValue || 0);
            const value = qty * effectiveUnitVal;

            d.orders.push({
              id: "OP" + String(d.orders.length + 1).padStart(3,"0") + ((Date.now()%100) + added),
              lineId: lid,
              skuId: sku.id,
              qty,
              dueDate: dueDateStr,
              value,
              priority,
              status: "pending"
            });
            added++;
          });

          // Show result summary
          let msg = `✓ ${added} orden(es) agregada(s).`;
          if (skipped > 0) msg += `\n⚠ ${skipped} fila(s) omitida(s):`;
          if (errors.length > 0) msg += "\n\n" + errors.slice(0, 10).join("\n") + (errors.length > 10 ? `\n…y ${errors.length-10} más.` : "");
          setTimeout(() => alert(msg), 100);
        });
      } catch (err) {
        console.error(err);
        alert("Error al leer el archivo: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }, [mutate]);

  const handleRemoveOrder = useCallback(oid => mutate(d => {

    const nxt=[...ids], fi=nxt.indexOf(dragId);
    if(fi<0){setDragId(null);setDragOver(null);return;}
    nxt.splice(fi,1); nxt.splice(targetIdx,0,dragId);

  // ─── AI ─────────────────────────────────────────────────────
  // API key for Anthropic - stored in localStorage (browser only, user-provided)
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem("prodScheduler_v4_anthropicKey") || ""; }
    catch (e) { return ""; }
  });
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const handleSaveApiKey = (k) => {
    const trimmed = (k||"").trim();
    if (trimmed) {
      try { localStorage.setItem("prodScheduler_v4_anthropicKey", trimmed); } catch(e){}
      setApiKey(trimmed);
    } else {
      try { localStorage.removeItem("prodScheduler_v4_anthropicKey"); } catch(e){}
      setApiKey("");

    setShowApiKeyModal(false);
  };

  const sendAI = useCallback(async () => {
    if(!aiInput.trim()||isAiLoading) return;
    if(!apiKey) {
      setAiMessages(p=>[...p,{role:"assistant",content:"⚠ Necesitas una API key de Anthropic para usar el asistente. Click el ícono 🔑 arriba para configurarla."}]);
      setShowApiKeyModal(true);
