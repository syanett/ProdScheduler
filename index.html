                ))}
                {/* batch bars */}
                {ordered.filter(b=>b.ops.some(o=>o.stageId===stage.id)).map(batch=>{
                  const op=batch.ops.find(o=>o.stageId===stage.id); if(!op) return null;
                  const barL=op.setupStart.getTime(), barR=op.endTime.getTime(), wkL=op.startTime.getTime();
                  const left=Math.max(0,((barL-now)/span)*100);
                  const totalW=Math.max(((barR-barL)/span)*100,1.5);
                  const setupPct=barR>barL?Math.max(0,((wkL-barL)/(barR-barL))*100):0;
                  // Slack-based outline: rojo si late, naranja si crítico (<2h), nada si seguro
                  const slackOutline = batch.isLate
                    ? "2px solid #F87171"
                    : batch.slack < 120
                      ? "2px solid #F59E0B"
                      : "none";
                  const slackTip = batch.isLate
                    ? `❌ ATRASO: ${Math.round(batch.tardiness)} min (-${Math.abs(batch.slack/60).toFixed(1)}h)`
                    : batch.slack < 120
                      ? `⚠ CRÍTICO: holgura ${(batch.slack/60).toFixed(1)}h (<2h)`
                      : `✓ holgura ${(batch.slack/60).toFixed(1)}h`;
                  return (
                    <div key={batch.id} style={{position:"absolute",top:4,height:28,left:`${left}%`,width:`${totalW}%`,display:"flex",borderRadius:4,overflow:"hidden",cursor:"pointer"}}
                      title={`${batch.skuName} · Lote ${batch.batchNum}/${batch.batchTotal}\nMáq: ${op.machineName}\nSetup: ${op.setupTime}min\n${op.startTime.toLocaleTimeString()} → ${op.endTime.toLocaleTimeString()}${op.isParallel ? "\n∥ Paralelo con otra etapa de este lote" : ""}\n${slackTip}`}>
                      {setupPct>0&&<div style={{width:`${setupPct}%`,background:"repeating-linear-gradient(-45deg,var(--surface-3),var(--surface-3) 3px,var(--border-alt) 3px,var(--border-alt) 6px)",flexShrink:0}}/>}
                      <div style={{flex:1,background:batch.color,display:"flex",alignItems:"center",gap:4,padding:"0 6px",opacity:.92,outline:slackOutline,outlineOffset:-1}}>
                        {op.isParallel && <span title="∥ En paralelo con otra etapa del mismo lote" style={{fontSize:11,color:"#38BDF8",background:"rgba(255,255,255,.9)",borderRadius:2,padding:"0 3px",fontWeight:700,lineHeight:"14px",flexShrink:0}}>∥</span>}
                        <span style={{fontSize:9,color:"rgba(255,255,255,.9)",fontWeight:600,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{batch.skuName.split(" ").slice(0,2).join(" ")}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {/* time axis */}
          <div style={{display:"grid",gridTemplateColumns:"155px 1fr",gap:10,marginTop:2}}>
            <div/>
            <div style={{position:"relative",height:18}}>
              {Array.from({length:7}).map((_,i)=>{
                const t=now+(span/6)*i;
                return <span key={i} style={{position:"absolute",left:`${(i/6)*100}%`,fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",transform:"translateX(-50%)"}}>{fmtT(t)}</span>;
              })}
            </div>
          </div>
        </div>

        {/* legend */}
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:14,paddingTop:12,borderTop:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--text-dim)"}}><div style={{width:20,height:10,background:"repeating-linear-gradient(-45deg,var(--surface-3),var(--surface-3) 3px,var(--border-alt) 3px,var(--border-alt) 6px)",borderRadius:2}}/>Setup</div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--text-dim)"}}><div style={{width:10,height:10,border:"2px solid #F87171",borderRadius:2}}/>Tardanza</div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--text-dim)"}}><div style={{width:10,height:10,background:"rgba(52,211,153,.15)",borderRadius:2,border:"1px solid rgba(52,211,153,.2)"}}/>Turno activo</div>
          {line.skus.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--text-dim)"}}><div style={{width:10,height:10,borderRadius:2,background:s.color}}/>{s.name}</div>)}
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  //  PLAN VIEW — Legible production schedule output
  // ════════════════════════════════════════════════════════════
  const PlanView = () => {
    if (!line) return <div style={{padding:30,color:"var(--text-dim)"}}>Selecciona una línea.</div>;
    if (!schedule.batches.length) return (
      <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>
        No hay producción programada. Crea órdenes en la pestaña <b>Órdenes</b>.
      </div>
    );

    // Build a flat list of all operations sorted chronologically
    const allOps = [];
    schedule.batches.forEach((batch, batchIdx) => {
      batch.ops.forEach(op => {
        allOps.push({
          batchIdx,
          batchId: batch.id,
          orderId: batch.orderId,
          skuId: batch.skuId,
          skuName: batch.skuName,
          color: batch.color,
          batchNum: batch.batchNum,
          batchTotal: batch.batchTotal,
          qty: batch.qty,
          dueDate: batch.dueDate,
          batchEnd: batch.endTime,
          batchTard: batch.tardiness,
          batchSlack: batch.slack,
          batchLate: batch.isLate,
          stageId: op.stageId,
          stageName: op.stageName,
          machineId: op.machineId,
          machineName: op.machineName,
          setupTime: op.setupTime,
          setupStart: op.setupStart,
          startTime: op.startTime,
          endTime: op.endTime,
        });
      });
    });
    allOps.sort((a,b) => a.setupStart - b.setupStart);

    // Format helpers
    const fmtDateTime = (d) => d.toLocaleString("es-CO",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
    const fmtTime     = (d) => d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
    const fmtDate     = (d) => d.toLocaleDateString("es-CO",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
    const fmtDur      = (mins) => {
      const h = Math.floor(mins/60), m = Math.round(mins%60);
      return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : `${m}m`;
    };
    const dayKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

    // Export to Excel
    const handleExport = () => {
      const wb = XLSX.utils.book_new();

      // Sheet 1: Cronológico
      const chronoHeader = ["#","Orden","SKU","Lote","Cant. (pzs)","Etapa","Máquina","Setup (min)","Inicio","Fin","Duración","Fecha compromiso","Holgura","Estado"];
      const chronoRows = allOps.map((o, i) => [
        i + 1,
        o.orderId,
        `${o.skuId} — ${o.skuName}`,
        `${o.batchNum}/${o.batchTotal}`,
        o.qty,
        o.stageName,
        o.machineName,
        o.setupTime || 0,
        fmtDateTime(o.setupStart),
        fmtDateTime(o.endTime),
        fmtDur((o.endTime - o.setupStart)/60000),
        new Date(o.dueDate).toLocaleString("es-CO"),
        o.batchSlack < 0 ? `Atraso ${Math.round(o.batchTard)}m` : `+${(o.batchSlack/60).toFixed(1)}h`,
        o.batchLate ? "ATRASADO" : o.batchSlack < 120 ? "CRÍTICO" : "A TIEMPO"
      ]);
      const wsChrono = XLSX.utils.aoa_to_sheet([chronoHeader, ...chronoRows]);
      wsChrono["!cols"] = [{wch:4},{wch:10},{wch:32},{wch:8},{wch:11},{wch:14},{wch:14},{wch:11},{wch:22},{wch:22},{wch:11},{wch:22},{wch:14},{wch:11}];
      XLSX.utils.book_append_sheet(wb, wsChrono, "Cronológico");

      // Sheet 2: Resumen por orden
      const byOrder = {};
      schedule.batches.forEach(b => {
        if (!byOrder[b.orderId]) byOrder[b.orderId] = { orderId: b.orderId, skuName: b.skuName, totalQty: 0, batches: 0, firstStart: b.startTime, lastEnd: b.endTime, dueDate: b.dueDate, tardiness: b.tardiness, slack: b.slack };
        const e = byOrder[b.orderId];
        e.totalQty += b.qty; e.batches++;
        if (b.startTime < e.firstStart) e.firstStart = b.startTime;
        if (b.endTime > e.lastEnd) e.lastEnd = b.endTime;
      });
      const orderHeader = ["Orden","SKU","Cant. total","Lotes","Inicio","Fin","Duración","Fecha compromiso","Holgura","Estado"];
      const orderRows = Object.values(byOrder).map(o => [
        o.orderId, o.skuName, o.totalQty, o.batches,
        fmtDateTime(o.firstStart), fmtDateTime(o.lastEnd),
        fmtDur((o.lastEnd - o.firstStart)/60000),
        new Date(o.dueDate).toLocaleString("es-CO"),
        o.slack < 0 ? `Atraso ${Math.round(o.tardiness)}m` : `+${(o.slack/60).toFixed(1)}h`,
        o.tardiness > 0 ? "ATRASADO" : o.slack < 120 ? "CRÍTICO" : "A TIEMPO"
      ]);
      const wsOrder = XLSX.utils.aoa_to_sheet([orderHeader, ...orderRows]);
      wsOrder["!cols"] = [{wch:10},{wch:32},{wch:12},{wch:7},{wch:22},{wch:22},{wch:11},{wch:22},{wch:14},{wch:11}];
      XLSX.utils.book_append_sheet(wb, wsOrder, "Por Orden");

      // Sheet 3: Resumen por día
      const byDay = {};
      allOps.forEach(o => {
        const k = dayKey(o.setupStart);
        if (!byDay[k]) byDay[k] = { date: new Date(o.setupStart.getFullYear(), o.setupStart.getMonth(), o.setupStart.getDate()), ops: [], totalQty: 0, totalSetup: 0 };
        byDay[k].ops.push(o);
        byDay[k].totalSetup += o.setupTime || 0;
      });
      // Sum qty by unique batch within each day
      Object.values(byDay).forEach(d => {
        const seen = new Set();
        d.ops.forEach(o => {
          const key = o.batchId + "|" + o.stageId; // count qty once per batch (first stage)
          if (!seen.has(o.batchId)) { d.totalQty += o.qty; seen.add(o.batchId); }
        });
      });
      const dayHeader = ["Día","# Operaciones","# Lotes únicos","Piezas (suma)","Setup total (min)"];
      const dayRows = Object.values(byDay).sort((a,b)=>a.date-b.date).map(d => [
        fmtDate(d.date), d.ops.length, new Set(d.ops.map(o=>o.batchId)).size, d.totalQty, d.totalSetup
      ]);
      const wsDay = XLSX.utils.aoa_to_sheet([dayHeader, ...dayRows]);
      wsDay["!cols"] = [{wch:32},{wch:15},{wch:16},{wch:14},{wch:18}];
      XLSX.utils.book_append_sheet(wb, wsDay, "Por Día");

      XLSX.writeFile(wb, `plan-produccion-${line.id}-${new Date().toISOString().split("T")[0]}.xlsx`);
    };

    // KPI summary at top
    const headerSummary = (
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(160px, 1fr))",gap:8,marginBottom:14}}>
        <div style={{padding:"10px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7}}>
          <div style={{fontSize:9,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'DM Mono',monospace"}}>Total operaciones</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:"'Syne',sans-serif",marginTop:2}}>{allOps.length}</div>
        </div>
        <div style={{padding:"10px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7}}>
          <div style={{fontSize:9,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'DM Mono',monospace"}}>Lotes programados</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:"'Syne',sans-serif",marginTop:2}}>{schedule.batches.length}</div>
        </div>
        <div style={{padding:"10px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7}}>
          <div style={{fontSize:9,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'DM Mono',monospace"}}>Inicio</div>
          <div style={{fontSize:13,fontWeight:600,fontFamily:"'DM Mono',monospace",marginTop:3}}>{allOps.length ? fmtDateTime(allOps[0].setupStart) : "—"}</div>
        </div>
        <div style={{padding:"10px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7}}>
          <div style={{fontSize:9,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'DM Mono',monospace"}}>Fin estimado</div>
          <div style={{fontSize:13,fontWeight:600,fontFamily:"'DM Mono',monospace",marginTop:3}}>{allOps.length ? fmtDateTime(new Date(Math.max(...allOps.map(o=>o.endTime.getTime())))) : "—"}</div>
        </div>
        <div style={{padding:"10px 12px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7}}>
          <div style={{fontSize:9,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'DM Mono',monospace"}}>OTIF</div>
          <div style={{fontSize:20,fontWeight:700,fontFamily:"'Syne',sans-serif",marginTop:2,color: schedule.kpis.onTimePct>=95?"#34D399":schedule.kpis.onTimePct>=80?"#FBBF24":"#F87171"}}>{schedule.kpis.onTimePct}%</div>
        </div>
      </div>
    );

    // Status badge helper
    const statusBadge = (slack, late, tard) => {
      if (late) return <span style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,fontFamily:"'DM Mono',monospace",background:"rgba(248,113,113,.15)",color:"#F87171",border:"1px solid rgba(248,113,113,.3)"}}>ATRASO {Math.round(tard)}m</span>;
      if (slack < 120) return <span style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,fontFamily:"'DM Mono',monospace",background:"rgba(245,158,11,.12)",color:"#F59E0B",border:"1px solid rgba(245,158,11,.3)"}}>CRÍTICO</span>;
      return <span style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,fontFamily:"'DM Mono',monospace",background:"rgba(52,211,153,.12)",color:"#34D399",border:"1px solid rgba(52,211,153,.3)"}}>A TIEMPO</span>;
    };

    // ────────────────────────────────────────
    // VIEW: Chronological table
    // ────────────────────────────────────────
    const ChronoView = () => (
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:1100}}>
          <thead>
            <tr>
              {["#","Orden","SKU","Lote","Cant.","Etapa","Máquina","Setup","Inicio","Fin","Duración","F. compromiso","Holgura","Estado"].map(h => (
                <th key={h} style={{textAlign:"left",fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 9px",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",background:"var(--surface)",position:"sticky",top:0,zIndex:2}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {allOps.map((o, i) => (
              <tr key={`${o.batchId}-${o.stageId}`} style={{borderBottom:"1px solid var(--surface)",background: i % 2 === 0 ? "transparent" : "rgba(255,255,255,.015)"}}>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",color:"var(--text-dim)",fontSize:10}}>{i+1}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{o.orderId}</td>
                <td style={{padding:"6px 9px",whiteSpace:"nowrap"}}>
                  <span style={{display:"inline-block",width:7,height:7,borderRadius:2,background:o.color,marginRight:6,verticalAlign:"middle"}}/>
                  <span style={{fontSize:11}}>{o.skuName}</span>
                  <div style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",marginLeft:13}}>{o.skuId}</div>
                </td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{o.batchNum}/{o.batchTotal}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600}}>{o.qty}</td>
                <td style={{padding:"6px 9px",fontSize:11,whiteSpace:"nowrap"}}>{o.stageName}</td>
                <td style={{padding:"6px 9px",fontSize:11,color:"var(--text-muted)",whiteSpace:"nowrap"}}>{o.machineName}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,color:o.setupTime>0?"#FBBF24":"var(--text-dim)"}}>{o.setupTime > 0 ? `${o.setupTime}m` : "—"}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{fmtDateTime(o.setupStart)}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{fmtDateTime(o.endTime)}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{fmtDur((o.endTime - o.setupStart)/60000)}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--text-muted)",whiteSpace:"nowrap"}}>{new Date(o.dueDate).toLocaleString("es-CO",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</td>
                <td style={{padding:"6px 9px",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600,whiteSpace:"nowrap",color:o.batchSlack < 0 ? "#F87171" : o.batchSlack < 120 ? "#F59E0B" : "#34D399"}}>
                  {o.batchSlack < 0 ? `-${Math.abs(o.batchSlack/60).toFixed(1)}h` : `+${(o.batchSlack/60).toFixed(1)}h`}
                </td>
                <td style={{padding:"6px 9px",whiteSpace:"nowrap"}}>{statusBadge(o.batchSlack, o.batchLate, o.batchTard)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );

    // ────────────────────────────────────────
    // VIEW: By day
    // ────────────────────────────────────────
    const ByDayView = () => {
      const byDay = {};
      allOps.forEach(o => {
        const k = dayKey(o.setupStart);
        if (!byDay[k]) byDay[k] = { date: new Date(o.setupStart.getFullYear(), o.setupStart.getMonth(), o.setupStart.getDate()), ops: [] };
        byDay[k].ops.push(o);
      });
      const days = Object.values(byDay).sort((a,b)=>a.date-b.date);
      return (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {days.map(d => {
            const uniqueBatches = new Set(d.ops.map(o=>o.batchId)).size;
            const totalQty = d.ops.reduce((s,o,_,arr)=>{
              if (arr.findIndex(x=>x.batchId===o.batchId) === arr.indexOf(o)) return s + o.qty;
              return s;
            }, 0);
            const totalSetup = d.ops.reduce((s,o)=>s+(o.setupTime||0),0);
            const totalProcMin = d.ops.reduce((s,o)=>s+((o.endTime-o.startTime)/60000),0);
            const lateCount = d.ops.filter(o=>o.batchLate).length;
            return (
              <div key={d.date.getTime()} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
                <div style={{padding:"10px 14px",background:"var(--surface-2)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,fontFamily:"'Syne',sans-serif",textTransform:"capitalize"}}>{fmtDate(d.date)}</div>
                    <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",marginTop:2}}>
                      {d.ops.length} operaciones · {uniqueBatches} lotes · {totalQty} pzs · {fmtDur(totalProcMin)} producción · {totalSetup}m setup
                    </div>
                  </div>
                  {lateCount > 0 && <span style={{padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:600,fontFamily:"'DM Mono',monospace",background:"rgba(248,113,113,.15)",color:"#F87171",border:"1px solid rgba(248,113,113,.3)"}}>⚠ {lateCount} atrasos</span>}
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr>{["Hora","SKU","Lote","Cant.","Etapa","Máquina","Duración","Estado"].map(h => (
                      <th key={h} style={{textAlign:"left",fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"6px 10px",borderBottom:"1px solid var(--surface-2)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {d.ops.map(o => (
                      <tr key={`${o.batchId}-${o.stageId}`} style={{borderBottom:"1px solid var(--surface-2)"}}>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{fmtTime(o.setupStart)}–{fmtTime(o.endTime)}</td>
                        <td style={{padding:"5px 10px",whiteSpace:"nowrap"}}>
                          <span style={{display:"inline-block",width:7,height:7,borderRadius:2,background:o.color,marginRight:6,verticalAlign:"middle"}}/>
                          <span style={{fontSize:11}}>{o.skuName}</span>
                        </td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{o.batchNum}/{o.batchTotal}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600}}>{o.qty}</td>
                        <td style={{padding:"5px 10px",fontSize:11,whiteSpace:"nowrap"}}>{o.stageName}</td>
                        <td style={{padding:"5px 10px",fontSize:11,color:"var(--text-muted)",whiteSpace:"nowrap"}}>{o.machineName}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{fmtDur((o.endTime-o.setupStart)/60000)}{o.setupTime>0 && <span style={{color:"#FBBF24",marginLeft:4}}>(+{o.setupTime}m setup)</span>}</td>
                        <td style={{padding:"5px 10px",whiteSpace:"nowrap"}}>{statusBadge(o.batchSlack, o.batchLate, o.batchTard)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      );
    };

    // ────────────────────────────────────────
    // VIEW: By machine
    // ────────────────────────────────────────
    const ByMachineView = () => {
      const byMachine = {};
      allOps.forEach(o => {
        if (!byMachine[o.machineId]) byMachine[o.machineId] = { machineId: o.machineId, machineName: o.machineName, stageName: o.stageName, ops: [] };
        byMachine[o.machineId].ops.push(o);
      });
      const machines = Object.values(byMachine).sort((a,b) => a.machineName.localeCompare(b.machineName));
      return (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {machines.map(m => {
            const totalMin = m.ops.reduce((s,o)=>s+((o.endTime-o.setupStart)/60000),0);
            const setupMin = m.ops.reduce((s,o)=>s+(o.setupTime||0),0);
            const firstStart = new Date(Math.min(...m.ops.map(o=>o.setupStart.getTime())));
            const lastEnd = new Date(Math.max(...m.ops.map(o=>o.endTime.getTime())));
            const span = (lastEnd - firstStart)/60000;
            const utilization = span > 0 ? Math.round((totalMin/span)*100) : 0;
            return (
              <div key={m.machineId} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
                <div style={{padding:"10px 14px",background:"var(--surface-2)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,fontFamily:"'Syne',sans-serif"}}>{m.machineName} <span style={{fontSize:10,color:"var(--text-dim)",marginLeft:6,fontFamily:"'DM Mono',monospace",textTransform:"uppercase"}}>({m.stageName})</span></div>
                    <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",marginTop:2}}>
                      {m.ops.length} operaciones · {fmtDur(totalMin)} producción · {setupMin}m setup · {fmtDur(span)} ventana total
                    </div>
                  </div>
                  <div style={{padding:"4px 10px",borderRadius:5,background: utilization > 80 ? "rgba(248,113,113,.12)" : utilization > 60 ? "rgba(245,158,11,.12)" : "rgba(52,211,153,.12)", border: "1px solid " + (utilization > 80 ? "rgba(248,113,113,.3)" : utilization > 60 ? "rgba(245,158,11,.3)" : "rgba(52,211,153,.3)"), color: utilization > 80 ? "#F87171" : utilization > 60 ? "#F59E0B" : "#34D399", fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:600}}>
                    Util: {utilization}%
                  </div>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr>{["#","Orden","SKU","Lote","Cant.","Setup","Inicio","Fin","Duración"].map(h => (
                      <th key={h} style={{textAlign:"left",fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"6px 10px",borderBottom:"1px solid var(--surface-2)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {m.ops.map((o, i) => (
                      <tr key={`${o.batchId}-${o.stageId}`} style={{borderBottom:"1px solid var(--surface-2)"}}>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--text-dim)"}}>{i+1}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{o.orderId}</td>
                        <td style={{padding:"5px 10px",whiteSpace:"nowrap"}}>
                          <span style={{display:"inline-block",width:7,height:7,borderRadius:2,background:o.color,marginRight:6,verticalAlign:"middle"}}/>
                          <span style={{fontSize:11}}>{o.skuName}</span>
                        </td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{o.batchNum}/{o.batchTotal}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600}}>{o.qty}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,color:o.setupTime>0?"#FBBF24":"var(--text-dim)"}}>{o.setupTime > 0 ? `${o.setupTime}m` : "—"}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{fmtDateTime(o.setupStart)}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,whiteSpace:"nowrap"}}>{fmtDateTime(o.endTime)}</td>
                        <td style={{padding:"5px 10px",fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{fmtDur((o.endTime-o.setupStart)/60000)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })}
        </div>
      );
    };

    return (
      <div>
        {/* Toolbar: view switch + export */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",gap:4,background:"var(--surface)",padding:3,borderRadius:6,border:"1px solid var(--border)"}}>
            {[["chrono","📋 Cronológico"],["byday","📅 Por Día"],["bymachine","🔧 Por Máquina"]].map(([id,lbl]) => (
              <button key={id} onClick={()=>setPlanView(id)} style={{padding:"5px 12px",borderRadius:4,border:"none",fontFamily:"'DM Mono',monospace",fontSize:11,cursor:"pointer",
                background: planView===id ? "var(--surface-2)" : "transparent",
                color: planView===id ? "var(--text)" : "var(--text-dim)",
                fontWeight: planView===id ? 600 : 400}}>{lbl}</button>
            ))}
          </div>
          <button onClick={handleExport} style={{padding:"6px 14px",borderRadius:5,background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",color:"#34D399",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600}}>
            ↓ Exportar a Excel
          </button>
        </div>
        {headerSummary}
        {planView==="chrono" && <ChronoView/>}
        {planView==="byday" && <ByDayView/>}
        {planView==="bymachine" && <ByMachineView/>}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  //  ORDERS VIEW
  // ════════════════════════════════════════════════════════════
  const OrdersView = () => {
    const lineOrders=data.orders.filter(o=>o.lineId===activeLine);
    const inputStyle = {background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none"};
    const dtToInput = (s) => { if(!s) return ""; const d = new Date(s); const z = n => String(n).padStart(2,"0"); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`; };
    return (
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8,flexWrap:"wrap"}}>
          <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>
            {lineOrders.length} {lineOrders.length===1?"orden":"órdenes"} en {line?.name}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>handleDownloadOrdersTemplate(activeLine)} disabled={!line.skus.length}
              title="Descargar plantilla Excel con los SKUs disponibles para llenar masivamente"
              style={{fontSize:10,padding:"5px 10px",borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-muted)",cursor:line.skus.length?"pointer":"not-allowed",opacity:line.skus.length?1:.4,fontFamily:"'DM Mono',monospace"}}>
              ↓ Plantilla
            </button>
            <label
              title="Subir Excel/CSV con columnas: Código SKU, Cantidad, Fecha compromiso"
              style={{fontSize:10,padding:"5px 10px",borderRadius:5,background:"rgba(56,189,248,.08)",border:"1px solid rgba(56,189,248,.3)",color:"#38BDF8",cursor:line.skus.length?"pointer":"not-allowed",opacity:line.skus.length?1:.4,fontFamily:"'DM Mono',monospace",display:"inline-block"}}>
              ↑ Importar Excel
              <input type="file" accept=".xlsx,.xls,.csv" disabled={!line.skus.length} onChange={e=>handleImportOrders(activeLine, e)} style={{display:"none"}}/>
            </label>
            <button onClick={()=>handleAddOrder(activeLine)} disabled={!line.skus.length}
              style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:line.skus.length?"pointer":"not-allowed",opacity:line.skus.length?1:.4,fontFamily:"'DM Mono',monospace"}}>
              + Agregar orden
            </button>
          </div>
        </div>
        {lineOrders.length===0 ? (
          <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>
            {line.skus.length ? "Sin órdenes en esta línea. Usa + Agregar orden para empezar." : "Primero configura SKUs en la pestaña Configuración."}
          </div>
        ) : (
        <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:880}}>
          <thead><tr>{[["Orden",""],["SKU",""],["Cant. (pzs)",""],["Lotes",""],["Fecha compromiso",""],["Valor (COP)",""],["Prior. (5=alta) ⓘ","Escala: 1 = más baja · 5 = más alta. La heurística WSPT (Weighted SPT) y CR (Critical Ratio) usan este valor; las demás heurísticas lo ignoran. El backlog (inventario negativo) y las reglas de prioridad personalizadas tienen precedencia sobre este número."],["Estado",""],["Plan",""],["",""]].map(([h,tip])=><th key={h} title={tip||undefined} style={{textAlign:"left",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 10px",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap",cursor:tip?"help":undefined}}>{h}</th>)}</tr></thead>
          <tbody>
            {lineOrders.map(order=>{
              const sku=line.skus.find(s=>s.id===order.skuId);
              const bs=sku?.batchSize||1;
              const batches=sku?(order.qty/bs):0;
              const batchesDisplay=Number.isInteger(batches)?batches:batches.toFixed(2);
              const sb=schedule.batches.find(b=>b.orderId===order.id);
              const sc=STATUS_COLORS[sb?.isLate?"late":order.status]||STATUS_COLORS.pending;
              const autoCalc=sku?.unitValue>0;
              return (
                <tr key={order.id} style={{borderBottom:"1px solid var(--surface)"}}>
                  <td style={{padding:"7px 10px",fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text-dim)",whiteSpace:"nowrap"}}>{order.id}</td>
                  <td style={{padding:"7px 10px",minWidth:200}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:sku?.color||"var(--border-2)",flexShrink:0}}/>
                      {!sku
                        ? <span title={`SKU "${order.skuId}" no existe en la línea actual`} style={{fontSize:11,color:"#F87171",fontFamily:"'DM Mono',monospace"}}>⚠ {order.skuId} (eliminado)</span>
                        : <SkuAutocomplete value={order.skuId} skus={line.skus} onChange={v=>handleUpdateOrder(order.id,"skuId",v)} style={inputStyle}/>
                      }
                    </div>
                  </td>
                  <td style={{padding:"7px 10px"}}>
                    <NumberInput value={order.qty} onCommit={v=>handleUpdateOrder(order.id,"qty",v)} min={0} step={1} style={{...inputStyle,width:64}} title="Cantidad en piezas"/>
                  </td>
                  <td style={{padding:"7px 10px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <NumberInput value={Number.isInteger(batches)?batches:""} onCommit={v=>handleUpdateOrder(order.id,"batches",v)} min={0} step={1} placeholder={!Number.isInteger(batches)?batchesDisplay:""} style={{...inputStyle,width:50}} title={`Lotes (1 lote = ${bs} pzs)`}/>
                      <span style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>×{bs}</span>
                    </div>
                  </td>
                  <td style={{padding:"7px 10px"}}>
                    <input type="datetime-local" value={dtToInput(order.dueDate)} onChange={e=>handleUpdateOrder(order.id,"dueDate",e.target.value)} style={{...inputStyle,width:175,colorScheme:themeMode==="dark"?"dark":"light"}}/>
                  </td>
                  <td style={{padding:"7px 10px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:3}}>
                      <span style={{color:"#34D399",fontSize:11,fontFamily:"'DM Mono',monospace"}}>$</span>
                      <NumberInput value={order.value} onCommit={v=>handleUpdateOrder(order.id,"value",v)} min={0} style={{...inputStyle,width:110,color:"#34D399",fontWeight:autoCalc?400:500}} title={autoCalc?`Auto-calculado: ${order.qty}×$${sku.unitValue.toLocaleString("es-CO")}. Puedes editarlo manualmente.`:"Sin valor unitario en SKU - editar manualmente"}/>
                    </div>
                  </td>
                  <td style={{padding:"7px 10px"}}>
                    <select value={order.priority} onChange={e=>handleUpdateOrder(order.id,"priority",e.target.value)} style={{...inputStyle,width:54}}>
                      {[[1,"1 — Muy baja"],[2,"2 — Baja"],[3,"3 — Normal"],[4,"4 — Alta"],[5,"5 — Crítica"]].map(([n,lbl])=><option key={n} value={n}>{lbl}</option>)}
                    </select>
                  </td>
                  <td style={{padding:"7px 10px"}}>
                    <select value={order.status} onChange={e=>handleUpdateOrder(order.id,"status",e.target.value)} style={{...inputStyle,width:110,background:sc.bg,color:sc.text,fontWeight:600}}>
                      <option value="pending">pendiente</option>
                      <option value="in-progress">en proceso</option>
                      <option value="done">terminado</option>
                    </select>
                  </td>
                  <td style={{padding:"7px 10px",fontFamily:"'DM Mono',monospace",fontSize:10}}>
                    {sb?.isLate?<span style={{color:"#F87171"}}>tardío {Math.round(sb.tardiness)}m</span>:sb?<span style={{color:"#34D399"}}>a tiempo</span>:"—"}
                  </td>
                  <td style={{padding:"7px 6px",whiteSpace:"nowrap"}}><button onClick={()=>handleDuplicateOrder(order.id)} title="Duplicar" style={{padding:"4px 8px",marginRight:4,borderRadius:4,background:"rgba(56,189,248,.08)",border:"1px solid rgba(56,189,248,.25)",color:"#38BDF8",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",lineHeight:1}}>⎘ Duplicar</button><button onClick={()=>handleRemoveOrder(order.id)} title="Eliminar (con undo disponible 8s)" style={{padding:"4px 8px",borderRadius:4,background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.3)",color:"#F87171",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",lineHeight:1,fontWeight:600}}>× Eliminar</button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
        )}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  //  METAS VIEW  (daily billing goals)
  // ════════════════════════════════════════════════════════════
  const MetasView = () => {
    const lineGoals = data.dailyGoals?.[activeLine] || {};
    const lineProj  = projectedByDay[activeLine] || {};
    const allDates  = [...new Set([...Object.keys(lineGoals), ...Object.keys(lineProj)])].sort();
    if (!allDates.includes(todayKey)) allDates.unshift(todayKey);
    const maxVal = Math.max(...allDates.map(d=>Math.max(lineGoals[d]||0,lineProj[d]||0)),1);

    // Calculate productive days in horizon
    const prodDays = countProductiveDays(horizonStart, horizonEnd, line?.workingDays, line?.dateOverrides);
    const suggestedDailyGoal = prodDays > 0 ? Math.round(data.billingGoal / prodDays) : 0;

    return (
      <div>
        {/* Header row */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,fontFamily:"'Syne',sans-serif"}}>Metas de Facturación Diaria</div>
            <div style={{fontSize:11,color:"var(--text-dim)",marginTop:2}}>{line?.name} · <span style={{color:"#34D399",fontFamily:"'DM Mono',monospace"}}>valores en COP</span></div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"flex-start",flexWrap:"wrap"}}>
            <button onClick={()=>setShowHorizonModal(true)} style={{padding:"7px 14px",borderRadius:7,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",height:"fit-content"}}>📅 Elegir horizonte</button>
            <button onClick={()=>{setCleanStart(horizonStart);setCleanEnd(horizonEnd);setCleanScope("range");setShowCleanGoalsModal(true);}} style={{padding:"7px 14px",borderRadius:7,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.25)",color:"#F87171",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",height:"fit-content"}} title="Eliminar metas en bloque">🗑 Limpiar metas</button>
            <div style={{textAlign:"right",padding:"8px 14px",background:"var(--surface)",borderRadius:8,border:"1px solid var(--border)"}}>
              <div style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>Meta Mensual (COP)</div>
              <div style={{fontSize:18,fontWeight:700,fontFamily:"'Syne',sans-serif",color:"#34D399",lineHeight:1.1,marginBottom:4}}>${data.billingGoal.toLocaleString("es-CO")}</div>
              <div style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",marginTop:2,paddingTop:6,borderTop:"1px solid var(--border)"}}>{prodDays} días hábiles</div>
              <div style={{fontSize:9,color:"#38BDF8",fontFamily:"'DM Mono',monospace",marginTop:3,fontWeight:600}}>
                Sugerido: ${suggestedDailyGoal.toLocaleString("es-CO")}/día
              </div>
            </div>
            <div style={{textAlign:"right",padding:"8px 14px",background:"var(--surface)",borderRadius:8,border:"1px solid var(--border)"}}>
              <div style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>Meta Global (COP)</div>
              <div style={{fontSize:20,fontWeight:700,fontFamily:"'Syne',sans-serif",color:billingPct>=100?"#34D399":billingPct>=70?"#FBBF24":"#F87171",lineHeight:1.1}}>{billingPct.toFixed(0)}%</div>
              <div style={{height:3,background:"var(--border)",borderRadius:2,margin:"5px 0",overflow:"hidden"}}><div style={{height:"100%",width:`${billingPct}%`,background:billingPct>=100?"#34D399":billingPct>=70?"#FBBF24":"#F87171",transition:"width .6s"}}/></div>
              <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>${totalValue.toLocaleString("es-CO")} / ${data.billingGoal.toLocaleString("es-CO")}</div>
            </div>
          </div>
        </div>

        {/* Bar chart */}
        <div style={{display:"flex",gap:6,alignItems:"flex-end",padding:"0 4px 22px",borderBottom:"1px solid var(--border)",marginBottom:16,minHeight:140}}>
          {allDates.map(date => {
            const goal=lineGoals[date]||0, proj=lineProj[date]||0;
            const goalH=(goal/maxVal)*100, projH=(proj/maxVal)*100;
            const pct=goal>0?(proj/goal)*100:null;
            const c=pct===null?"var(--text-dim)":pct>=100?"#34D399":pct>=70?"#FBBF24":"#F87171";
            const isToday=date===todayKey;
            const d=new Date(date+"T12:00:00");
            return (
              <div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:44}}>
                <div style={{fontSize:9,color:c,fontFamily:"'DM Mono',monospace",fontWeight:600,whiteSpace:"nowrap"}}>
                  {proj>0?`$${(proj/1000).toFixed(0)}K`:"—"}
                </div>
                <div style={{width:"100%",height:90,position:"relative",display:"flex",alignItems:"flex-end"}}>
                  {goal>0&&<div style={{position:"absolute",left:0,right:0,bottom:0,height:`${goalH}%`,border:"1px dashed rgba(245,158,11,.35)",borderRadius:4,background:"rgba(245,158,11,.04)"}}/>}
                  <div style={{width:"100%",height:`${Math.max(projH,2)}%`,background:c,borderRadius:"4px 4px 0 0",opacity:.85,transition:"height .4s"}}/>
                </div>
                <div style={{fontSize:9,color:isToday?"#F59E0B":"var(--text-dim)",textAlign:"center",lineHeight:1.3,fontFamily:"'DM Mono',monospace",fontWeight:isToday?600:400}}>
                  {d.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})}
                </div>
                {goal>0&&<div style={{fontSize:8,color:"rgba(245,158,11,.6)",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>meta ${(goal/1000).toFixed(0)}K</div>}
                {isToday&&<div style={{fontSize:8,background:"rgba(245,158,11,.15)",color:"#F59E0B",borderRadius:3,padding:"1px 4px",fontFamily:"'DM Mono',monospace"}}>HOY</div>}
              </div>
            );
          })}
        </div>

        {/* Editable table */}
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>
            {["Fecha","Meta del día (COP)","Proyectado (COP)","Cumplimiento",""].map(h=>(
              <th key={h} style={{textAlign:"left",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 10px",borderBottom:"1px solid var(--border)"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {allDates.map(date=>{
              const goal=lineGoals[date]||0, proj=lineProj[date]||0;
              const pct=goal>0?Math.min(100,(proj/goal)*100):null;
              const c=pct===null?"var(--text-dim)":pct>=100?"#34D399":pct>=70?"#FBBF24":"#F87171";
              const isToday=date===todayKey;
              const d=new Date(date+"T12:00:00");
              const productive = isProductiveDay(d, line?.workingDays, line?.dateOverrides);
              return (
                <tr key={date} style={{borderBottom:"1px solid var(--surface)",background:isToday?"rgba(245,158,11,.025)":(productive?"transparent":"rgba(107,122,154,.04)"),opacity:productive?1:0.55}}>
                  <td style={{padding:"9px 10px",fontFamily:"'DM Mono',monospace",fontSize:11}}>
                    <span style={{color:isToday?"#F59E0B":undefined,textDecoration:productive?"none":"line-through"}}>{d.toLocaleDateString("es-CO",{weekday:"short",day:"2-digit",month:"short"})}</span>
                    {isToday&&<span style={{marginLeft:6,fontSize:9,background:"rgba(245,158,11,.15)",color:"#F59E0B",borderRadius:3,padding:"1px 5px"}}>HOY</span>}
                    {!productive&&<span title="Día no productivo según el calendario" style={{marginLeft:6,fontSize:9,background:"rgba(107,122,154,.15)",color:"var(--text-dim)",borderRadius:3,padding:"1px 5px"}}>NO PROD</span>}
                  </td>
                  <td style={{padding:"9px 10px"}}>
                    <NumberInput value={goal||""} onCommit={v=>handleDailyGoalUpdate(activeLine,date,v)} min={0} placeholder="—"
                      style={{width:130,background:"var(--surface-2)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"4px 8px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none"}}/>
                  </td>
                  <td style={{padding:"9px 10px",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#34D399"}}>{proj>0?`$${proj.toLocaleString("es-CO")}`:"—"}</td>
                  <td style={{padding:"9px 10px"}}>
                    {pct!==null?(
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:60,height:4,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>

                      : <button onClick={()=>handleDailyGoalUpdate(activeLine,date,80000)} style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"var(--border)",border:"1px solid var(--border-2)",color:"var(--text-dim)",cursor:"pointer"}}>+ Meta</button>

                  </td>
                </tr>

          <span style={{fontSize:10,color:"var(--text-dim)",marginLeft:6}}>· o usa <strong style={{color:"#F59E0B"}}>📅 Elegir horizonte</strong> para crear varios días</span>
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  //  CONFIG VIEW  (+ Turnos tab)
  // ════════════════════════════════════════════════════════════
  const ConfigView = () => {
    const subTabs=[["stages","Etapas"],["machines","Máquinas"],["skus","SKUs"],["forbidden","Rutas Prohibidas"],["priorities","Prioridades"],["setup","Matriz Setup"],["shifts","Turnos"]];
    // Hours in active shifts per day
    const shiftHrsDay = (line.shifts||[]).filter(s=>s.active!==false).reduce((sum,s)=>{
      const [sh,sm]=s.start.split(":").map(Number),[eh,em]=s.end.split(":").map(Number);
      const h=(eh+em/60)-(sh+sm/60); return sum+(h<0?h+24:h);
    },0);

    return (
      <div>
        <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>
          {subTabs.map(([id,lbl])=>(
            <button key={id} onClick={()=>setActiveConfigTab(id)} style={{padding:"5px 12px",borderRadius:5,fontSize:11,fontFamily:"'DM Mono',monospace",color:activeConfigTab===id?"#F59E0B":"var(--text-dim)",background:activeConfigTab===id?"var(--border)":"none",border:activeConfigTab===id?"1px solid var(--border-2)":"1px solid transparent",cursor:"pointer"}}>{lbl}</button>
          ))}
        </div>

        {activeConfigTab==="stages"&&(
          <div>
            <div style={{fontSize:11,color:"var(--text-muted)",background:"rgba(167,139,250,.05)",border:"1px solid rgba(167,139,250,.2)",borderRadius:7,padding:"9px 13px",marginBottom:10,lineHeight:1.5}}>

            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>{line.stages.length} etapas en {line?.name}</div>
                {/* View toggle */}
                <div style={{display:"flex",gap:3,background:"var(--surface)",padding:3,borderRadius:5,border:"1px solid var(--border)"}}>
                  {[["table","📋 Tabla"],["graph","🕸 Grafo"]].map(([id,lbl]) => (
                    <button key={id} onClick={()=>setStagesView(id)} style={{padding:"4px 10px",borderRadius:3,border:"none",fontFamily:"'DM Mono',monospace",fontSize:10,cursor:"pointer",
                      background: stagesView===id ? "var(--surface-2)" : "transparent",
                      color: stagesView===id ? "var(--text)" : "var(--text-dim)",
                      fontWeight: stagesView===id ? 600 : 400}}>{lbl}</button>

                </div>
              </div>
              <button onClick={()=>handleAddStage(activeLine)} style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>+ Agregar etapa</button>
            </div>

            {/* GRAPH VIEW */}
            {stagesView === "graph" && (
              <StagesGraph
                line={line}
                onToggle={(stageId, prereqId) => handleTogglePrerequisite(activeLine, stageId, prereqId)}
                onClear={() => handleClearAllPrerequisites(activeLine)}
                wouldCreateCycle={wouldCreateCycle}/>
            )}

            {/* TABLE VIEW (original) */}
            {stagesView === "table" && (line.stages.length===0 ? <div style={{textAlign:"center",padding:"30px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>Sin etapas. Agrega la primera para empezar a definir el ruteo.</div> : (
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr>{["ID","Etapa","Orden","Máquinas","Prerrequisitos",""].map(h=><th key={h} style={{textAlign:"left",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 10px",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
              <tbody>{line.stages.sort((a,b)=>a.order-b.order).map(s=>{
                const prereqs = Array.isArray(s.prerequisites) ? s.prerequisites : [];
                const otherStages = line.stages.filter(o => o.id !== s.id).sort((a,b)=>a.order-b.order);
                return (
                <tr key={s.id} style={{borderBottom:"1px solid var(--surface)"}}>
                  <td style={{padding:"7px 10px",fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text-dim)"}}>{s.id}</td>
                  <td style={{padding:"7px 10px"}}><TextInput value={s.name} onCommit={v=>handleUpdateStage(activeLine,s.id,"name",v)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:12,outline:"none",width:"100%",maxWidth:240}}/></td>
                  <td style={{padding:"7px 10px"}}><NumberInput value={s.order} onCommit={v=>handleUpdateStage(activeLine,s.id,"order",v)} min={1} step={1} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",width:56}}/></td>
                  <td style={{padding:"7px 10px"}}>{line.machines.filter(m=>m.stageId===s.id).map(m=><span key={m.id} style={{display:"inline-block",background:"var(--border)",borderRadius:4,padding:"1px 7px",fontSize:10,margin:2,color:"var(--text-muted)"}}>{m.name}</span>)||<span style={{color:"var(--text-dim)",fontSize:10}}>—</span>}</td>
                  <td style={{padding:"7px 10px",maxWidth:280}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
                      {otherStages.length === 0 ? (
                        <span style={{fontSize:10,color:"var(--text-dim)",fontStyle:"italic"}}>—</span>
                      ) : (
                        <>
                          {otherStages.map(o => {
                            const isOn = prereqs.includes(o.id);
                            return (
                              <button key={o.id} onClick={()=>handleTogglePrerequisite(activeLine, s.id, o.id)}
                                title={isOn ? `${o.name} debe terminar antes que ${s.name}` : `Click para agregar ${o.name} como prerrequisito de ${s.name}`}
                                style={{padding:"2px 7px",fontSize:9,borderRadius:3,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontWeight:isOn?700:500,
                                  background: isOn ? "rgba(167,139,250,.15)" : "transparent",
                                  border: "1px solid " + (isOn ? "rgba(167,139,250,.4)" : "var(--border-2)"),
                                  color: isOn ? "#A78BFA" : "var(--text-dim)"}}>

                          )}

                    </div>
                  </td>
                  <td style={{padding:"7px 6px"}}><button onClick={()=>handleRemoveStage(activeLine,s.id)} title="Eliminar etapa (también borra sus máquinas)" style={{width:22,height:22,borderRadius:4,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:13,lineHeight:1}}>×</button></td>
                </tr>
              );})}</tbody>
            </table>
            ))}

            {/* Family Routes Panel (Phase 2 — 1.1) */}
            {line.stages.length > 0 && (() => {
              const families = [...new Set(line.skus.map(s => s.family).filter(Boolean))];
              const familyRoutes = line.familyRoutes || {};
              if (families.length === 0) return null;
              return (
                <div style={{marginTop:24,padding:14,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:6}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:"#38BDF8"}}>🛣 Rutas por familia</div>
                      <div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,lineHeight:1.4}}>
                        Define una secuencia de etapas diferente para todos los SKUs de una familia. Si un SKU tiene su propia ruta personalizada (configurada en SKUs), esa gana sobre la de su familia.
                      </div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:8}}>
                    {families.map(fam => {
                      const route = familyRoutes[fam];
                      const hasCustom = Array.isArray(route) && route.length > 0;
                      const stageNames = hasCustom ? route.map(sid => line.stages.find(s=>s.id===sid)?.name || "?").filter(Boolean) : line.stages.slice().sort((a,b)=>a.order-b.order).map(s=>s.name);
                      const skuCount = line.skus.filter(s => s.family === fam).length;
                      return (
                        <div key={fam} style={{padding:"9px 11px",background:"var(--surface-2)",border:"1px solid "+(hasCustom?"rgba(56,189,248,.3)":"var(--border-2)"),borderRadius:6}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                            <div style={{fontSize:11,fontWeight:600}}>{fam}</div>
                            <button onClick={()=>setRouteEditor({kind:"family",lid:activeLine,target:fam})} title="Editar ruta de familia" style={{padding:"3px 8px",fontSize:9,borderRadius:4,background:hasCustom?"rgba(56,189,248,.12)":"rgba(245,158,11,.1)",border:"1px solid "+(hasCustom?"rgba(56,189,248,.3)":"rgba(245,158,11,.3)"),color:hasCustom?"#38BDF8":"#F59E0B",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontWeight:600}}>
                              {hasCustom?"✎ Editar":"+ Crear"}
                            </button>
                          </div>
                          <div style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",marginBottom:4}}>
                            {skuCount} SKU(s) · {hasCustom ? <span style={{color:"#38BDF8",fontWeight:600}}>RUTA CUSTOM</span> : <span>RUTA DEFAULT</span>}
                          </div>
                          <div style={{fontSize:10,color:"var(--text-muted)",lineHeight:1.4,wordBreak:"break-word"}}>
                            {stageNames.length === 0 ? <span style={{color:"#F87171"}}>(vacía)</span> : stageNames.join(" → ")}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {activeConfigTab==="machines"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>{line.machines.length} máquinas en {line?.name}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={handleDownloadTemplate} title="Descargar plantilla Excel con SKUs y Máquinas de esta línea" style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.25)",color:"#34D399",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>↓ Plantilla Excel</button>
                <label title="Importar SKUs y Máquinas desde Excel" style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(56,189,248,.08)",border:"1px solid rgba(56,189,248,.25)",color:"#38BDF8",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>
                  ↑ Importar Excel
                  <input type="file" accept=".xlsx,.xls" onChange={handleImportExcel} style={{display:"none"}}/>
                </label>
                <button onClick={()=>handleAddMachine(activeLine)} disabled={!line.stages.length} style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:line.stages.length?"pointer":"not-allowed",opacity:line.stages.length?1:.4,fontFamily:"'DM Mono',monospace"}}>+ Agregar máquina</button>
              </div>
            </div>
            {line.machines.length===0 ? <div style={{textAlign:"center",padding:"30px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>{line.stages.length?"Sin máquinas. Agrega la primera.":"Define al menos una etapa antes de agregar máquinas."}</div> : (
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr>{["ID","Máquina","Etapa","Cap./hora",""].map(h=><th key={h} style={{textAlign:"left",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 10px",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
              <tbody>{line.machines.map(m=>(
                <tr key={m.id} style={{borderBottom:"1px solid var(--surface)"}}>
                  <td style={{padding:"7px 10px",fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text-dim)"}}>{m.id}</td>
                  <td style={{padding:"7px 10px"}}><TextInput value={m.name} onCommit={v=>handleUpdateMachine(activeLine,m.id,"name",v)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:12,outline:"none",width:"100%",maxWidth:200}}/></td>
                  <td style={{padding:"7px 10px"}}><select value={m.stageId} onChange={e=>handleUpdateMachine(activeLine,m.id,"stageId",e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"#F59E0B",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",fontFamily:"'DM Mono',monospace"}}>{line.stages.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></td>
                  <td style={{padding:"7px 10px"}}><NumberInput value={m.capacityPerHour} onCommit={v=>handleUpdateMachine(activeLine,m.id,"capacityPerHour",v)} min={1} step={1} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",width:72}}/><span style={{fontSize:10,color:"var(--text-dim)",marginLeft:5,fontFamily:"'DM Mono',monospace"}}>pzs/h</span></td>
                  <td style={{padding:"7px 6px"}}><button onClick={()=>handleRemoveMachine(activeLine,m.id)} title="Eliminar" style={{width:22,height:22,borderRadius:4,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:13,lineHeight:1}}>×</button></td>
                </tr>
              ))}</tbody>
            </table>
            )}
          </div>
        )}

        {activeConfigTab==="skus"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>{line.skus.length} SKUs en {line?.name}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={handleDownloadTemplate} title="Descargar plantilla Excel con SKUs y Máquinas de esta línea" style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.25)",color:"#34D399",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>↓ Plantilla Excel</button>
                <label title="Importar SKUs y Máquinas desde Excel" style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(56,189,248,.08)",border:"1px solid rgba(56,189,248,.25)",color:"#38BDF8",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>
                  ↑ Importar Excel
                  <input type="file" accept=".xlsx,.xls" onChange={handleImportExcel} style={{display:"none"}}/>
                </label>
                <button onClick={()=>handleAddSku(activeLine)} disabled={!line.stages.length} style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:line.stages.length?"pointer":"not-allowed",opacity:line.stages.length?1:.4,fontFamily:"'DM Mono',monospace"}}>+ Agregar SKU</button>
              </div>
            </div>
            {line.skus.length===0 ? <div style={{textAlign:"center",padding:"30px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>{line.stages.length?"Sin SKUs. Agrega el primero.":"Define etapas antes de agregar SKUs."}</div> : (
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{["Color","ID","Nombre","Familia","Lote","Valor unit. (COP)","Inventario","Lotes/día óptimo","Máx. días","Ruta"].concat(line.stages.sort((a,b)=>a.order-b.order).map(s=>s.name+" (min)")).concat([""]).map(h=><th key={h} style={{textAlign:"left",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 8px",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                <tbody>{line.skus.map(sku=>{
                  const inv = typeof sku.inventory === "number" ? sku.inventory : 0;
                  const backlog = inv < 0;
                  const maxDays = typeof sku.maxConsecutiveDays === "number" ? sku.maxConsecutiveDays : 3;
                  const optBatches = typeof sku.optimalBatchesPerDay === "number" ? sku.optimalBatchesPerDay : 5;
                  return (
                  <tr key={sku.id} style={{borderBottom:"1px solid var(--surface)",background:backlog?"rgba(248,113,113,.04)":"transparent"}}>
                    <td style={{padding:"7px 8px"}} title="Color asignado automáticamente"><div style={{width:24,height:18,borderRadius:4,background:sku.color,border:"1px solid var(--border)"}}/></td>
                    <td style={{padding:"7px 8px",fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text-dim)"}}>{sku.id}{backlog&&<span title="Backlog - inventario negativo, se programa primero" style={{marginLeft:5,padding:"1px 5px",background:"rgba(248,113,113,.15)",border:"1px solid rgba(248,113,113,.3)",color:"#F87171",borderRadius:3,fontSize:9,fontWeight:700}}>BACKLOG</span>}</td>
                    <td style={{padding:"7px 8px"}}><TextInput value={sku.name} onCommit={v=>handleUpdateSku(activeLine,sku.id,"name",v)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:12,outline:"none",minWidth:160}}/></td>
                    <td style={{padding:"7px 8px"}}><TextInput value={sku.family} onCommit={v=>handleUpdateSku(activeLine,sku.id,"family",v)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text-muted)",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",width:100}}/></td>
                    <td style={{padding:"7px 8px"}}><NumberInput value={sku.batchSize} onCommit={v=>handleUpdateSku(activeLine,sku.id,"batchSize",v)} min={1} step={1} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",width:54}}/></td>
                    <td style={{padding:"7px 8px"}}><div style={{display:"flex",alignItems:"center",gap:3}}><span style={{color:"#34D399",fontSize:11,fontFamily:"'DM Mono',monospace"}}>$</span><NumberInput value={sku.unitValue||0} onCommit={v=>handleUpdateSku(activeLine,sku.id,"unitValue",v)} min={0} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"#34D399",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",width:110}} title="Valor por unidad en COP."/></div></td>
                    <td style={{padding:"7px 8px"}}><NumberInput value={inv} onCommit={v=>handleUpdateInventory(activeLine,sku.id,v)} step={1} allowNegative={true} style={{background:"var(--surface)",border:"1px solid "+(backlog?"rgba(248,113,113,.4)":"var(--border)"),color:backlog?"#F87171":"var(--text)",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",width:72,fontWeight:backlog?700:400}} title={backlog?"⚠ Backlog: el SKU se programa primero, ignorando heurística":"Inventario inicial. Negativo = backlog (cliente final pendiente)."}/></td>
                    <td style={{padding:"7px 8px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>

                      <td key={s.id} style={{padding:"7px 8px"}}>
                        <NumberInput value={sku.stageTimes?.[s.id]||0} onCommit={v=>handleUpdateSkuStageTime(activeLine,sku.id,s.id,v)} min={0} step={1} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",width:54}}/>

                  </tr>
                )})}</tbody>
              </table>
            </div>
            )}
          </div>
        )}

        {activeConfigTab==="forbidden"&&(() => {
          const families = [...new Set(line.skus.map(s => s.family).filter(Boolean))];
          return (
          <div>
            <div style={{fontSize:12,color:"var(--text-dim)",background:"var(--surface)",borderRadius:7,padding:"10px 14px",marginBottom:12,lineHeight:1.6}}>
              El SKU/familia "Después" no puede programarse inmediatamente después del SKU/familia "Antes". <strong style={{color:"#38BDF8"}}>Modo familia</strong>: aplica a TODOS los SKUs de la familia, sin importar cuántos sean.
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>
                {line.forbiddenSequences.length} reglas activas
                {line.forbiddenSequences.filter(f=>f.mode==="family").length > 0 && (
                  <span style={{marginLeft:8,color:"#38BDF8"}}>· {line.forbiddenSequences.filter(f=>f.mode==="family").length} por familia</span>
                )}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>handleAddForbidden(activeLine,"sku")} disabled={line.skus.length<2} style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:line.skus.length>=2?"pointer":"not-allowed",opacity:line.skus.length>=2?1:.4,fontFamily:"'DM Mono',monospace"}}>+ Por SKU</button>
                <button onClick={()=>handleAddForbidden(activeLine,"family")} disabled={families.length<2} title={families.length<2?"Necesitas al menos 2 familias distintas":""} style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.3)",color:"#38BDF8",cursor:families.length>=2?"pointer":"not-allowed",opacity:families.length>=2?1:.4,fontFamily:"'DM Mono',monospace"}}>+ Por Familia</button>
              </div>
            </div>
            {line.forbiddenSequences.length===0
              ?<div style={{textAlign:"center",padding:"30px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>{line.skus.length>=2?"Sin rutas prohibidas. Agrega la primera regla.":"Necesitas al menos 2 SKUs para definir reglas."}</div>

                  const ts = isFam ? null : line.skus.find(s=>s.id===f.to);
                  const fromCount = isFam ? line.skus.filter(s=>s.family===f.from).length : 0;
                  const toCount   = isFam ? line.skus.filter(s=>s.family===f.to).length   : 0;
                  return (<tr key={f.id} style={{borderBottom:"1px solid var(--surface)",background:isFam?"rgba(56,189,248,.04)":"transparent"}}>

                      </div>
                    </td>
                    <td style={{padding:"7px 10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
