                        <select value={f.to} onChange={e=>handleUpdateForbidden(activeLine,f.id,"to",e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",minWidth:140,fontFamily:"'DM Mono',monospace"}}>
                          {isFam
                            ? families.map(fam => <option key={fam} value={fam}>{fam}</option>)
                            : line.skus.map(s => <option key={s.id} value={s.id}>{s.name}</option>)
                          }
                        </select>
                        {isFam && <span style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>({toCount} SKUs)</span>}
                      </div>
                    </td>
                    <td style={{padding:"7px 10px"}}><TextInput value={f.reason} onCommit={v=>handleUpdateForbidden(activeLine,f.id,"reason",v)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",width:"100%",minWidth:240}}/></td>
                    <td style={{padding:"7px 6px"}}><button onClick={()=>handleRemoveForbidden(activeLine,f.id)} title="Eliminar" style={{width:22,height:22,borderRadius:4,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:13,lineHeight:1}}>×</button></td>
                  </tr>);
                })}</tbody>
              </table>
            }
          </div>
          );
        })()}

        {activeConfigTab==="priorities"&&(
          <div>
            <div style={{fontSize:12,color:"var(--text-dim)",background:"var(--surface)",borderRadius:7,padding:"10px 14px",marginBottom:12,lineHeight:1.6}}>
              <strong style={{color:"var(--text)"}}>Reglas de precedencia:</strong> el SKU "Primero" se programa antes que el SKU "Después" cuando ambos están en la cola.
              Útil cuando un SKU de mayor tamaño/complejidad debe procesarse primero por si surge un error (ej: comedores 6p antes que 4p para reaprovechar MP).
              Las reglas se aplican <strong style={{color:"#34D399"}}>después</strong> del backlog (inventario negativo) y <strong style={{color:"#FBBF24"}}>antes</strong> de la heurística normal.
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>{(line.priorityRules||[]).length} reglas activas</div>
              <button onClick={()=>handleAddPriorityRule(activeLine)} disabled={line.skus.length<2} style={{fontSize:11,padding:"5px 12px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:line.skus.length>=2?"pointer":"not-allowed",opacity:line.skus.length>=2?1:.4,fontFamily:"'DM Mono',monospace"}}>+ Agregar regla</button>
            </div>
            {!(line.priorityRules||[]).length
              ? <div style={{textAlign:"center",padding:"30px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>{line.skus.length>=2?"Sin reglas de prioridad definidas. Agrega la primera regla.":"Necesitas al menos 2 SKUs para definir reglas."}</div>
              : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{["ID","Primero →","Después","Razón",""].map(h=><th key={h} style={{textAlign:"left",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"7px 10px",borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead>
                <tbody>{(line.priorityRules||[]).map(r=>{
                  const fs=line.skus.find(s=>s.id===r.from),ts=line.skus.find(s=>s.id===r.before);
                  return (<tr key={r.id} style={{borderBottom:"1px solid var(--surface)"}}>
                    <td style={{padding:"7px 10px",fontFamily:"'DM Mono',monospace",fontSize:11,color:"var(--text-dim)"}}>{r.id}</td>
                    <td style={{padding:"7px 10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:fs?.color||"var(--border-2)"}}/>
                        <select value={r.from} onChange={e=>handleUpdatePriorityRule(activeLine,r.id,"from",e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"#34D399",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",minWidth:140,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{line.skus.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
                      </div>
                    </td>
                    <td style={{padding:"7px 10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:ts?.color||"var(--border-2)"}}/>
                        <select value={r.before} onChange={e=>handleUpdatePriorityRule(activeLine,r.id,"before",e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",minWidth:140,fontFamily:"'DM Mono',monospace"}}>{line.skus.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
                      </div>
                    </td>
                    <td style={{padding:"7px 10px"}}><TextInput value={r.reason} onCommit={v=>handleUpdatePriorityRule(activeLine,r.id,"reason",v)} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",padding:"4px 7px",borderRadius:4,fontSize:11,outline:"none",width:"100%",minWidth:240}}/></td>
                    <td style={{padding:"7px 6px"}}><button onClick={()=>handleRemovePriorityRule(activeLine,r.id)} title="Eliminar" style={{width:22,height:22,borderRadius:4,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:13,lineHeight:1}}>×</button></td>
                  </tr>);
                })}</tbody>
              </table>
            }
            <div style={{marginTop:14,padding:"10px 14px",background:"rgba(248,113,113,.05)",border:"1px solid rgba(248,113,113,.2)",borderRadius:7,fontSize:11,color:"var(--text-muted)",lineHeight:1.6}}>
              <strong style={{color:"#F87171"}}>📦 Inventario / Backlog:</strong> En la pestaña <strong style={{color:"var(--text)"}}>SKUs</strong> puedes editar el inventario inicial de cada producto. Si el valor es <strong style={{color:"#F87171"}}>negativo</strong>, significa que tienes backlog (compromisos pendientes con cliente final) y esos SKUs se programan automáticamente <strong>al inicio de la cola</strong>, ignorando la heurística.
            </div>
          </div>
        )}

        {activeConfigTab==="setup"&&(
          <div>
            <div style={{fontSize:12,color:"var(--text-dim)",background:"var(--surface)",borderRadius:7,padding:"10px 14px",marginBottom:12,lineHeight:1.6}}>Minutos de setup al cambiar de SKU. Edita cualquier celda; 0 ó vacío = sin setup. <span style={{color:"#34D399"}}>Verde</span> &lt;30min, <span style={{color:"#FBBF24"}}>Amarillo</span> 30-60min, <span style={{color:"#F87171"}}>Rojo</span> &gt;60min.</div>
            {line.skus.length<2 ? <div style={{textAlign:"center",padding:"30px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>Necesitas al menos 2 SKUs para usar matriz de setup.</div> : (
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:11}}>
                <thead><tr>
                  <th style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textAlign:"left",minWidth:80}}>Desde ↓ / Hacia →</th>
                  {line.skus.map(s=><th key={s.id} style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textAlign:"center",minWidth:80,whiteSpace:"nowrap"}}><span style={{display:"inline-block",width:7,height:7,borderRadius:1,background:s.color,marginRight:4,verticalAlign:"middle"}}/>{s.id}</th>)}
                </tr></thead>
                <tbody>{line.skus.map(from=>(
                  <tr key={from.id} style={{borderBottom:"1px solid var(--surface)"}}>
                    <td style={{padding:"6px 12px",fontFamily:"'DM Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}><span style={{display:"inline-block",width:7,height:7,borderRadius:1,background:from.color,marginRight:5,verticalAlign:"middle"}}/>{from.id}</td>
                    {line.skus.map(to=>{
                      if(from.id===to.id) return <td key={to.id} style={{padding:"6px 12px",textAlign:"center",color:"var(--border-2)",fontFamily:"'DM Mono',monospace"}}>—</td>;
                      const m=line.setupMatrix?.[`${from.id}|${to.id}`]||0;
                      const c=m===0?"var(--text-dim)":m<30?"#34D399":m<60?"#FBBF24":"#F87171";
                      return <td key={to.id} style={{padding:"4px 8px",textAlign:"center"}}>
                        <NumberInput value={m||""} onCommit={v=>handleUpdateSetup(activeLine,from.id,to.id,v)} min={0} step={1} placeholder="0"
                          style={{width:46,background:"transparent",border:"1px solid transparent",color:c,fontFamily:"'DM Mono',monospace",fontSize:11,textAlign:"center",outline:"none",padding:"2px 4px",borderRadius:3,fontWeight:m>0?600:400}}/>
                      </td>;
                    })}
                  </tr>
                ))}</tbody>
              </table>
            </div>
            )}
          </div>
        )}

        {/* ── TURNOS TAB ────────────────────────────────────── */}
        {activeConfigTab==="shifts"&&(
          <div>
            {/* Production Calendar */}
            <div style={{marginBottom:22}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>📅 Calendario de producción</div>
              <ProductionCalendar
                line={line}
                onToggle={(dateStr)=>handleDateOverrideToggle(activeLine, dateStr)}
                onClear={()=>handleDateOverrideClear(activeLine)}
                dailyGoals={data.dailyGoals?.[activeLine] || {}}
                viewMonth={calendarViewMonth}
                setViewMonth={setCalendarViewMonth}
              />
            </div>

            {/* Working Days */}
            <div style={{marginBottom:22}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>Patrón semanal — días hábiles por defecto</div>
              <div style={{display:"flex",gap:6}}>
                {[1,2,3,4,5,6,0].map(day=>{
                  const isActive=(line.workingDays||[]).includes(day);
                  return (
                    <button key={day} onClick={()=>handleWorkingDayToggle(activeLine,day)} style={{width:44,height:44,borderRadius:8,fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600,cursor:"pointer",
                      background:isActive?line.color+"CC":"var(--surface-2)",color:isActive?"#fff":"var(--text-dim)",
                      border:isActive?`1px solid ${line.color}`:"1px solid var(--border-2)",transition:"all .2s"}}>
                      {DAY_NAMES[day]}
                    </button>
                  );
                })}
              </div>
              <div style={{fontSize:10,color:"var(--text-dim)",marginTop:7,fontFamily:"'DM Mono',monospace"}}>
                {(line.workingDays||[]).length} días/semana · {shiftHrsDay.toFixed(1)} h/día activas · {((line.workingDays||[]).length*shiftHrsDay).toFixed(0)} h/semana
              </div>
            </div>

            {/* 24h Timeline visualization */}
            <div style={{marginBottom:22}}>
              <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>Vista 24 horas</div>
              <div style={{position:"relative",height:38,background:"var(--surface-2)",borderRadius:7,border:"1px solid var(--border)",overflow:"hidden",marginBottom:16}}>
                {/* background grid lines */}
                {[0,3,6,9,12,15,18,21].map(h=>(
                  <div key={h} style={{position:"absolute",top:0,bottom:0,left:`${(h/24)*100}%`,borderLeft:"1px solid rgba(255,255,255,.05)",pointerEvents:"none"}}/>
                ))}
                {/* shift segments */}
                {(line.shifts||[]).map(shift=>{
                  const [sh,sm]=shift.start.split(":").map(Number),[eh,em]=shift.end.split(":").map(Number);
                  const sH=sh+sm/60, eH=eh+em/60;
                  const overnight=eH<=sH;
                  const segs=overnight
                    ?[{l:(sH/24)*100,w:((24-sH)/24)*100},{l:0,w:(eH/24)*100}]
                    :[{l:(sH/24)*100,w:((eH-sH)/24)*100}];
                  const isActive=shift.active!==false;
                  return segs.map((seg,i)=>(
                    <div key={`${shift.id}-${i}`} style={{position:"absolute",top:4,bottom:4,left:`${seg.l}%`,width:`${Math.max(seg.w,.5)}%`,
                      background:isActive?line.color+"99":"var(--border-2)",borderRadius:3,overflow:"hidden",
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {i===0&&seg.w>4&&<span style={{fontSize:9,color:"rgba(255,255,255,.7)",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",paddingLeft:4,overflow:"hidden"}}>{shift.name}</span>}
                    </div>
                  ));
                })}
              </div>
              {/* hour labels */}
              <div style={{position:"relative",height:14}}>
                {[0,6,12,18,24].map(h=>(
                  <span key={h} style={{position:"absolute",left:`${(h/24)*100}%`,transform:"translateX(-50%)",fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>{h===24?"0:00":`${h}:00`}</span>
                ))}
              </div>
            </div>

            {/* Shift list */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>Turnos ({(line.shifts||[]).length})</div>
                <button onClick={()=>handleAddShift(activeLine)} style={{fontSize:10,padding:"4px 10px",borderRadius:5,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:"pointer"}}>+ Agregar turno</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {(line.shifts||[]).map(shift=>{
                  const shiftDays = shift.days && shift.days.length ? shift.days : (line.workingDays || [1,2,3,4,5]);
                  const toggleShiftDay = (day) => {
                    const cur = shiftDays;
                    const next = cur.includes(day) ? cur.filter(d=>d!==day) : [...cur, day].sort((a,b)=>a-b);
                    handleShiftUpdate(activeLine, shift.id, "days", next);
                  };
                  const isOnAllWorkingDays = (line.workingDays || []).every(d => shiftDays.includes(d));
                  return (
                  <div key={shift.id} style={{padding:"10px 12px",background:"var(--surface-2)",borderRadius:7,border:`1px solid ${shift.active!==false?"var(--border-2)":"var(--border-alt)"}`,opacity:shift.active!==false?1:.65}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto 26px",gap:8,alignItems:"center"}}>
                      <TextInput value={shift.name} onCommit={v=>handleShiftUpdate(activeLine,shift.id,"name",v)} style={{background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"5px 9px",borderRadius:5,fontSize:12,outline:"none"}}/>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>Inicio</span>
                        <input type="time" value={shift.start} onChange={e=>handleShiftUpdate(activeLine,shift.id,"start",e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"4px 6px",borderRadius:5,fontSize:11,outline:"none",fontFamily:"'DM Mono',monospace",width:78,colorScheme:themeMode==="dark"?"dark":"light"}}/>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>Fin</span>
                        <input type="time" value={shift.end} onChange={e=>handleShiftUpdate(activeLine,shift.id,"end",e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"4px 6px",borderRadius:5,fontSize:11,outline:"none",fontFamily:"'DM Mono',monospace",width:78,colorScheme:themeMode==="dark"?"dark":"light"}}/>
                      </div>
                      <button onClick={()=>handleShiftUpdate(activeLine,shift.id,"active",shift.active===false)} style={{padding:"4px 10px",borderRadius:5,cursor:"pointer",fontSize:10,fontFamily:"'DM Mono',monospace",
                        background:shift.active!==false?"rgba(52,211,153,.1)":"rgba(248,113,113,.08)",
                        border:shift.active!==false?"1px solid rgba(52,211,153,.3)":"1px solid rgba(248,113,113,.2)",
                        color:shift.active!==false?"#34D399":"#F87171"}}>
                        {shift.active!==false?"● Activo":"○ Inactivo"}
                      </button>
                      <button onClick={()=>handleRemoveShift(activeLine,shift.id)} style={{width:26,height:26,borderRadius:5,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:15,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                    <div style={{marginTop:6,fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>
                      {shift.start} → {shift.end}
                      {(() => { const [sh,sm]=shift.start.split(":").map(Number),[eh,em]=shift.end.split(":").map(Number); let h=(eh+em/60)-(sh+sm/60); if(h<0)h+=24; return ` · ${h.toFixed(1)}h`; })()}
                      {shift.end < shift.start && <span style={{color:"#FBBF24",marginLeft:6}}>↪ turno nocturno</span>}
                    </div>
                    {/* Per-day toggle buttons */}
                    <div style={{marginTop:8,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginRight:2}}>Aplica:</span>
                      {[[1,"Lun"],[2,"Mar"],[3,"Mié"],[4,"Jue"],[5,"Vie"],[6,"Sáb"],[0,"Dom"]].map(([day,lbl])=>{
                        const isOn = shiftDays.includes(day);
                        const lineWorks = (line.workingDays||[]).includes(day);
                        return (
                          <button key={day}
                            onClick={()=>toggleShiftDay(day)}
                            title={lineWorks ? (isOn?`Este turno opera ${lbl}. Click para excluir.`:`Este turno NO opera ${lbl}. Click para incluir.`) : `La línea no opera ${lbl} (configurar en patrón semanal abajo).`}
                            style={{
                              padding:"3px 8px",fontSize:10,borderRadius:4,cursor:"pointer",
                              fontFamily:"'DM Mono',monospace",fontWeight:isOn?600:400,
                              background: isOn ? (lineWorks?"rgba(52,211,153,.15)":"rgba(245,158,11,.1)") : "transparent",
                              border: isOn ? `1px solid ${lineWorks?"rgba(52,211,153,.4)":"rgba(245,158,11,.4)"}` : "1px solid var(--border-2)",
                              color: isOn ? (lineWorks?"#34D399":"#F59E0B") : "var(--text-dim)",
                              opacity: lineWorks ? 1 : 0.55
                            }}>
                            {lbl}
                          </button>
                        );
                      })}
                      {!isOnAllWorkingDays && (
                        <button onClick={()=>handleShiftUpdate(activeLine,shift.id,"days",[...(line.workingDays||[1,2,3,4,5])])} title="Aplicar este turno a todos los días que la línea opera" style={{marginLeft:6,padding:"3px 8px",fontSize:9,borderRadius:4,background:"transparent",border:"1px dashed var(--border-2)",color:"var(--text-dim)",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>
                          ↺ Igualar a línea
                        </button>
                      )}
                    </div>
                  </div>
                )})}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  //  RENDER
  // ════════════════════════════════════════════════════════════

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body,html{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
        .app{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:16px;}
        .brand{display:flex;align-items:center;gap:10px;}
        .brand-mark{width:30px;height:30px;background:linear-gradient(135deg,#F59E0B,#EF4444);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff;}
        .brand-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.02em;}
        .kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border);flex-shrink:0;}
        .kpi{padding:10px 16px;border-right:1px solid var(--border);}
        .kpi:last-child{border-right:none;}
        .body{display:grid;grid-template-columns:1fr 310px;flex:1;overflow:hidden;}
        .left{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
        .tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .tab-btn{padding:8px 13px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
        .tab-btn.active{color:#F59E0B;border-bottom-color:#F59E0B;}
        .panel{flex:1;overflow-y:auto;padding:16px 18px;}
        .panel::-webkit-scrollbar{width:3px;}
        .panel::-webkit-scrollbar-thumb{background:var(--border-2);}
        .ai-panel{display:flex;flex-direction:column;background:var(--surface);overflow:hidden;}
        .ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px;}
        .ai-msgs::-webkit-scrollbar{width:3px;}
        .ai-msgs::-webkit-scrollbar-thumb{background:var(--border-2);}
        .bubble{padding:9px 12px;border-radius:9px;font-size:12px;line-height:1.65;white-space:pre-wrap;}
        .user-bubble{background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2);border-bottom-right-radius:2px;align-self:flex-end;max-width:92%;}
        .ai-bubble{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:2px;align-self:flex-start;max-width:92%;}
        .loading span{animation:blink 1.2s infinite;display:inline-block;}
        .loading span:nth-child(2){animation-delay:.15s;}
        .loading span:nth-child(3){animation-delay:.3s;}
        @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
        .ai-pulse{width:7px;height:7px;background:#34D399;border-radius:50%;animation:pulse 2s infinite;display:inline-block;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
      `}</style>
      <div className="app">
        <header className="topbar">
          <div className="brand">
            <div className="brand-mark">PS</div>
            <div className="brand-name">ProdScheduler</div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {data.lines.map(l=>(
              <button key={l.id} onClick={()=>setActiveLine(l.id)} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",border:"1px solid transparent",transition:"all .2s",background:activeLine===l.id?l.color:"transparent",color:activeLine===l.id?"#fff":"var(--text-dim)"}}>
                {l.name}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {lastSaved && (
              <span title={`Auto-guardado: ${new Date(lastSaved).toLocaleString("es-MX")}`}
                style={{fontSize:10,color:"#34D399",fontFamily:"'DM Mono',monospace",display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:"#34D399",boxShadow:"0 0 6px #34D399"}}/>
                guardado {(()=>{
                  const diff = (Date.now() - new Date(lastSaved).getTime())/1000;
                  if (diff < 5) return "ahora";
                  if (diff < 60) return `hace ${Math.floor(diff)}s`;
                  if (diff < 3600) return `hace ${Math.floor(diff/60)}m`;
                  const d = new Date(lastSaved);
                  return d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
                })()}
              </span>
            )}
            <button onClick={handleExportData} title="Descargar respaldo JSON" style={{padding:"5px 10px",borderRadius:5,background:"transparent",border:"1px solid var(--border-alt)",color:"var(--text-muted)",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}}>↓ Exportar</button>
            <label title="Cargar respaldo JSON" style={{padding:"5px 10px",borderRadius:5,background:"transparent",border:"1px solid var(--border-alt)",color:"var(--text-muted)",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
              ↑ Importar
              <input type="file" accept=".json,application/json" onChange={handleImportData} style={{display:"none"}}/>
            </label>
            <button onClick={()=>setShowApiKeyModal(true)} title={apiKey?"API key configurada (click para cambiar)":"Configurar API key para el asistente IA"} style={{padding:"5px 10px",borderRadius:5,background:apiKey?"rgba(52,211,153,.08)":"transparent",border:"1px solid "+(apiKey?"rgba(52,211,153,.3)":"var(--border-alt)"),color:apiKey?"#34D399":"var(--text-muted)",cursor:"pointer",fontSize:13,fontFamily:"'DM Mono',monospace",width:32,lineHeight:1}}>🔑</button>
            <button onClick={toggleTheme} title={themeMode==="dark"?"Cambiar a modo claro":"Cambiar a modo oscuro"} style={{padding:"5px 10px",borderRadius:5,background:"transparent",border:"1px solid var(--border-alt)",color:"var(--text-muted)",cursor:"pointer",fontSize:13,fontFamily:"'DM Mono',monospace",width:32,lineHeight:1}}>{themeMode==="dark"?"☀":"☾"}</button>
            <button onClick={()=>setShowResetConfirm(true)} title="Restaurar datos de ejemplo" style={{padding:"5px 10px",borderRadius:5,background:"transparent",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}}>↺ Reset</button>
            <span style={{width:1,height:18,background:"var(--border-alt)"}}/>
            <span style={{fontSize:11,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".06em"}}>Heurística</span>
            <select value={heuristic} onChange={e=>{setHeuristic(e.target.value);setCustomOrder(p=>({...p,[activeLine]:null}));}} style={{background:"var(--surface-2)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"5px 10px",borderRadius:6,fontFamily:"'DM Mono',monospace",fontSize:11,outline:"none",cursor:"pointer"}}>
              <option value="MS">MS – Modified Slack ★ recomendado</option>
              <option value="EDD">EDD – Earliest Due Date</option>
              <option value="SPT">SPT – Shortest Processing Time</option>
              <option value="LPT">LPT – Longest Processing Time</option>
              <option value="WSPT">WSPT – Weighted SPT</option>
              <option value="CR">CR – Critical Ratio</option>
              <option value="FIFO">FIFO</option>
            </select>
            <button onClick={()=>setUse2opt(v=>!v)}
              title={use2opt
                ? "2-opt activo: post-optimización que intercambia pares para reducir Tmax (hasta 60 lotes). Click para desactivar."
                : "2-opt desactivado. Click para activar post-optimización automática."}
              style={{
                padding:"5px 10px",borderRadius:6,
                background: use2opt ? "rgba(52,211,153,.12)" : "transparent",
                border: "1px solid " + (use2opt ? "rgba(52,211,153,.35)" : "var(--border-2)"),
                color: use2opt ? "#34D399" : "var(--text-dim)",
                cursor:"pointer",fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:600
              }}>
              {use2opt ? "🔧 2-opt ON" : "○ 2-opt"}
            </button>
          </div>
        </header>

        {showResetConfirm && (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={()=>setShowResetConfirm(false)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:10,padding:24,maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:10,color:"#F87171"}}>¿Borrar todos los datos?</div>
              <div style={{fontSize:13,color:"var(--text-muted)",lineHeight:1.5,marginBottom:18}}>
                Se eliminarán todas las órdenes, máquinas, SKUs y configuraciones personalizadas. Se restaurarán los datos de ejemplo iniciales. Esta acción no se puede deshacer (te recomendamos <strong style={{color:"#34D399"}}>↓ Exportar</strong> primero).
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button onClick={()=>setShowResetConfirm(false)} style={{padding:"7px 16px",borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-muted)",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Cancelar</button>
                <button onClick={handleResetData} style={{padding:"7px 16px",borderRadius:5,background:"rgba(248,113,113,.15)",border:"1px solid rgba(248,113,113,.3)",color:"#F87171",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Sí, borrar todo</button>
              </div>
            </div>
          </div>
        )}

        {showHorizonModal && (() => {
          const modalProdDays = countProductiveDays(horizonStart, horizonEnd, line?.workingDays, line?.dateOverrides);
          const monthlyTotal = horizonDefault * modalProdDays;
          const setMonthly = (v) => {
            if (modalProdDays > 0) setHorizonDefault(Math.round(v / modalProdDays));
          };
          return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={()=>setShowHorizonModal(false)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:10,padding:24,maxWidth:520,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:6,color:"#F59E0B"}}>📅 Horizonte de facturación</div>
              <div style={{fontSize:12,color:"var(--text-muted)",lineHeight:1.5,marginBottom:18}}>
                Generará una meta diaria para cada día hábil entre las dos fechas en <strong style={{color:"#34D399"}}>{line?.name}</strong>. Días no laborables según la configuración de turnos se omiten automáticamente.
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div>
                  <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Fecha inicial</div>
                  <input type="date" value={horizonStart} onChange={e=>setHorizonStart(e.target.value)} style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"7px 10px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:12,outline:"none",colorScheme:themeMode==="dark"?"dark":"light"}}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Fecha final</div>
                  <input type="date" value={horizonEnd} onChange={e=>setHorizonEnd(e.target.value)} style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"7px 10px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:12,outline:"none",colorScheme:themeMode==="dark"?"dark":"light"}}/>
                </div>
              </div>

              {/* Days info bar */}
              <div style={{padding:"8px 12px",background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.2)",borderRadius:6,fontSize:11,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>📊</span>
                <span style={{color:"var(--text-muted)"}}>Días hábiles en el horizonte:</span>
                <span style={{color:"#F59E0B",fontWeight:700,fontFamily:"'DM Mono',monospace",fontSize:13}}>{modalProdDays}</span>
                <span style={{color:"var(--text-dim)",fontSize:10,fontFamily:"'DM Mono',monospace"}}>(según calendario y turnos)</span>
              </div>

              {/* Two parallel goal inputs: monthly + daily */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div style={{padding:"10px 12px",background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.25)",borderRadius:7}}>
                  <div style={{fontSize:10,color:"#38BDF8",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6,fontWeight:600}}>💰 Meta mensual total (COP)</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:"#38BDF8",fontFamily:"'DM Mono',monospace",fontSize:14}}>$</span>
                    <NumberInput value={monthlyTotal} onCommit={v=>setMonthly(v)} min={0} style={{flex:1,background:"var(--surface)",border:"1px solid rgba(56,189,248,.3)",color:"#38BDF8",padding:"7px 10px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:13,outline:"none",fontWeight:600}}/>
                  </div>
                  <div style={{fontSize:9,color:"var(--text-dim)",marginTop:5,fontFamily:"'DM Mono',monospace"}}>Se divide entre {modalProdDays} días</div>
                </div>
                <div style={{padding:"10px 12px",background:"rgba(52,211,153,.05)",border:"1px solid rgba(52,211,153,.25)",borderRadius:7}}>
                  <div style={{fontSize:10,color:"#34D399",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6,fontWeight:600}}>📆 Meta por día (COP)</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:"#34D399",fontFamily:"'DM Mono',monospace",fontSize:14}}>$</span>
                    <NumberInput value={horizonDefault} onCommit={v=>setHorizonDefault(v)} min={0} style={{flex:1,background:"var(--surface)",border:"1px solid rgba(52,211,153,.3)",color:"#34D399",padding:"7px 10px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:13,outline:"none",fontWeight:600}}/>
                  </div>
                  <div style={{fontSize:9,color:"var(--text-dim)",marginTop:5,fontFamily:"'DM Mono',monospace"}}>Aplica a cada día hábil</div>
                </div>
              </div>

              {/* Helper text — edit either field */}
              <div style={{fontSize:10,color:"var(--text-dim)",textAlign:"center",marginBottom:14,fontStyle:"italic"}}>
                Edita cualquiera de los dos campos — el otro se ajusta automáticamente
              </div>

              <div style={{padding:"10px 14px",background:"rgba(56,189,248,.06)",border:"1px solid rgba(56,189,248,.2)",borderRadius:6,fontSize:11,color:"var(--text-muted)",lineHeight:1.5,marginBottom:18}}>
                <strong style={{color:"#38BDF8"}}>ℹ Solo agrega días nuevos.</strong> No reemplaza las metas existentes. Para borrar metas individuales, usa el botón × en la tabla. Días no productivos (según calendario) se omiten automáticamente.
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button onClick={()=>setShowHorizonModal(false)} style={{padding:"7px 16px",borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-muted)",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Cancelar</button>
                <button onClick={handleApplyHorizon} disabled={modalProdDays===0} style={{padding:"7px 16px",borderRadius:5,background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:modalProdDays===0?"not-allowed":"pointer",opacity:modalProdDays===0?.4:1,fontSize:12,fontFamily:"'DM Mono',monospace"}}>Generar metas</button>
              </div>
            </div>
          </div>
          );
        })()}

        {showCleanGoalsModal && (() => {
          const goalsForActive = data.dailyGoals?.[activeLine] || {};
          const allGoalsForActive = Object.keys(goalsForActive);
          let toDelete = 0, scopeDescription = "";
          if (cleanScope === "range") {
            toDelete = allGoalsForActive.filter(k => (!cleanStart || k >= cleanStart) && (!cleanEnd || k <= cleanEnd)).length;
            scopeDescription = `en ${line?.name} entre ${cleanStart || "inicio"} y ${cleanEnd || "fin"}`;
          } else if (cleanScope === "line") {
            toDelete = allGoalsForActive.length;
            scopeDescription = `todas en ${line?.name}`;
          } else {
            toDelete = data.lines.reduce((s,l) => s + Object.keys(data.dailyGoals?.[l.id] || {}).length, 0);
            scopeDescription = `TODAS de TODAS las líneas`;
          }
          const apply = () => {
            if (cleanScope === "range") {
              handleClearGoalsRange(activeLine, cleanStart || null, cleanEnd || null);
            } else if (cleanScope === "line") {
              handleClearGoalsRange(activeLine, null, null);
            } else {
              handleHardResetGoals();
            }
            setShowCleanGoalsModal(false);
            setTimeout(() => alert(`✓ ${toDelete} meta(s) eliminada(s)`), 50);
          };
          return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={()=>setShowCleanGoalsModal(false)}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:10,padding:24,maxWidth:520,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:6,color:"#F87171"}}>🗑 Limpiar metas</div>
              <div style={{fontSize:12,color:"var(--text-muted)",lineHeight:1.5,marginBottom:18}}>
                Elimina metas de facturación en bloque. Esta acción no se puede deshacer (próximamente: papelera con undo).
              </div>

              {/* Scope selector */}
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                {[
                  ["range", "📅 Por rango de fechas", `Elimina solo metas dentro de un rango en ${line?.name}`],
                  ["line",  "📋 Toda la línea actual", `Borra TODAS las metas de ${line?.name}`],
                  ["all",   "🔥 Hard Reset Global",    "Borra TODAS las metas de TODAS las líneas"]
                ].map(([id, lbl, desc]) => (
                  <label key={id} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"9px 12px",borderRadius:6,cursor:"pointer",
                    background: cleanScope===id ? "var(--surface)" : "transparent",
                    border: "1px solid " + (cleanScope===id ? (id==="all"?"rgba(248,113,113,.4)":"var(--border-2)") : "var(--border)")}}>
                    <input type="radio" name="cleanScope" value={id} checked={cleanScope===id} onChange={e=>setCleanScope(e.target.value)} style={{marginTop:2,accentColor:id==="all"?"#F87171":"#F59E0B"}}/>
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color: id==="all" ? "#F87171" : "var(--text)"}}>{lbl}</div>
                      <div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,fontFamily:"'DM Mono',monospace"}}>{desc}</div>
                    </div>
                  </label>
                ))}
              </div>

              {/* Date inputs (only for range mode) */}
              {cleanScope === "range" && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                  <div>
                    <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Desde</div>
                    <input type="date" value={cleanStart} onChange={e=>setCleanStart(e.target.value)} style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"7px 10px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:12,outline:"none",colorScheme:themeMode==="dark"?"dark":"light"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Hasta</div>
                    <input type="date" value={cleanEnd} onChange={e=>setCleanEnd(e.target.value)} style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"7px 10px",borderRadius:5,fontFamily:"'DM Mono',monospace",fontSize:12,outline:"none",colorScheme:themeMode==="dark"?"dark":"light"}}/>
                  </div>
                </div>
              )}

              {/* Preview */}
              <div style={{padding:"10px 14px",background:cleanScope==="all"?"rgba(248,113,113,.08)":"rgba(245,158,11,.06)",border:"1px solid "+(cleanScope==="all"?"rgba(248,113,113,.3)":"rgba(245,158,11,.25)"),borderRadius:6,marginBottom:18}}>
                <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Preview</div>
                <div style={{fontSize:13,color:cleanScope==="all"?"#F87171":"#F59E0B",fontWeight:700,fontFamily:"'DM Mono',monospace"}}>
                  Se eliminarán {toDelete} meta(s) · {scopeDescription}
                </div>
              </div>

              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button onClick={()=>setShowCleanGoalsModal(false)} style={{padding:"7px 16px",borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-muted)",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Cancelar</button>
                <button onClick={apply} disabled={toDelete===0} style={{padding:"7px 16px",borderRadius:5,background:cleanScope==="all"?"rgba(248,113,113,.15)":"rgba(245,158,11,.15)",border:"1px solid "+(cleanScope==="all"?"rgba(248,113,113,.4)":"rgba(245,158,11,.3)"),color:cleanScope==="all"?"#F87171":"#F59E0B",cursor:toDelete>0?"pointer":"not-allowed",opacity:toDelete>0?1:.35,fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:600}}>
                  {cleanScope==="all"?"🔥 Confirmar Hard Reset":"Eliminar metas"}
                </button>
              </div>
            </div>
          </div>
          );
        })()}

        {showApiKeyModal && (
          <ApiKeyModal currentKey={apiKey} onSave={handleSaveApiKey} onClose={()=>setShowApiKeyModal(false)} themeMode={themeMode}/>
        )}

        {routeEditor && line && (
          <RouteEditorModal
            line={line}
            editor={routeEditor}
            themeMode={themeMode}
            onClose={()=>setRouteEditor(null)}
            onSave={(newRoute) => {
              if (routeEditor.kind === "sku") {
                handleUpdateSkuCustomRoute(routeEditor.lid, routeEditor.target, newRoute);
              } else if (routeEditor.kind === "family") {
                handleUpdateFamilyRoute(routeEditor.lid, routeEditor.target, newRoute);
              }
              setRouteEditor(null);
            }}
          />
        )}

        <div className="kpi-strip">
          {[
            {
              lbl:"% On-Time (OTIF)",
              val: `${schedule.kpis.onTimePct||0}%`,
              sub: `${schedule.kpis.onTime}/${schedule.kpis.totalBatches} lotes a tiempo`,
              c: (schedule.kpis.onTimePct||0)>=95?"#34D399":(schedule.kpis.onTimePct||0)>=80?"#FBBF24":"#F87171",
              bar: true,
              pct: schedule.kpis.onTimePct||0
            },
            {
              lbl:"Tmax (máx. tardanza)",
              val: schedule.kpis.Tmax>0?`${schedule.kpis.Tmax} min`:"0",
              sub: schedule.kpis.Tmax>0?`peor lote +${(schedule.kpis.Tmax/60).toFixed(1)}h`:"sin atrasos",
              c: schedule.kpis.Tmax===0?"#34D399":schedule.kpis.Tmax<120?"#FBBF24":"#F87171"
            },
            {
              lbl:"∑Tj (tardanza total)",
              val: schedule.kpis.sumT>0?`${schedule.kpis.sumT} min`:"0",
              sub: schedule.kpis.sumT>0?`acumulado en ${schedule.kpis.lateOrders} órdenes`:"todo cumple",
              c: schedule.kpis.sumT===0?"#34D399":schedule.kpis.sumT<240?"#FBBF24":"#F87171"
            },
            {
              lbl:"Holguras",
              val: `${schedule.kpis.safe}·${schedule.kpis.risky}·${schedule.kpis.critical}`,
              sub: `seguro · riesgo · crítico (min: ${schedule.kpis.minSlack>=0?"+":""}${(schedule.kpis.minSlack/60).toFixed(1)}h)`,
              c: schedule.kpis.critical>0?"#F87171":schedule.kpis.risky>0?"#FBBF24":"#34D399"
            },
            { lbl:"Makespan + Setup", val:`${schedule.kpis.makespan||0}m`, sub:`+${schedule.kpis.totalSetup||0}m setup`, c:"var(--text-muted)" },
            {
              lbl: todayGoal>0 ? "Meta Hoy (COP)" : "Meta Facturación (COP)",
              val: todayGoal>0 ? `${todayPct.toFixed(0)}%` : `${billingPct.toFixed(0)}%`,
              sub: todayGoal>0 ? `$${(todayProj/1000).toFixed(0)}K / $${(todayGoal/1000).toFixed(0)}K hoy` : `$${totalValue.toLocaleString("es-CO")} / $${data.billingGoal.toLocaleString("es-CO")}`,
              c: todayGoal>0?todayColor:billingPct>=100?"#34D399":billingPct>=70?"#FBBF24":"#F87171",
              bar: true,
              pct: todayGoal>0?todayPct:billingPct,
            },
          ].map(k=>(
            <div key={k.lbl} className="kpi">
              <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em"}}>{k.lbl}</div>
              <div style={{fontSize:19,fontWeight:700,fontFamily:"'Syne',sans-serif",marginTop:3,color:k.c,lineHeight:1}}>{k.val}</div>
              {k.bar&&<div style={{height:2,background:"var(--border)",marginTop:5,borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:`${k.pct}%`,background:k.c,transition:"width .8s"}}/></div>}
              <div style={{fontSize:10,color:"var(--text-dim)",marginTop:3}}>{k.sub}</div>
            </div>
          ))}
        </div>

        <div className="body" style={{gridTemplateColumns: showAiPanel ? "1fr 310px" : "1fr"}}>
          <div className="left">
            <div className="tabs">
              {[["gantt","Diagrama Gantt"],["plan","Plan de Producción"],["orders","Órdenes de Producción"],["metas","Metas"],["config","Configuración"]].map(([id,lbl])=>(
                <button key={id} className={`tab-btn ${activeTab===id?"active":""}`} onClick={()=>setActiveTab(id)}>{lbl}</button>
              ))}
            </div>
            <div className="panel">
              {activeTab==="gantt"   && GanttView()}
              {activeTab==="plan"    && PlanView()}
              {activeTab==="orders"  && OrdersView()}
              {activeTab==="metas"   && MetasView()}
              {activeTab==="config"  && ConfigView()}
            </div>
          </div>

          {showAiPanel && (
          <div className="ai-panel">
            <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,fontFamily:"'Syne',sans-serif",display:"flex",alignItems:"center",gap:8}}><div className="ai-pulse"/>Asistente IA</div>
                <div style={{fontSize:10,color:"var(--text-dim)",marginTop:2,fontFamily:"'DM Mono',monospace"}}>turnos · metas · reglas · SKUs · secuencias</div>
              </div>
              <button onClick={()=>setShowAiPanel(false)} title="Ocultar asistente IA" style={{width:24,height:24,borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-dim)",cursor:"pointer",fontSize:15,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
            </div>
            <div className="ai-msgs">
              {aiMessages.map((m,i)=>(
                <div key={i} className={`bubble ${m.role==="user"?"user-bubble":"ai-bubble"}`}>{m.content}</div>
              ))}
              {isAiLoading&&<div className="bubble ai-bubble loading"><span>●</span><span>●</span><span>●</span></div>}
              <div ref={chatRef}/>
            </div>
            <div style={{padding:"10px 12px",borderTop:"1px solid var(--border)",display:"flex",gap:8,flexShrink:0}}>
              <textarea style={{flex:1,background:"var(--surface-2)",border:"1px solid var(--border-2)",color:"var(--text)",padding:"8px 11px",borderRadius:7,fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"none",transition:"border-color .2s"}}
                rows={2} placeholder="Instrucción o pregunta..." value={aiInput}
                onChange={e=>setAiInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI();}}}
                onFocus={e=>e.target.style.borderColor="#F59E0B"}
                onBlur={e=>e.target.style.borderColor="var(--border-2)"}/>
              <button onClick={sendAI} disabled={isAiLoading||!aiInput.trim()} style={{background:"#F59E0B",border:"none",color:"var(--bg)",padding:"8px 12px",borderRadius:7,cursor:"pointer",fontSize:15,fontWeight:700,opacity:isAiLoading||!aiInput.trim()?0.35:1}}>↑</button>
            </div>
          </div>
          )}
        </div>

        {/* Floating button to re-show AI panel */}
        {!showAiPanel && (
          <button onClick={()=>setShowAiPanel(true)} title="Mostrar asistente IA" style={{position:"fixed",bottom:48,right:18,zIndex:50,width:48,height:48,borderRadius:"50%",background:"#F59E0B",border:"none",color:"var(--bg)",cursor:"pointer",fontSize:22,fontWeight:700,boxShadow:"0 4px 12px rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>💬</button>
        )}

        {/* Undo Snackbar (Phase 3 — 5.1) */}
        {undoQueue.length > 0 && (
          <div style={{position:"fixed",bottom:60,left:"50%",transform:"translateX(-50%)",zIndex:1100,display:"flex",flexDirection:"column",gap:8,maxWidth:"92vw",pointerEvents:"none"}}>
            {undoQueue.map(item => (
              <UndoToast key={item.id} item={item} onUndo={()=>applyUndo(item.id)} onDismiss={()=>setUndoQueue(q=>q.filter(it=>it.id!==item.id))}/>
            ))}
          </div>
        )}

        {/* Footer credit */}
        <footer style={{flexShrink:0,padding:"8px 18px",borderTop:"1px solid var(--border)",background:"var(--surface)",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textAlign:"center",letterSpacing:".05em"}}>
          Made by: <span style={{color:"var(--text-muted)",fontWeight:600}}>Said Yanett Alvarino</span>
        </footer>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
