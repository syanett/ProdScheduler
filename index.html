// ════════════════════════════════════════════════════════════════
//  SHIFT UTILITIES
// ════════════════════════════════════════════════════════════════

function getShiftsForDate(base, activeShifts) {
  const dow = base.getDay();
  return (activeShifts || [])
    .filter(s => !s.days || !s.days.length || s.days.includes(dow))  // shift applies if no days specified, or this day is in its list
    .map(s => {
      const [sh, sm] = s.start.split(":").map(Number);
      const [eh, em] = s.end.split(":").map(Number);
      const start = new Date(base); start.setHours(sh, sm, 0, 0);
      const end   = new Date(base); end.setHours(eh, em, 0, 0);
      if (end.getTime() <= start.getTime()) end.setDate(end.getDate() + 1); // overnight
      return { id: s.id, name: s.name, start: start.getTime(), end: end.getTime() };
    }).sort((a, b) => a.start - b.start);
}

function isProductiveDay(date, workingDays, dateOverrides) {
  const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  const ov = dateOverrides && dateOverrides[dateStr];
  if (ov === "on")  return true;
  if (ov === "off") return false;
  const wd = workingDays && workingDays.length ? workingDays : [0,1,2,3,4,5,6];
  return wd.includes(date.getDay());
}

// Returns the ordered list of stages that the given SKU goes through.
// Precedence: SKU.customRoute > Family.customRoute > Default (all line.stages sorted by .order).
// A custom route is an array of stage IDs; only IDs that exist in line.stages are kept,
// preserving the custom order. This NEVER adds stages that aren't in line.stages.
function getStagesForSku(sku, line) {
  const allStagesById = Object.fromEntries((line.stages || []).map(s => [s.id, s]));
  // SKU-level custom route
  if (sku && Array.isArray(sku.customRoute) && sku.customRoute.length > 0) {
    return sku.customRoute.map(id => allStagesById[id]).filter(Boolean);
  }
  // Family-level custom route (looked up in line.familyRoutes)
  if (sku && sku.family && line.familyRoutes && Array.isArray(line.familyRoutes[sku.family]) && line.familyRoutes[sku.family].length > 0) {
    return line.familyRoutes[sku.family].map(id => allStagesById[id]).filter(Boolean);
  }
  // Default: all stages in order
  return (line.stages || []).slice().sort((a,b) => a.order - b.order);
}

// Topologically sort stages by their `prerequisites` field.
// Each stage may have `prerequisites: [stageId, ...]` listing stages that must finish before it.
//
// UNIFIED BEHAVIOR (Phase 3+):
//   - If ANY stage in the route declares prerequisites, the WHOLE route is ordered by topo sort.
//     Stages without `prerequisites` are treated as "no dependencies" → they start in parallel
//     at level 0 (with each other and with any stage whose prereqs are absent from the route).
//   - `stage.order` is used ONLY as a stable tie-breaker within the same topological level
//     (visual stability; doesn't affect dependencies).
//   - If NO stage declares prerequisites, falls back to pure `stage.order` (legacy behavior).
// Returns: { ordered: [stage,...], cycleDetected: bool, prereqMap: { stageId: [prereqStageId,...] } }
// Stages in the input `routeStages` are the only ones considered (custom routes are honored).
function topoSortStages(routeStages, allStages) {
  const allById = Object.fromEntries((allStages || []).map(s => [s.id, s]));
  const inputIds = new Set(routeStages.map(s => s.id));
  // Build prereqMap restricted to stages present in the route (ignore prereqs that aren't in this route)
  const prereqMap = {};
  routeStages.forEach(s => {
    const orig = allById[s.id] || s;
    const raw = Array.isArray(orig.prerequisites) ? orig.prerequisites : [];
    prereqMap[s.id] = raw.filter(pid => inputIds.has(pid) && pid !== s.id);
  });
  // Check if any stage has explicit prereqs
  const anyExplicit = Object.values(prereqMap).some(arr => arr.length > 0);
  if (!anyExplicit) {
    // Legacy behavior: use stage.order
    return { ordered: routeStages.slice().sort((a,b) => (a.order||0) - (b.order||0)), cycleDetected: false, prereqMap };
  }
  // Kahn's algorithm with stable secondary ordering by stage.order
  const indeg = {};
  routeStages.forEach(s => { indeg[s.id] = prereqMap[s.id].length; });
  // Adjacency: child of P is anyone whose prereq list contains P
  const children = {};
  routeStages.forEach(s => { children[s.id] = []; });
  routeStages.forEach(s => {
    prereqMap[s.id].forEach(pid => { if (children[pid]) children[pid].push(s.id); });
  });
  const ordered = [];
  const ready = routeStages
    .filter(s => indeg[s.id] === 0)
    .sort((a,b) => (a.order||0) - (b.order||0))
    .map(s => s.id);
  while (ready.length) {
    const id = ready.shift();
    const stage = routeStages.find(s => s.id === id);
    if (stage) ordered.push(stage);
    children[id].forEach(childId => {
      indeg[childId]--;
      if (indeg[childId] === 0) {
        // Insert keeping sort by .order
        const stOrder = (routeStages.find(s => s.id === childId)?.order) || 0;
        let inserted = false;
        for (let i = 0; i < ready.length; i++) {
          const cur = routeStages.find(s => s.id === ready[i]);
          if ((cur?.order || 0) > stOrder) { ready.splice(i, 0, childId); inserted = true; break; }
        }
        if (!inserted) ready.push(childId);
      }
    });
  }
  const cycleDetected = ordered.length !== routeStages.length;
  if (cycleDetected) {
    // Fall back to .order ordering and report cycle
    return { ordered: routeStages.slice().sort((a,b) => (a.order||0) - (b.order||0)), cycleDetected: true, prereqMap };
  }
  return { ordered, cycleDetected: false, prereqMap };
}

// Validate that adding `prereqId` as prerequisite of `stageId` does NOT create a cycle.
// Returns true if safe, false if it would create a cycle.
function wouldCreateCycle(stageId, prereqId, allStages) {
  if (stageId === prereqId) return true;
  const byId = Object.fromEntries(allStages.map(s => [s.id, s]));
  // Walk up from prereqId's prerequisites to see if we reach stageId
  const visited = new Set();
  const stack = [prereqId];
  while (stack.length) {
    const cur = stack.pop();
    if (visited.has(cur)) continue;
    visited.add(cur);
    const node = byId[cur];
    if (!node || !Array.isArray(node.prerequisites)) continue;
    for (const p of node.prerequisites) {
      if (p === stageId) return true;
      stack.push(p);
    }
  }
  return false;
}

// Count productive days between two dates (inclusive)
function countProductiveDays(startDateStr, endDateStr, workingDays, dateOverrides) {
  if (!startDateStr || !endDateStr) return 0;
  const start = new Date(startDateStr + "T00:00:00");
  const end   = new Date(endDateStr + "T23:59:59");
  if (start > end) return 0;
  let count = 0;
  const current = new Date(start);
  while (current <= end) {
    if (isProductiveDay(current, workingDays, dateOverrides)) count++;
    current.setDate(current.getDate() + 1);
  }
  return count;
}

function snapToShift(tMs, shifts, workingDays, dateOverrides) {
  const active = (shifts || []).filter(s => s.active !== false);
  if (!active.length) return tMs;
  // Check if already inside a shift (also check yesterday for overnight shifts)
  for (let off = -1; off <= 0; off++) {
    const d = new Date(tMs); d.setDate(d.getDate() + off);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (!isProductiveDay(base, workingDays, dateOverrides)) continue;
    for (const sh of getShiftsForDate(base, active))
      if (sh.start <= tMs && sh.end > tMs) return tMs;
  }
  // Find next upcoming shift start (up to 60 days ahead to handle long override-off periods)
  for (let off = 0; off < 60; off++) {
    const d = new Date(tMs); d.setDate(d.getDate() + off);
    const base = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (!isProductiveDay(base, workingDays, dateOverrides)) continue;
    for (const sh of getShiftsForDate(base, active))
      if (sh.start > tMs) return sh.start;
  }
  return tMs;
}

function addWorkingTime(startMs, durMs, shifts, workingDays, dateOverrides) {
  const active = (shifts || []).filter(s => s.active !== false);
  if (!active.length || durMs <= 0) return startMs + Math.max(0, durMs);
  let t = snapToShift(startMs, active, workingDays, dateOverrides);
  let rem = durMs, g = 0;
  while (rem > 0 && g++ < 5000) {
    let cur = null;
    for (let off = -1; off <= 0 && !cur; off++) {
      const d = new Date(t); d.setDate(d.getDate() + off);
      const base = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      if (isProductiveDay(base, workingDays, dateOverrides))
        cur = getShiftsForDate(base, active).find(sh => sh.start <= t && sh.end > t) || null;
    }
    if (!cur) { t = snapToShift(t + 60000, active, workingDays, dateOverrides); continue; }
    const avail = cur.end - t;
    if (rem <= avail) return t + rem;
    rem -= avail;
    t = snapToShift(cur.end + 1000, active, workingDays, dateOverrides);
  }
  return t;
}

//  SCHEDULER  (shift-aware)
// ════════════════════════════════════════════════════════════════

function buildSchedule(data, heuristic, lineId, customOrder, startTimeMs, use2opt) {
  const line = data.lines.find(l => l.id === lineId);
  if (!line) return { batches: [], violations: [], kpis: {} };
  const lineOrders = data.orders.filter(o => o.lineId === lineId);
  const shifts = line.shifts || [];
  const wd     = line.workingDays || [0,1,2,3,4,5,6];
  const dOv    = line.dateOverrides || {};

  // --- explode orders into batches ---
  let batches = [];
  lineOrders.forEach(order => {
    const sku = line.skus.find(s => s.id === order.skuId);
    if (!sku) return;
    const bc = Math.ceil(order.qty / sku.batchSize);
    for (let b = 0; b < bc; b++) {
      batches.push({
        id: `${order.id}-B${b+1}`, orderId: order.id, skuId: order.skuId,
        skuName: sku.name, skuFamily: sku.family, batchNum: b+1, batchTotal: bc,
        qty: Math.min(sku.batchSize, order.qty - b * sku.batchSize),
        dueDate: order.dueDate, priority: order.priority,
        value: order.value / bc, stageTimes: sku.stageTimes, color: sku.color,
      });
    }
  });

  // --- ordering ---
  const co = customOrder?.[lineId];
  if (co) {
    batches.sort((a, b) => {
      const ai = co.indexOf(a.id), bi = co.indexOf(b.id);
      return (ai < 0 ? 9999 : ai) - (bi < 0 ? 9999 : bi);
    });
  } else {
    const tot = b => Object.values(b.stageTimes).reduce((s,v)=>s+v,0) * b.qty; // total proc minutes
    if      (heuristic === "EDD")  batches.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate));
    else if (heuristic === "SPT")  batches.sort((a,b) => tot(a) - tot(b));
    else if (heuristic === "LPT")  batches.sort((a,b) => tot(b) - tot(a));  // Longest Processing Time first
    else if (heuristic === "WSPT") batches.sort((a,b) => (b.priority/tot(b)) - (a.priority/tot(a)));
    else if (heuristic === "CR")   { const now = Date.now(); batches.sort((a,b) => ((new Date(a.dueDate)-now)/tot(a)) - ((new Date(b.dueDate)-now)/tot(b))); }
    else if (heuristic === "MS")   {
      // Modified Slack: lowest slack-per-operation first.
      // slack = dueDate - now - remainingProcTime
      // MS_score = slack / numRemainingOps  (numRemaining proxy = num stages with time > 0)
      // Lower score (or more negative) = more urgent → goes first.
      const now = Date.now();
      const msScore = b => {
        const remProc = tot(b) * 60000; // minutes to ms
        const slack = new Date(b.dueDate).getTime() - now - remProc;
        const numOps = Object.values(b.stageTimes).filter(v => v > 0).length || 1;
        return slack / numOps;
      };
      batches.sort((a,b) => msScore(a) - msScore(b));
    }
    // FIFO: no sort

    // --- BACKLOG PRIORITY BOOST ---
    // SKUs with negative inventory go first (stable sort preserves heuristic order within each group)
    const isBacklog = (skuId) => {
      const sku = line.skus.find(s => s.id === skuId);
      return sku && typeof sku.inventory === "number" && sku.inventory < 0;
    };
    batches.sort((a, b) => {
      const aB = isBacklog(a.skuId) ? 1 : 0;
      const bB = isBacklog(b.skuId) ? 1 : 0;
      return bB - aB; // backlog (1) before non-backlog (0)
    });

    // --- CUSTOM PRIORITY RULES ---
    // For each rule "from before before": move all `from` batches to before any `before` batches
    // (only applies when there's no custom drag-and-drop order)
    if (line.priorityRules?.length) {
      for (const rule of line.priorityRules) {
        if (!rule.from || !rule.before || rule.from === rule.before) continue;
        const firstBeforeIdx = batches.findIndex(b => b.skuId === rule.before);
        if (firstBeforeIdx < 0) continue;
        // Find all `from` batches that come AFTER the first `before` batch
        const misplaced = [];
        for (let i = batches.length - 1; i > firstBeforeIdx; i--) {
          if (batches[i].skuId === rule.from) {
            misplaced.unshift(batches.splice(i, 1)[0]);
          }
        }
        if (misplaced.length) {
          // Re-find insertion point after splices
          const insertAt = batches.findIndex(b => b.skuId === rule.before);
          batches.splice(insertAt, 0, ...misplaced);
        }
      }
    }
  }

  // --- LOOK-AHEAD RESEQUENCING to respect forbidden sequences ---
  // After heuristic sort, reorder to avoid prohibited pairs while keeping
  // heuristic priority as much as possible. If no valid alternative exists,
  // the violation remains and gets reported.
  const isForbidden = (fromSkuId, toSkuId) => {
    if (!fromSkuId || !toSkuId) return false;
    if (fromSkuId === toSkuId) return false;
    const fromSku = line.skus.find(s => s.id === fromSkuId);
    const toSku   = line.skus.find(s => s.id === toSkuId);
    return !!(line.forbiddenSequences || []).find(f => {
      // Mode "family": match by family name
      if (f.mode === "family") {
        return fromSku && toSku && fromSku.family === f.from && toSku.family === f.to;
      }
      // Mode "sku" (default): exact match
      return f.from === fromSkuId && f.to === toSkuId;
    });
  };
  // Build set of SKU-pairs that priority rules require (from must be before before)
  const priRules = line.priorityRules || [];
  // Returns true if placing `skuId` next would violate a priority rule
  // (i.e., there's still a `from` batch waiting in `remaining` while we're trying to schedule its `before`)
  const wouldViolatePriority = (skuId, remaining) => {
    for (const rule of priRules) {
      if (!rule.from || !rule.before || rule.from === rule.before) continue;
      if (skuId !== rule.before) continue;
      if (remaining.some(b => b.skuId === rule.from)) return true;
    }
    return false;
  };
  if ((line.forbiddenSequences?.length || priRules.length) && !co) {
    const remaining = [...batches];
    const sequenced = [];
    let prev = null;

    // Score function: for a given candidate, how good is it as the next pick?
    // Lower score = better. We minimize:
    //   1. Forbidden transition with prev (huge penalty)
    //   2. Priority violation (huge penalty)
    //   3. "Trap risk": picking this candidate would leave us with no way to
    //      continue without forbidden transitions. We approximate this by
    //      counting how many of the REMAINING SKUs after this pick would be
    //      forbidden as successors of `chosen.skuId`.
    const scoreCandidate = (candidate, idx, rem) => {
      // Hard constraint violations come first as huge penalties (in priority order)
      if (isForbidden(prev, candidate.skuId)) return 1e9;
      const remAfter = rem.filter((_, k) => k !== idx);
      if (wouldViolatePriority(candidate.skuId, remAfter)) return 1e8;
      // Soft penalty: count distinct remaining SKUs that would be forbidden after this pick
      const remSkus = new Set(remAfter.map(b => b.skuId));
      let trapRisk = 0;
      remSkus.forEach(rsku => { if (isForbidden(candidate.skuId, rsku)) trapRisk++; });
      // If picking this candidate would block ALL remaining successors, that's catastrophic
      if (remSkus.size > 0 && trapRisk === remSkus.size) trapRisk += 1e6;
      return trapRisk;
    };

    while (remaining.length) {
      // Score all candidates (only the first occurrence of each SKU to save work)
      let bestIdx = 0, bestScore = Infinity;
      const seenSkus = new Set();
      for (let i = 0; i < remaining.length; i++) {
        const cand = remaining[i];
        if (seenSkus.has(cand.skuId)) continue; // same-SKU candidates score equal
        seenSkus.add(cand.skuId);
        const s = scoreCandidate(cand, i, remaining);
        if (s < bestScore) { bestScore = s; bestIdx = i; }
      }
      const [chosen] = remaining.splice(bestIdx, 1);
      sequenced.push(chosen);
      prev = chosen.skuId;
    }
    batches.length = 0;
    batches.push(...sequenced);
  }

  // Initialize violations array (populated after 2-opt with final batch order)
  const violations = [];

  // --- assign operations ---
  // nowMs is the planning start: user-chosen start time, clamped so we don't plan in the past
  const realNow = Date.now();
  const nowMs   = (typeof startTimeMs === "number" && !isNaN(startTimeMs) && startTimeMs > realNow) ? startTimeMs : realNow;
  const t0     = snapToShift(nowMs, shifts, wd, dOv);

  // Helper: simulate scheduling for a given batch order and return Tmax + sumT
  // (lightweight version used by 2-opt; full version below produces ops too)
  function evaluateOrder(orderedBatches) {
    const mA = {}, sA = {}, pSku = {};
    line.machines.forEach(m => { mA[m.id] = t0; });
    line.stages.forEach(s   => { sA[s.id] = t0; });
    let maxT = 0, sumT = 0;
    for (const batch of orderedBatches) {
      // Use per-SKU custom route + topo sort for prereqs
      const skuObj = line.skus.find(s => s.id === batch.skuId);
      const routeStagesRaw = getStagesForSku(skuObj, line);
      const topo = topoSortStages(routeStagesRaw, line.stages);
      const routeStages = topo.ordered;
      const prereqMap = topo.prereqMap;
      const batchStageEnd = {};
      let lastEnd = t0, finalEnd = nowMs;
      for (const stage of routeStages) {
        const sms = line.machines.filter(m => m.stageId === stage.id);
        if (!sms.length) continue;
        const stMins    = (batch.stageTimes[stage.id] || 0) * batch.qty;
        const setupMins = pSku[stage.id] && pSku[stage.id] !== batch.skuId
          ? (line.setupMatrix[`${pSku[stage.id]}|${batch.skuId}`] || 0) : 0;
        const machine   = sms.reduce((best,m) => (mA[m.id]||0) < (mA[best.id]||0) ? m : best, sms[0]);
        const prereqs = prereqMap[stage.id] || [];
        const predecessorEnd = prereqs.length > 0
          ? Math.max(t0, ...prereqs.map(pid => batchStageEnd[pid] || t0))
          : lastEnd;
        const earliest  = Math.max(predecessorEnd, mA[machine.id]||0, sA[stage.id]||0);
        const setupStartMs = snapToShift(earliest, shifts, wd, dOv);
        const workStartMs  = setupMins > 0 ? addWorkingTime(setupStartMs, setupMins*60000, shifts, wd, dOv) : setupStartMs;
        const opEndMs      = addWorkingTime(workStartMs, stMins*60000, shifts, wd, dOv);
        mA[machine.id] = opEndMs; sA[stage.id] = opEndMs;
        pSku[stage.id] = batch.skuId;
        batchStageEnd[stage.id] = opEndMs;
        lastEnd = opEndMs;
        if (opEndMs > finalEnd) finalEnd = opEndMs;
      }
      const tard = Math.max(0, (finalEnd - new Date(batch.dueDate).getTime()) / 60000);
      if (tard > maxT) maxT = tard;
      sumT += tard;
    }
    return { Tmax: maxT, sumT };
  }

  // Helper: check if a sequence violates forbidden / priority constraints
  function isValidSequence(seq) {
    // Forbidden sequences
    for (let i = 1; i < seq.length; i++) {
      if (seq[i-1].skuId !== seq[i].skuId && isForbidden(seq[i-1].skuId, seq[i].skuId)) return false;
    }
    // Priority rules: from must appear before before
    for (const rule of priRules) {
      if (!rule.from || !rule.before || rule.from === rule.before) continue;
      const firstFromIdx   = seq.findIndex(b => b.skuId === rule.from);
      const firstBeforeIdx = seq.findIndex(b => b.skuId === rule.before);
      if (firstFromIdx >= 0 && firstBeforeIdx >= 0 && firstFromIdx > firstBeforeIdx) return false;
    }
    // Backlog (negative inventory) SKUs must precede non-backlog
    const skuById = Object.fromEntries(line.skus.map(s => [s.id, s]));
    let seenNonBacklog = false;
    for (const b of seq) {
      const sku = skuById[b.skuId];
      const isBack = sku && typeof sku.inventory === "number" && sku.inventory < 0;
      if (isBack && seenNonBacklog) return false;
      if (!isBack) seenNonBacklog = true;
    }
    // Max consecutive days constraint: count batches of same SKU in a run
    // and ensure no run exceeds the SKU's maxConsecutiveDays × batchesPerDay (default ~5 per day).
    // Conservative proxy: limit consecutive batches of same SKU to maxConsecutiveDays * 5.
    const skuByIdMap = Object.fromEntries(line.skus.map(s => [s.id, s]));
    let runLen = 0, runSkuId = null;
    for (const b of seq) {
      if (b.skuId === runSkuId) {
        runLen++;
      } else {
        runSkuId = b.skuId;
        runLen = 1;
      }
      const sk = skuByIdMap[runSkuId];
      const maxDays = (sk && typeof sk.maxConsecutiveDays === "number" && sk.maxConsecutiveDays > 0) ? sk.maxConsecutiveDays : 3;
      // Use optimalBatchesPerDay if defined (real production capacity per SKU per day),
      // otherwise fall back to legacy maxBatchesPerDay, then to a generic proxy of 5.
      const batchesPerDay = (sk && typeof sk.optimalBatchesPerDay === "number" && sk.optimalBatchesPerDay > 0)
        ? sk.optimalBatchesPerDay
        : (sk && typeof sk.maxBatchesPerDay === "number" && sk.maxBatchesPerDay > 0) ? sk.maxBatchesPerDay : 5;
      if (runLen > maxDays * batchesPerDay) return false;
    }
    return true;
  }

  // --- MAX-CONSECUTIVE-DAYS ENFORCEMENT (post-resequencing) ---
  // After the look-ahead resequencing, detect runs that violate maxConsecutiveDays and
  // attempt to break them up by swapping the offending batch with a non-violating one
  // further along in the queue.
  if (!co && batches.length >= 2) {
    const skuByIdMap = Object.fromEntries(line.skus.map(s => [s.id, s]));
    const broken = [];
    let pass = 0, maxPasses = 3, anyBreak = true;
    while (anyBreak && pass < maxPasses) {
      anyBreak = false;
      pass++;
      let runLen = 0, runSkuId = null;
      for (let i = 0; i < batches.length; i++) {
        const b = batches[i];
        if (b.skuId === runSkuId) {
          runLen++;
        } else {
          runSkuId = b.skuId;
          runLen = 1;
        }
        const sk = skuByIdMap[runSkuId];
        const maxDays = (sk && typeof sk.maxConsecutiveDays === "number" && sk.maxConsecutiveDays > 0) ? sk.maxConsecutiveDays : 3;
        const batchesPerDay = (sk && typeof sk.optimalBatchesPerDay === "number" && sk.optimalBatchesPerDay > 0)
          ? sk.optimalBatchesPerDay
          : (sk && typeof sk.maxBatchesPerDay === "number" && sk.maxBatchesPerDay > 0) ? sk.maxBatchesPerDay : 5;
        const limit = maxDays * batchesPerDay;
        if (runLen > limit) {
          // Find a batch further along with a different SKU to swap in here
          let swapIdx = -1;
          for (let j = i + 1; j < batches.length; j++) {
            if (batches[j].skuId !== runSkuId) {
              // Try swap and validate
              const candidate = batches.slice();
              [candidate[i], candidate[j]] = [candidate[j], candidate[i]];
              // Lightweight checks: forbidden + priority (not full isValidSequence which would recurse)
              let ok = true;
              for (let k = 1; k < candidate.length && ok; k++) {
                if (candidate[k-1].skuId !== candidate[k].skuId && isForbidden(candidate[k-1].skuId, candidate[k].skuId)) ok = false;
              }
              if (ok) {
                for (const rule of priRules) {
                  if (!rule.from || !rule.before || rule.from === rule.before) continue;
                  const fIdx = candidate.findIndex(bb => bb.skuId === rule.from);
                  const bIdx = candidate.findIndex(bb => bb.skuId === rule.before);
                  if (fIdx >= 0 && bIdx >= 0 && fIdx > bIdx) { ok = false; break; }
                }
              }
              if (ok) { swapIdx = j; break; }
            }
          }
          if (swapIdx > 0) {
            [batches[i], batches[swapIdx]] = [batches[swapIdx], batches[i]];
            anyBreak = true;
            broken.push({ skuId: runSkuId, originalIdx: i });
            // Reset run tracking from this position
            runSkuId = batches[i].skuId; runLen = 1;
          } else {
            // Cannot break: record as unavoidable violation
            const skName = sk?.name || runSkuId;
            const existing = violations.find(v => v.message && v.message.includes(`${skName}: máx`));
            if (!existing) {
              violations.push({ batchId: b.id, message: `${skName}: máx ${maxDays} días consecutivos excedido (no se puede reordenar sin violar otras reglas)` });
            }
            runSkuId = batches[i].skuId; runLen = 1;
          }
        }
      }
    }
    if (broken.length > 0) {
      violations.unshift({ batchId: null, message: `🔄 ${broken.length} reordenamiento(s) por máx. días consecutivos`, _isInfo: true });
    }
  }

  // --- 2-OPT LOCAL SEARCH (post-heuristic optimization) ---
  // Try swapping pairs (i,j) to reduce Tmax. Accept swap only if:
  //   1. Resulting sequence respects forbidden/priority/backlog
  //   2. Tmax decreases (primary) OR Tmax equal AND sumT decreases (secondary)
  // Hard time cap to keep the UI responsive (default 800ms).
  if (use2opt && !co && batches.length >= 2 && batches.length <= 60) { // skip if customOrder or too many batches
    const deadline = Date.now() + 800; // 800 ms cap
    let current = batches.slice();
    let cur = evaluateOrder(current);
    let improved = true;
    let passes = 0, swaps = 0;
    while (improved && Date.now() < deadline && passes < 8) {
      improved = false;
      passes++;
      for (let i = 0; i < current.length - 1; i++) {
        if (Date.now() >= deadline) break;
        for (let j = i + 1; j < current.length; j++) {
          // Skip same-SKU pairs (swap has no effect)
          if (current[i].skuId === current[j].skuId) continue;
          // Try swap
          const candidate = current.slice();
          [candidate[i], candidate[j]] = [candidate[j], candidate[i]];
          if (!isValidSequence(candidate)) continue;
          const evalNew = evaluateOrder(candidate);
          // Accept if Tmax strictly improves, or equal Tmax + sumT improves
          const better = (evalNew.Tmax < cur.Tmax) || (evalNew.Tmax === cur.Tmax && evalNew.sumT < cur.sumT);
          if (better) {
            current = candidate;
            cur = evalNew;
            improved = true;
            swaps++;
            break; // restart from this i
          }
        }
        if (improved) break;
      }
    }
    batches.length = 0;
    batches.push(...current);
    // Stats for diagnostics (attached to violations metadata)
    if (swaps > 0) {
      violations.unshift({ batchId: null, message: `2-opt: ${swaps} mejora(s) aplicada(s) en ${passes} pasada(s). Tmax → ${Math.round(cur.Tmax)}min`, _isInfo: true });
    }
  }

  // --- violation detection (after final ordering) ---
  for (let i = 1; i < batches.length; i++) {
    if (batches[i-1].skuId !== batches[i].skuId) {
      const fromSku = line.skus.find(s => s.id === batches[i-1].skuId);
      const toSku   = line.skus.find(s => s.id === batches[i].skuId);
      const f = (line.forbiddenSequences || []).find(fs => {
        if (fs.mode === "family") {
          return fromSku && toSku && fromSku.family === fs.from && toSku.family === fs.to;
        }
        return fs.from === batches[i-1].skuId && fs.to === batches[i].skuId;
      });
      if (f) {
        const modeTag = f.mode === "family" ? `[Fam: ${f.from} → ${f.to}] ` : "";
        violations.push({ batchId: batches[i].id, message: `${modeTag}Secuencia prohibida: ${batches[i-1].skuName} → ${batches[i].skuName}. ${f.reason}` });
      }
    }
  }

  const mAvail = {}, sAvail = {}, prevSku = {};
  line.machines.forEach(m => { mAvail[m.id] = t0; });
  line.stages.forEach(s   => { sAvail[s.id] = t0; });

  const scheduled = batches.map(batch => {
    const ops = [];
    // Resolve route: SKU custom > Family custom > Default
    const skuObj = line.skus.find(s => s.id === batch.skuId);
    const routeStagesRaw = getStagesForSku(skuObj, line);
    // Topological sort honoring per-stage prerequisites (falls back to .order if none defined)
    const topo = topoSortStages(routeStagesRaw, line.stages);
    if (topo.cycleDetected) {
      violations.push({ batchId: batch.id, message: `Ciclo detectado en prerrequisitos de etapas para ${batch.skuName}. Se ignora la dependencia.` });
    }
    const routeStages = topo.ordered;
    const prereqMap = topo.prereqMap;
    // Track per-batch stage end times for prerequisite resolution
    const batchStageEnd = {};
    let lastOpEnd = t0;  // for stages without explicit prereqs (legacy / no prereqs)
    routeStages.forEach(stage => {
      const sms = line.machines.filter(m => m.stageId === stage.id);
      if (!sms.length) return;
      const stMins    = (batch.stageTimes[stage.id] || 0) * batch.qty;
      const setupMins = prevSku[stage.id] && prevSku[stage.id] !== batch.skuId
        ? (line.setupMatrix[`${prevSku[stage.id]}|${batch.skuId}`] || 0) : 0;
      const machine   = sms.reduce((best,m) => (mAvail[m.id]||0) < (mAvail[best.id]||0) ? m : best, sms[0]);
      // Determine the predecessor time:
      // - If stage has explicit prereqs (in topo.prereqMap), wait for max(prereq end times) — the slowest finishes last
      // - Else (legacy): wait for the previous op end (sequential behavior)
      const prereqs = prereqMap[stage.id] || [];
      const predecessorEnd = prereqs.length > 0
        ? Math.max(t0, ...prereqs.map(pid => batchStageEnd[pid] || t0))
        : lastOpEnd;
      const earliest  = Math.max(predecessorEnd, mAvail[machine.id]||0, sAvail[stage.id]||0);
      const setupStartMs = snapToShift(earliest, shifts, wd, dOv);
      const workStartMs  = setupMins > 0 ? addWorkingTime(setupStartMs, setupMins*60000, shifts, wd, dOv) : setupStartMs;
      const opEndMs      = addWorkingTime(workStartMs, stMins*60000, shifts, wd, dOv);
      mAvail[machine.id] = opEndMs; sAvail[stage.id] = opEndMs;
      prevSku[stage.id]  = batch.skuId;
      batchStageEnd[stage.id] = opEndMs;
      lastOpEnd = opEndMs;
      ops.push({
        stageId: stage.id, stageName: stage.name,
        machineId: machine.id, machineName: machine.name,
        setupTime: setupMins,
        setupStart: new Date(setupStartMs),
        startTime:  new Date(workStartMs),
        endTime:    new Date(opEndMs),
      });
    });
    // final end = max of all stage ends (covers parallel-finishing graphs)
    const finalEndMs = ops.length ? Math.max(...ops.map(o => o.endTime.getTime())) : nowMs;
    const finalEnd = new Date(finalEndMs);
    // Mark parallel ops: an op is parallel if its time window overlaps with another op of the SAME batch
    // (different stage and machine). Useful for visual indicator in Gantt.
    ops.forEach(o => {
      const oStart = o.setupStart.getTime();
      const oEnd   = o.endTime.getTime();
      o.isParallel = ops.some(other => {
        if (other === o) return false;
        if (other.stageId === o.stageId) return false;
        const otherStart = other.setupStart.getTime();
        const otherEnd   = other.endTime.getTime();
        // Overlap if windows intersect
        return oStart < otherEnd && otherStart < oEnd;
      });
    });
    const dueMs = new Date(batch.dueDate).getTime();
    const tard = Math.max(0, (finalEnd.getTime() - dueMs) / 60000);
    // Slack: positive if there's room, negative if already late by the schedule
    const slack = (dueMs - finalEnd.getTime()) / 60000; // minutes; negative = tardy
    return { ...batch, ops, startTime: ops[0]?.setupStart||new Date(nowMs), endTime: finalEnd, tardiness: tard, slack, isLate: tard > 0 };
  });

  const makespan   = scheduled.length ? (Math.max(...scheduled.map(b=>b.endTime.getTime()))-t0)/60000 : 0;
  const totalSetup = scheduled.reduce((s,b) => s + b.ops.reduce((a,o) => a+o.setupTime, 0), 0);
  const lateOrders = [...new Set(scheduled.filter(b=>b.isLate).map(b=>b.orderId))].length;
  // OTIF-focused KPIs
  const Tmax       = scheduled.length ? Math.max(...scheduled.map(b => b.tardiness)) : 0;
  const sumT       = scheduled.reduce((s,b) => s + b.tardiness, 0);
  const onTime     = scheduled.length ? scheduled.filter(b => !b.isLate).length : 0;
  const onTimePct  = scheduled.length ? (onTime / scheduled.length) * 100 : 100;
  // Slack distribution: critical = slack < 120 min (2h), risk = 0-120 min, safe > 120
  const critical = scheduled.filter(b => b.slack < 0).length;
  const risky    = scheduled.filter(b => b.slack >= 0 && b.slack < 120).length;
  const safe     = scheduled.filter(b => b.slack >= 120).length;
  // Minimum slack across all batches (most critical batch)
  const minSlack = scheduled.length ? Math.min(...scheduled.map(b => b.slack)) : 0;
  return { batches: scheduled, violations, kpis: {
    makespan: Math.round(makespan),
    totalSetup: Math.round(totalSetup),
    lateOrders,
    totalBatches: scheduled.length,
    Tmax: Math.round(Tmax),
    sumT: Math.round(sumT),
    onTime, onTimePct: Math.round(onTimePct),
    critical, risky, safe,
    minSlack: Math.round(minSlack)
  }};
}

//  HELPERS
// ════════════════════════════════════════════════════════════════

const STATUS_COLORS = {
  pending:      { bg: "rgba(100,116,139,.2)",  text: "#94A3B8" },
  "in-progress":{ bg: "rgba(56,189,248,.15)",  text: "#38BDF8" },
  late:         { bg: "rgba(248,113,113,.15)", text: "#F87171" },
  done:         { bg: "rgba(74,222,128,.15)",  text: "#4ADE80" },
};

//  API KEY MODAL
// ════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════
//  UNCONTROLLED INPUT — keeps focus stable while typing
// ════════════════════════════════════════════════════════════════
// Maintains its own local state, only notifies parent on blur or Enter.
// This prevents focus loss when the parent re-renders during typing.
function NumberInput({ value, onCommit, min, max, step, style, title, placeholder, allowNegative=false }) {
  const [localVal, setLocalVal] = useState(value);
  const lastExternalRef = useRef(value);
  // If external value changes (e.g. due to another field auto-recalc), sync it in
  useEffect(() => {
    if (value !== lastExternalRef.current) {
      lastExternalRef.current = value;
      setLocalVal(value);
    }
  }, [value]);
  const commit = () => {
    const parsed = parseFloat(localVal);
    if (isNaN(parsed)) { setLocalVal(value); return; }
    let final = parsed;
    if (typeof min === "number") final = Math.max(min, final);
    if (typeof max === "number") final = Math.min(max, final);
    if (!allowNegative && final < 0) final = 0;
    if (final !== value) onCommit(final);
    else setLocalVal(value); // re-sync display if final got clamped to same
  };
  return (
    <input
      type="number"
      value={localVal}
      onChange={e => setLocalVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); else if (e.key === "Escape") { setLocalVal(value); e.target.blur(); } }}
      min={min} max={max} step={step}
      style={style}
      title={title}
      placeholder={placeholder}
    />
  );
}

// Same idea for text inputs
function TextInput({ value, onCommit, style, title, placeholder, type="text" }) {
  const [localVal, setLocalVal] = useState(value);
  const lastExternalRef = useRef(value);
  useEffect(() => {
    if (value !== lastExternalRef.current) {
      lastExternalRef.current = value;
      setLocalVal(value);
    }
  }, [value]);
  const commit = () => {
    if (localVal !== value) onCommit(localVal);
  };
  return (
    <input
      type={type}
      value={localVal}
      onChange={e => setLocalVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); else if (e.key === "Escape") { setLocalVal(value); e.target.blur(); } }}
      style={style}
      title={title}
      placeholder={placeholder}
    />
  );
}

// SKU autocomplete: type-to-search by code or name
function SkuAutocomplete({ value, skus, onChange, style, placeholder = "Escribe código o nombre…" }) {
  const selected = skus.find(s => s.id === value);
  const [query, setQuery] = useState(selected ? `${selected.id} — ${selected.name}` : "");
  const [open, setOpen]   = useState(false);
  const [highlightIdx, setHighlightIdx] = useState(0);
  const wrapRef = useRef(null);
  const lastExternalRef = useRef(value);

  // Re-sync when external value changes
  useEffect(() => {
    if (value !== lastExternalRef.current) {
      lastExternalRef.current = value;
      const s = skus.find(x => x.id === value);
      setQuery(s ? `${s.id} — ${s.name}` : "");
    }
  }, [value, skus]);

  // Close dropdown on outside click
  useEffect(() => {
    if (!open) return;
    const onClick = (e) => { if (!wrapRef.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, [open]);

  // Filter: match by id (substring, case-insensitive) OR by name (substring)
  const q = query.trim().toLowerCase();
  const matches = q && (!selected || query !== `${selected.id} — ${selected.name}`)
    ? skus.filter(s => s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)).slice(0, 12)
    : skus.slice(0, 12);

  const choose = (sku) => {
    onChange(sku.id);
    setQuery(`${sku.id} — ${sku.name}`);
    setOpen(false);
    setHighlightIdx(0);
  };

  return (
    <div ref={wrapRef} style={{position:"relative",flex:1,minWidth:160}}>
      <input
        type="text"
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); setHighlightIdx(0); }}
        onFocus={() => { setOpen(true); }}
        onKeyDown={e => {
          if (e.key === "ArrowDown") { e.preventDefault(); setOpen(true); setHighlightIdx(i => Math.min(i+1, matches.length-1)); }
          else if (e.key === "ArrowUp") { e.preventDefault(); setHighlightIdx(i => Math.max(i-1, 0)); }
          else if (e.key === "Enter") { e.preventDefault(); if (matches[highlightIdx]) choose(matches[highlightIdx]); }
          else if (e.key === "Escape") { setOpen(false); const s = skus.find(x => x.id === value); setQuery(s ? `${s.id} — ${s.name}` : ""); }
        }}
        placeholder={placeholder}
        style={{...style, width:"100%"}}
      />
      {open && matches.length > 0 && (
        <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,maxWidth:380,background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:6,boxShadow:"0 8px 24px rgba(0,0,0,.4)",zIndex:50,maxHeight:240,overflowY:"auto"}}>
          {matches.map((s, i) => (
            <div
              key={s.id}
              onMouseDown={(e) => { e.preventDefault(); choose(s); }}
              onMouseEnter={() => setHighlightIdx(i)}
              style={{
                padding:"6px 10px",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",
                display:"flex",alignItems:"center",gap:8,
                background: i === highlightIdx ? "rgba(245,158,11,.12)" : "transparent",
                borderBottom: i === matches.length - 1 ? "none" : "1px solid var(--border)"
              }}>
              <span style={{display:"inline-block",width:7,height:7,borderRadius:2,background:s.color,flexShrink:0}}/>
              <span style={{color:"var(--text-dim)",minWidth:80}}>{s.id}</span>
              <span style={{color:"var(--text)",flex:1}}>{s.name}</span>
              {typeof s.inventory === "number" && s.inventory < 0 && <span style={{color:"#F87171",fontSize:9,padding:"1px 4px",background:"rgba(248,113,113,.1)",borderRadius:3}}>BACKLOG</span>}
            </div>
          ))}
        </div>
      )}
      {open && matches.length === 0 && q && (
        <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:6,padding:"8px 12px",fontSize:11,color:"var(--text-dim)",zIndex:50,fontFamily:"'DM Mono',monospace"}}>
          Sin coincidencias. Verifica el código o nombre.
        </div>
      )}
    </div>
  );
}

// Route Editor Modal (Phase 2 — 1.1)
// ════════════════════════════════════════════════════════════════
// Allows editing the route (sequence of stages) for a SKU or a family.
// Custom routes can ONLY use stages that exist in line.stages; they reorder
// and/or omit some, but never introduce new ones.
function RouteEditorModal({ line, editor, onSave, onClose, themeMode }) {
  const allStages = (line.stages || []).slice().sort((a,b) => a.order - b.order);
  const defaultRouteIds = allStages.map(s => s.id);

  // Resolve currently saved route for this target
  let savedRoute = null, targetLabel = "", targetName = "";
  if (editor.kind === "sku") {
    const sku = line.skus.find(s => s.id === editor.target);
    if (sku) {
      savedRoute = Array.isArray(sku.customRoute) ? sku.customRoute : null;
      targetLabel = `SKU: ${sku.name}`;
      targetName = sku.name;
    }
  } else if (editor.kind === "family") {
    savedRoute = line.familyRoutes && Array.isArray(line.familyRoutes[editor.target]) ? line.familyRoutes[editor.target] : null;
    targetLabel = `Familia: ${editor.target}`;
    targetName = editor.target;
  }

  const initial = savedRoute && savedRoute.length > 0 ? savedRoute : defaultRouteIds;
  const [route, setRoute] = useState(initial);
  const [dragId, setDragId] = useState(null);

  const isInherited = !savedRoute;
  const stageById = Object.fromEntries(allStages.map(s => [s.id, s]));
  const includedIds = new Set(route);

  const toggle = (sid) => {
    if (includedIds.has(sid)) {
      setRoute(route.filter(id => id !== sid));
    } else {
      setRoute([...route, sid]);
    }
  };

  const moveUp = (idx) => {
    if (idx === 0) return;
    const next = route.slice();
    [next[idx-1], next[idx]] = [next[idx], next[idx-1]];
    setRoute(next);
  };
  const moveDown = (idx) => {
    if (idx === route.length - 1) return;
    const next = route.slice();
    [next[idx], next[idx+1]] = [next[idx+1], next[idx]];
    setRoute(next);
  };

  const handleDrop = (targetIdx) => {
    if (dragId === null) return;
    const srcIdx = route.indexOf(dragId);
    if (srcIdx < 0 || srcIdx === targetIdx) { setDragId(null); return; }
    const next = route.slice();
    next.splice(srcIdx, 1);
    next.splice(targetIdx, 0, dragId);
    setRoute(next);
    setDragId(null);
  };

  const resetToDefault = () => setRoute(defaultRouteIds);
  const clearAndInherit = () => onSave(null);  // null = inherit
  const saveRoute = () => onSave(route);

  const isModified = JSON.stringify(route) !== JSON.stringify(defaultRouteIds);
  const omittedStages = allStages.filter(s => !includedIds.has(s.id));

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface-2)",border:"1px solid var(--border-2)",borderRadius:10,padding:24,maxWidth:560,width:"92%",maxHeight:"85vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6,gap:8}}>
          <div>
            <div style={{fontSize:16,fontWeight:600,color:"#F59E0B"}}>🛣 Editar ruta de producción</div>
            <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{targetLabel}</div>
          </div>
          <div style={{display:"flex",gap:5}}>
            <span style={{fontSize:9,padding:"3px 7px",borderRadius:4,fontFamily:"'DM Mono',monospace",fontWeight:600,
              background: isInherited ? "rgba(107,114,128,.15)" : (isModified ? "rgba(245,158,11,.15)" : "rgba(52,211,153,.15)"),
              color: isInherited ? "var(--text-dim)" : (isModified ? "#F59E0B" : "#34D399"),
              border: "1px solid " + (isInherited ? "var(--border-2)" : (isModified ? "rgba(245,158,11,.35)" : "rgba(52,211,153,.35)"))}}>
              {isInherited ? "HEREDADA" : (isModified ? "PERSONALIZADA" : "= DEFAULT")}
            </span>
          </div>
        </div>

        <div style={{fontSize:11,color:"var(--text-muted)",lineHeight:1.5,marginBottom:14,padding:"8px 12px",background:"rgba(56,189,248,.06)",border:"1px solid rgba(56,189,248,.2)",borderRadius:6}}>
          {editor.kind === "sku" ? (
            <>Precedencia: <b>SKU específico → Familia → Default</b>. Si guardas vacío, este SKU vuelve a heredar la ruta.</>
          ) : (
            <>Esta ruta aplicará a todos los SKUs de la familia <b>{targetName}</b> que no tengan su propia ruta personalizada.</>
          )}
        </div>

        {/* Active route (ordered, drag & drop) */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Etapas en esta ruta ({route.length})</div>
          {route.length === 0 && (
            <div style={{padding:"12px",textAlign:"center",fontSize:11,color:"#F87171",background:"rgba(248,113,113,.06)",border:"1px dashed rgba(248,113,113,.3)",borderRadius:6}}>
              ⚠ Sin etapas: este {editor.kind === "sku" ? "SKU" : "familia"} no se programará.
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {route.map((sid, idx) => {
              const st = stageById[sid];
              if (!st) return null;
              return (
                <div key={sid}
                  draggable
                  onDragStart={()=>setDragId(sid)}
                  onDragOver={(e)=>{e.preventDefault();}}
                  onDrop={()=>handleDrop(idx)}
                  onDragEnd={()=>setDragId(null)}
                  style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:dragId===sid?"rgba(245,158,11,.15)":"var(--surface)",borderRadius:6,border:"1px solid var(--border)",cursor:"grab",opacity:dragId===sid?.5:1}}>
                  <span style={{fontSize:13,color:"var(--text-dim)",cursor:"grab"}}>⠿</span>
                  <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:"#F59E0B",width:22}}>{idx+1}.</span>
                  <span style={{flex:1,fontSize:12,fontWeight:500}}>{st.name}</span>
                  <button onClick={()=>moveUp(idx)} disabled={idx===0} style={{width:24,height:22,padding:0,borderRadius:4,background:"transparent",border:"1px solid var(--border-2)",color:idx===0?"var(--border-2)":"var(--text-muted)",cursor:idx===0?"not-allowed":"pointer",fontSize:11}}>↑</button>
                  <button onClick={()=>moveDown(idx)} disabled={idx===route.length-1} style={{width:24,height:22,padding:0,borderRadius:4,background:"transparent",border:"1px solid var(--border-2)",color:idx===route.length-1?"var(--border-2)":"var(--text-muted)",cursor:idx===route.length-1?"not-allowed":"pointer",fontSize:11}}>↓</button>
                  <button onClick={()=>toggle(sid)} title="Eliminar de la ruta" style={{width:24,height:22,padding:0,borderRadius:4,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:13}}>×</button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Omitted stages (to re-add) */}
        {omittedStages.length > 0 && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Etapas omitidas (click para reañadir)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {omittedStages.map(st => (
                <button key={st.id} onClick={()=>toggle(st.id)} style={{padding:"5px 10px",fontSize:10,fontFamily:"'DM Mono',monospace",borderRadius:5,background:"transparent",border:"1px dashed var(--border-2)",color:"var(--text-dim)",cursor:"pointer"}}>
                  + {st.name}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Footer actions */}
        <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",paddingTop:10,borderTop:"1px solid var(--border)"}}>
          <div style={{display:"flex",gap:6}}>
            <button onClick={resetToDefault} title="Restaurar el orden y composición del default de la línea" style={{padding:"6px 11px",borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-dim)",cursor:"pointer",fontSize:10,fontFamily:"'DM Mono',monospace"}}>↺ Restaurar default</button>
            {!isInherited && (
              <button onClick={clearAndInherit} title={editor.kind === "sku" ? "Eliminar ruta personalizada y heredar de familia/default" : "Eliminar ruta de familia y dejar que cada SKU use default"} style={{padding:"6px 11px",borderRadius:5,background:"rgba(248,113,113,.06)",border:"1px solid rgba(248,113,113,.2)",color:"#F87171",cursor:"pointer",fontSize:10,fontFamily:"'DM Mono',monospace"}}>🗑 Eliminar personalización</button>
            )}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{padding:"7px 14px",borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-muted)",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>Cancelar</button>
            <button onClick={saveRoute} disabled={route.length === 0} style={{padding:"7px 14px",borderRadius:5,background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",cursor:route.length === 0 ? "not-allowed" : "pointer",opacity:route.length===0?.4:1,fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:600}}>Guardar ruta</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Undo Toast (Phase 3 — 5.1)
// ════════════════════════════════════════════════════════════════
// Floating snackbar shown after a soft delete. Has an 8s timer and a button to undo.
function UndoToast({ item, onUndo, onDismiss }) {
  const total = 8000;
  const [remaining, setRemaining] = useState(Math.max(0, item.expiresAt - Date.now()));
  useEffect(() => {
    const tick = () => setRemaining(Math.max(0, item.expiresAt - Date.now()));
    const interval = setInterval(tick, 100);
    return () => clearInterval(interval);
  }, [item.expiresAt]);
  const pct = (remaining / total) * 100;
  return (
    <div style={{
      pointerEvents:"auto",
      background:"var(--surface-2)",
      border:"1px solid var(--border-2)",
      borderRadius:8,
      padding:"10px 14px",
      minWidth:340,
      maxWidth:480,
      boxShadow:"0 8px 24px rgba(0,0,0,.35)",
      display:"flex",
      alignItems:"center",
      gap:12,
      position:"relative",
      overflow:"hidden"
    }}>
      {/* Progress bar at bottom */}
      <div style={{position:"absolute",bottom:0,left:0,height:2,width:`${pct}%`,background:"#F59E0B",transition:"width .1s linear"}}/>
      <span style={{fontSize:16,flexShrink:0}}>↶</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,color:"var(--text)",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.label}</div>
        <div style={{fontSize:9,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",marginTop:2}}>Se eliminará permanentemente en {Math.ceil(remaining/1000)}s</div>
      </div>
      <button onClick={onUndo} style={{padding:"5px 12px",fontSize:11,borderRadius:5,background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.4)",color:"#F59E0B",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontWeight:700,whiteSpace:"nowrap"}}>Deshacer</button>
      <button onClick={onDismiss} title="Cerrar" style={{width:22,height:22,padding:0,borderRadius:4,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-dim)",cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0}}>×</button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// Stages Graph (Phase 3+ — visual prerequisite editor)
// ════════════════════════════════════════════════════════════════
// Interactive SVG graph for editing stage prerequisites visually.
// Layout: nodes are placed in topological levels (left to right).
// Interaction:
//   - Click a node to select it as "source"
//   - Click another node to toggle prereq: source → target (target depends on source)
//   - Click selected node again to deselect
//   - Click an arrow to delete that prereq
//   - "Limpiar todo" removes all prerequisites
function StagesGraph({ line, onToggle, onClear, wouldCreateCycle }) {
  const [selected, setSelected] = useState(null);
  const [hoverEdge, setHoverEdge] = useState(null);
  const stages = (line.stages || []).slice();
  if (stages.length === 0) {
    return (
      <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text-dim)",fontSize:13,background:"var(--surface)",borderRadius:8,border:"1px dashed var(--border)"}}>
        Agrega al menos una etapa para visualizar el grafo.
      </div>
    );
  }

  // Build edges from prerequisites
  // Edge means: prereq → stage (prereq must finish before stage starts)
  const edges = [];
  stages.forEach(s => {
    if (Array.isArray(s.prerequisites)) {
      s.prerequisites.forEach(pid => {
        if (stages.find(st => st.id === pid)) edges.push({ from: pid, to: s.id });
      });
    }
  });

  // Compute topological levels (BFS by indegree)
  // If there's a cycle, fall back to stage.order
  const indeg = {};
  const childrenMap = {};
  stages.forEach(s => { indeg[s.id] = 0; childrenMap[s.id] = []; });
  edges.forEach(e => { indeg[e.to] = (indeg[e.to]||0) + 1; childrenMap[e.from].push(e.to); });

  const levels = {}; // stageId → level number
  const queue = stages.filter(s => indeg[s.id] === 0).map(s => ({ id: s.id, lvl: 0 }));
  const indegCopy = { ...indeg };
  while (queue.length) {
    const { id, lvl } = queue.shift();
    if (levels[id] === undefined || lvl > levels[id]) levels[id] = lvl;
    childrenMap[id].forEach(childId => {
      indegCopy[childId]--;
      queue.push({ id: childId, lvl: lvl + 1 });
    });
  }
  // Anything missing (in a cycle or unreachable) falls back to .order
  stages.forEach(s => {
    if (levels[s.id] === undefined) levels[s.id] = Math.max(0, (s.order || 1) - 1);
  });

  // Group stages by level
  const byLevel = {};
  stages.forEach(s => {
    const lvl = levels[s.id];
    if (!byLevel[lvl]) byLevel[lvl] = [];
    byLevel[lvl].push(s);
  });
  // Sort each level by stage.order (stable visual)
  Object.keys(byLevel).forEach(lvl => byLevel[lvl].sort((a,b) => (a.order||0) - (b.order||0)));
  const maxLevel = Math.max(0, ...Object.keys(byLevel).map(Number));

  // Layout constants
  const NODE_W = 160;
  const NODE_H = 56;
  const HGAP = 90;
  const VGAP = 22;
  const PAD = 30;
  const TOP_PAD = 48; // extra room for parallel labels

  // Position nodes
  const positions = {};
  const colHeights = {};
  for (let lvl = 0; lvl <= maxLevel; lvl++) {
    const items = byLevel[lvl] || [];
    colHeights[lvl] = items.length * NODE_H + (items.length - 1) * VGAP;
  }
  const maxColHeight = Math.max(0, ...Object.values(colHeights));
  for (let lvl = 0; lvl <= maxLevel; lvl++) {
    const items = byLevel[lvl] || [];
    const colH = colHeights[lvl];
    const yStart = TOP_PAD + (maxColHeight - colH) / 2;
    items.forEach((s, idx) => {
      positions[s.id] = {
        x: PAD + lvl * (NODE_W + HGAP),
        y: yStart + idx * (NODE_H + VGAP)
      };
    });
  }
  const svgW = PAD * 2 + (maxLevel + 1) * NODE_W + maxLevel * HGAP;
  const svgH = TOP_PAD + maxColHeight + PAD;

  // Identify "parallel groups": columns with 2+ stages that have no edges among themselves.
  // For each level, check if all pairs of stages in that level are non-adjacent (no direct edge).
  // If yes, that whole column is a parallel group.
  const parallelLevels = {}; // level → true if this column runs in parallel
  for (let lvl = 0; lvl <= maxLevel; lvl++) {
    const stagesInLevel = byLevel[lvl] || [];
    if (stagesInLevel.length < 2) continue;
    const ids = stagesInLevel.map(s => s.id);
    // Check no edges between any pair in this level
    let allParallel = true;
    for (let i = 0; i < ids.length && allParallel; i++) {
      for (let j = i+1; j < ids.length && allParallel; j++) {
        if (edges.some(e => (e.from === ids[i] && e.to === ids[j]) || (e.from === ids[j] && e.to === ids[i]))) {
          allParallel = false;
        }
      }
    }
    if (allParallel) parallelLevels[lvl] = true;
  }

  // Click on a node
  const handleNodeClick = (sid) => {
    if (!selected) {
      setSelected(sid);
    } else if (selected === sid) {
      setSelected(null);
    } else {
      // selected → sid means: sid depends on selected (selected is prereq of sid)
      // i.e., add selected to sid's prerequisites
      // Pre-validate cycle
      if (wouldCreateCycle(sid, selected, stages)) {
        alert(`⚠ No se puede agregar: crearía un ciclo de dependencias (${selected} → ... → ${sid} → ${selected})`);
      } else {
        onToggle(sid, selected);
      }
      setSelected(null);
    }
  };

  // Edge midpoint for click handler
  const edgePoints = (from, to) => {
    const p1 = positions[from];
    const p2 = positions[to];
    return {
      x1: p1.x + NODE_W,
      y1: p1.y + NODE_H/2,
      x2: p2.x,
      y2: p2.y + NODE_H/2,
      mx: (p1.x + NODE_W + p2.x) / 2,
      my: (p1.y + NODE_H/2 + p2.y + NODE_H/2) / 2
    };
  };

  // Detect cycles (nodes with indeg > 0 but level still 0 won't happen here since fallback sets level by order)
  // Real cycle detection: nodes whose indegCopy never reached 0
  const hasCycle = Object.values(indegCopy).some(v => v > 0);

  return (
    <div>
      {/* Toolbar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,padding:"8px 12px",background:"var(--surface)",borderRadius:7,border:"1px solid var(--border)",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,color:"var(--text-muted)",lineHeight:1.5}}>
          {selected ? (
            <><strong style={{color:"#A78BFA"}}>Modo conexión:</strong> seleccionado <strong>{stages.find(s=>s.id===selected)?.name}</strong>. Click otra etapa para crear "<strong>{stages.find(s=>s.id===selected)?.name} → otra</strong>" (esa etapa esperará a esta). Click la misma para cancelar.</>
          ) : (
            <><strong style={{color:"#F59E0B"}}>💡 Click una etapa</strong> para empezar a crear/eliminar dependencias. Click una flecha para eliminarla.</>
          )}
        </div>
        <div style={{display:"flex",gap:6}}>
          {selected && <button onClick={()=>setSelected(null)} style={{padding:"5px 10px",fontSize:10,borderRadius:5,background:"transparent",border:"1px solid var(--border-2)",color:"var(--text-dim)",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>✕ Cancelar selección</button>}
          {edges.length > 0 && <button onClick={onClear} style={{padding:"5px 10px",fontSize:10,borderRadius:5,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.25)",color:"#F87171",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>🗑 Limpiar todas las dependencias</button>}
        </div>
      </div>

      {hasCycle && (
        <div style={{padding:"8px 12px",marginBottom:10,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.3)",borderRadius:6,fontSize:11,color:"#F87171"}}>
          ⚠ Ciclo detectado en las dependencias. El scheduler caerá a orden secuencial por <code>stage.order</code> hasta que se resuelva.
        </div>
      )}

      {/* SVG Graph */}
      <div style={{background:"var(--surface)",borderRadius:8,border:"1px solid var(--border)",padding:10,overflowX:"auto"}}>
        <svg width={svgW} height={svgH} style={{display:"block",minWidth:"100%",fontFamily:"'DM Mono',monospace"}}>
          {/* Arrow marker */}
          <defs>
            <marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#A78BFA"/>
            </marker>
            <marker id="arrow-hover" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#F87171"/>
            </marker>
          </defs>

          {/* Parallel column highlights (rendered behind nodes) */}
          {Object.keys(parallelLevels).map(lvl => {
            const lvlNum = parseInt(lvl);
            const items = byLevel[lvlNum] || [];
            if (items.length < 2) return null;
            const xs = positions[items[0].id].x;
            const labelH = 18;
            const ys = Math.min(...items.map(s => positions[s.id].y)) - labelH - 6;
            const ye = Math.max(...items.map(s => positions[s.id].y + NODE_H)) + 8;
            return (
              <g key={"par-"+lvl}>
                <rect
                  x={xs - 8} y={ys}
                  width={NODE_W + 16} height={ye - ys}
                  rx={10} ry={10}
                  fill="rgba(56,189,248,.06)"
                  stroke="rgba(56,189,248,.25)"
                  strokeWidth={1}
                  strokeDasharray="6 4"/>
                <text
                  x={xs + NODE_W/2} y={ys + 12}
                  textAnchor="middle"
                  fill="#38BDF8"
                  fontSize="9"
                  fontWeight="700"
                  fontFamily="'DM Mono', monospace">
                  ∥ EN PARALELO
                </text>
              </g>
            );
          })}

          {/* Edges */}
          {edges.map((e, i) => {
            const pts = edgePoints(e.from, e.to);
            const key = `${e.from}-${e.to}`;
            const isHover = hoverEdge === key;
            // Bezier control points (smooth curve)
            const cx1 = pts.x1 + 40;
            const cx2 = pts.x2 - 40;
            const path = `M ${pts.x1} ${pts.y1} C ${cx1} ${pts.y1}, ${cx2} ${pts.y2}, ${pts.x2} ${pts.y2}`;
            return (
              <g key={key}>
                <path d={path}
                  fill="none"
                  stroke={isHover ? "#F87171" : "#A78BFA"}
                  strokeWidth={isHover ? 2.5 : 1.6}
                  markerEnd={`url(#${isHover ? "arrow-hover" : "arrow-default"})`}
                  style={{transition:"stroke-width .12s"}}/>
                {/* Invisible wider hit area */}
                <path d={path}
                  fill="none"
                  stroke="transparent"
                  strokeWidth={14}
                  style={{cursor:"pointer"}}
                  onMouseEnter={()=>setHoverEdge(key)}
                  onMouseLeave={()=>setHoverEdge(null)}
                  onClick={()=>{ if (confirm(`¿Eliminar dependencia "${stages.find(s=>s.id===e.from)?.name} → ${stages.find(s=>s.id===e.to)?.name}"?`)) onToggle(e.to, e.from); }}>
                  <title>Click para eliminar esta dependencia</title>
                </path>
              </g>
            );
          })}

          {/* Nodes */}
          {stages.map(s => {
            const p = positions[s.id];
            const isSel = selected === s.id;
            const isTarget = selected && selected !== s.id;
            const incomingCount = edges.filter(e => e.to === s.id).length;
            const outgoingCount = edges.filter(e => e.from === s.id).length;
            // Color based on state
            const fillColor = isSel ? "rgba(245,158,11,.18)" : "var(--surface-2)";
            const borderColor = isSel ? "#F59E0B" : (isTarget ? "rgba(167,139,250,.5)" : "var(--border-2)");
            const borderWidth = isSel ? 2.5 : 1.5;
            return (
              <g key={s.id} style={{cursor:"pointer"}} onClick={()=>handleNodeClick(s.id)}>
                <rect
                  x={p.x} y={p.y} width={NODE_W} height={NODE_H}
                  rx={8} ry={8}
                  fill={fillColor}
                  stroke={borderColor}
                  strokeWidth={borderWidth}
                  strokeDasharray={isTarget ? "4 3" : "none"}
                  style={{transition:"all .12s"}}/>
                {/* Stage name */}
                <text x={p.x + NODE_W/2} y={p.y + 22} textAnchor="middle" fill="var(--text)" fontSize="12" fontWeight="600" fontFamily="'Syne', sans-serif">
                  {s.name.length > 18 ? s.name.slice(0,17) + "…" : s.name}
                </text>
                {/* Stage ID + counts */}
                <text x={p.x + NODE_W/2} y={p.y + 40} textAnchor="middle" fill="var(--text-dim)" fontSize="9">
                  {s.id} · entran: {incomingCount} · salen: {outgoingCount}
                </text>
                {/* Order badge */}
                <circle cx={p.x + 12} cy={p.y + 12} r={8} fill="#F59E0B" opacity={0.85}/>
                <text x={p.x + 12} y={p.y + 15} textAnchor="middle" fill="#0A0A0A" fontSize="9" fontWeight="700">{s.order}</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* Legend */}
      <div style={{marginTop:10,padding:"8px 12px",background:"var(--surface)",borderRadius:6,fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>
        <strong style={{color:"var(--text-muted)"}}>Cómo leer el grafo:</strong> los nodos se organizan en columnas (niveles topológicos). Las flechas indican <strong style={{color:"#A78BFA"}}>"debe terminar antes que"</strong> (prerrequisito → etapa que depende). Las columnas con <strong style={{color:"#38BDF8"}}>banda azul ∥ EN PARALELO</strong> contienen etapas que se ejecutan al mismo tiempo (sin dependencias entre sí). El número en el círculo naranja es <strong>Orden</strong> (solo desempate visual cuando hay dependencias; orden secuencial completo si no hay ninguna dependencia declarada).
      </div>
    </div>
  );
}

//  PRODUCTION CALENDAR — month grid for selecting working days
// ════════════════════════════════════════════════════════════════
function ProductionCalendar({ line, onToggle, onClear, dailyGoals, viewMonth, setViewMonth }) {
  const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,"0")}-${String(new Date().getDate()).padStart(2,"0")}`;
  const overrides = line.dateOverrides || {};
  const wd = line.workingDays || [0,1,2,3,4,5,6];
  // Build the 6-week grid (always 42 cells, Mon-first)
  const firstOfMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), 1);
  // Days from Monday: 0=Mon, 6=Sun. JS getDay: 0=Sun, 1=Mon, ..., 6=Sat
  const firstDayOfWeek = (firstOfMonth.getDay() + 6) % 7; // shift so Monday=0
  const days = [];
  const startDate = new Date(firstOfMonth);
  startDate.setDate(startDate.getDate() - firstDayOfWeek);
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const inCurrentMonth = d.getMonth() === viewMonth.getMonth();
    const defaultOn = wd.includes(d.getDay());
    const override = overrides[dateStr];
    const productive = override === "on" ? true : override === "off" ? false : defaultOn;
    const isOverride = override !== undefined;
    const isToday = dateStr === todayStr;
    const hasGoal = dailyGoals?.[dateStr] !== undefined && dailyGoals[dateStr] > 0;
    days.push({ d, dateStr, dayNum: d.getDate(), inCurrentMonth, productive, isOverride, isToday, hasGoal });
  }
  const prevMonth = () => setViewMonth(m => new Date(m.getFullYear(), m.getMonth()-1, 1));
  const nextMonth = () => setViewMonth(m => new Date(m.getFullYear(), m.getMonth()+1, 1));
  const goToday = () => { const t = new Date(); setViewMonth(new Date(t.getFullYear(), t.getMonth(), 1)); };
  const monthLabel = viewMonth.toLocaleDateString("es-CO", { month: "long", year: "numeric" });
  const overrideCount = Object.keys(overrides).length;
  return (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:9,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={prevMonth} style={{padding:"4px 10px",background:"var(--surface-2)",border:"1px solid var(--border-2)",color:"var(--text-muted)",borderRadius:5,cursor:"pointer",fontSize:13,fontFamily:"'DM Mono',monospace"}}>‹</button>
          <div style={{minWidth:140,textAlign:"center",fontSize:13,fontWeight:600,fontFamily:"'Syne',sans-serif",textTransform:"capitalize"}}>{monthLabel}</div>
          <button onClick={nextMonth} style={{padding:"4px 10px",background:"var(--surface-2)",border:"1px solid var(--border-2)",color:"var(--text-muted)",borderRadius:5,cursor:"pointer",fontSize:13,fontFamily:"'DM Mono',monospace"}}>›</button>
          <button onClick={goToday} style={{padding:"4px 10px",marginLeft:8,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",color:"#F59E0B",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}}>Hoy</button>
        </div>
        {overrideCount > 0 && (
          <button onClick={()=>{if(confirm(`¿Limpiar las ${overrideCount} excepciones del calendario? Volverá al patrón semanal.`)) onClear();}} title="Eliminar todas las excepciones del calendario" style={{padding:"4px 10px",background:"transparent",border:"1px solid rgba(248,113,113,.25)",color:"#F87171",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace"}}>↺ Limpiar excepciones ({overrideCount})</button>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
        {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d => (
          <div key={d} style={{textAlign:"center",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".07em",padding:"4px 0"}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {days.map((day, i) => {
          const bg = day.productive
            ? (day.isOverride ? "rgba(52,211,153,.18)" : "rgba(52,211,153,.06)")
            : (day.isOverride ? "rgba(107,122,154,.18)" : "var(--surface-2)");
          const fg = day.productive ? "#34D399" : "var(--text-dim)";
          const opacity = day.inCurrentMonth ? 1 : 0.35;
          return (
            <button
              key={i}
              onClick={() => onToggle(day.dateStr)}
              title={`${day.dateStr} — ${day.productive?"Productivo":"No productivo"}${day.isOverride?" (excepción)":""}${day.hasGoal?" · tiene meta":""}`}
              style={{
                position:"relative",
                padding:"10px 6px",
                background: bg,
                color: fg,
                border: day.isToday ? "2px solid #F59E0B" : "1px solid var(--border)",
                borderRadius: 6,
                cursor: "pointer",
                fontSize: 13,
                fontFamily: "'DM Mono',monospace",
                fontWeight: day.isOverride ? 700 : 500,
                opacity,
                minHeight: 44,
                display:"flex",
                alignItems:"center",
                justifyContent:"center"
              }}
            >
              <span>{day.dayNum}</span>
              {day.isOverride && <span style={{position:"absolute",top:3,right:5,width:5,height:5,borderRadius:"50%",background:day.productive?"#34D399":"#F87171"}}/>}
              {day.hasGoal && <span style={{position:"absolute",bottom:3,left:5,fontSize:8,color:"#F59E0B"}}>$</span>}
            </button>
          );
        })}
      </div>
      <div style={{marginTop:12,display:"flex",gap:14,flexWrap:"wrap",fontSize:10,color:"var(--text-dim)",fontFamily:"'DM Mono',monospace"}}>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"rgba(52,211,153,.06)",marginRight:5,verticalAlign:"middle"}}/>Productivo (patrón)</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"rgba(52,211,153,.18)",marginRight:5,verticalAlign:"middle",border:"1px solid #34D399"}}/>Productivo (excepción)</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"var(--surface-2)",marginRight:5,verticalAlign:"middle"}}/>No productivo (patrón)</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"rgba(107,122,154,.18)",marginRight:5,verticalAlign:"middle",border:"1px solid #F87171"}}/>No productivo (excepción)</span>
        <span style={{color:"#F59E0B"}}>$ = día con meta</span>
      </div>
      <div style={{marginTop:8,fontSize:11,color:"var(--text-muted)",lineHeight:1.5}}>
        <strong style={{color:"var(--text)"}}>Click un día</strong> para cambiar su estado. El patrón semanal (configurado abajo) define el valor por defecto; el calendario lo sobrescribe día por día. Los cambios afectan automáticamente al Gantt y a las metas de facturación.
      </div>
    </div>
  );
}

const DAY_NAMES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const fmtDayKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

// Decide if a given date is a working day for the line, considering:
// 1) The line's weekly pattern (workingDays array of day-of-week 0-6)
// 2) Per-date overrides in line.dateOverrides ("on" forces productive, "off" forces non-productive)
function isWorkingDate(dateStr, line) {
  if (!line) return true;
  const overrides = line.dateOverrides || {};
  if (overrides[dateStr] === "on")  return true;
  if (overrides[dateStr] === "off") return false;
  const d = new Date(dateStr + "T12:00:00");
  const wd = line.workingDays && line.workingDays.length ? line.workingDays : [0,1,2,3,4,5,6];
  return wd.includes(d.getDay());
}

function PriorityDots({ n }) {
  return <div style={{display:"flex",gap:3}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:i<=n?"#FBBF24":"var(--border-2)"}}/>)}</div>;
}

function App() {
  // ─── LocalStorage Persistence ───────────────────────────────
  const STORAGE_KEY = "prodScheduler_v4_data";
  const STORAGE_META = "prodScheduler_v4_meta";
  const loadPersisted = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      // Sanity check: must have lines and orders
      if (!parsed.lines || !Array.isArray(parsed.lines) || !Array.isArray(parsed.orders)) return null;
      return parsed;
    } catch (e) { console.warn("Could not load saved data:", e); return null; }
  };
  const loadPersistedMeta = () => {
    try { const raw = localStorage.getItem(STORAGE_META); return raw ? JSON.parse(raw) : {}; }
    catch (e) { return {}; }
  };
  const initialData  = loadPersisted() || INITIAL_DATA;
  const initialMeta  = loadPersistedMeta();
  const [data,           setData]           = useState(initialData);
  const [lastSaved,      setLastSaved]      = useState(initialMeta.lastSaved || null);

            const rows = XLSX.utils.sheet_to_json(wb.Sheets["SKUs"], { header: 1, defval: "" });

                id: id && String(id).trim() ? String(id).trim() : "SKU-" + (Date.now()%100000 + i),
                name: String(name).trim(),

      const bs = sku?.batchSize || 1;

  // Import orders from Excel
  const handleImportOrders = useCallback((lid, event) => {
    const file = event.target.files?.[0];
    event.target.value = ""; // reset so same file can be re-uploaded
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
        // Find the orders sheet — prefer "Órdenes", else first sheet
        const sheetName = wb.SheetNames.find(n => /orden/i.test(n)) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: "" });
        if (rows.length < 2) { alert("El archivo está vacío o sin filas de datos."); return; }
        // Detect header: skip first row if it contains text in col 0
        const hasHeader = typeof rows[0][0] === "string" && /sku|c[óo]digo/i.test(rows[0][0]);
        const dataRows = hasHeader ? rows.slice(1) : rows;

        mutate(d => {
          const lineObj = d.lines.find(l => l.id === lid);
          if (!lineObj) return;
          const skuMap = new Map(lineObj.skus.map(s => [s.id.toLowerCase(), s]));
          let added = 0, skipped = 0;
          const errors = [];

          dataRows.forEach((row, idx) => {
            const rowNum = (hasHeader ? idx + 2 : idx + 1);
            const [skuRaw, qtyRaw, dueRaw, prioRaw, unitValRaw] = row;
            const skuKey = String(skuRaw || "").trim().toLowerCase();
            if (!skuKey) { return; } // silently skip blank rows
            const sku = skuMap.get(skuKey);
            if (!sku) { errors.push(`Fila ${rowNum}: SKU "${skuRaw}" no existe en la línea.`); skipped++; return; }

            const qty = parseInt(qtyRaw);
            if (isNaN(qty) || qty <= 0) { errors.push(`Fila ${rowNum}: cantidad inválida (${qtyRaw}).`); skipped++; return; }

            // Parse due date — accept Date object, "YYYY-MM-DD", "YYYY-MM-DD HH:MM", "DD/MM/YYYY"
            let dueDateStr = "";
            if (dueRaw instanceof Date && !isNaN(dueRaw)) {
              const z = n => String(n).padStart(2,"0");
              const h = dueRaw.getHours() === 0 && dueRaw.getMinutes() === 0 ? "17" : z(dueRaw.getHours());
              const m = dueRaw.getHours() === 0 && dueRaw.getMinutes() === 0 ? "00" : z(dueRaw.getMinutes());
              dueDateStr = `${dueRaw.getFullYear()}-${z(dueRaw.getMonth()+1)}-${z(dueRaw.getDate())}T${h}:${m}`;
            } else if (typeof dueRaw === "string" || typeof dueRaw === "number") {
              const s = String(dueRaw).trim();
              // Try various formats
              let parsed;
              if (/^\d{4}-\d{2}-\d{2}/.test(s)) parsed = new Date(s.includes("T") || s.includes(" ") ? s.replace(" ", "T") : s + "T17:00");
              else if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)) { const [d1,m1,y1] = s.split(/[\s\/]/); parsed = new Date(`${y1}-${String(m1).padStart(2,"0")}-${String(d1).padStart(2,"0")}T17:00`); }
              else parsed = new Date(s);
              if (parsed && !isNaN(parsed)) {
                const z = n => String(n).padStart(2,"0");
                dueDateStr = `${parsed.getFullYear()}-${z(parsed.getMonth()+1)}-${z(parsed.getDate())}T${z(parsed.getHours())}:${z(parsed.getMinutes())}`;
              }
            }
